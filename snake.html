<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00e5ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Snake Deluxe</title>
    <style>
        body { background: #050505; color: #4ae04a; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; margin: 0; padding: 10px; box-sizing: border-box; overflow: auto; user-select: none; touch-action: manipulation; }
        .stats { margin-bottom: 10px; font-size: 22px; display: flex; gap: 30px; font-weight: bold; text-shadow: 2px 2px #000; flex-wrap: wrap; justify-content: center; }
        #s, #l, #v { color: #fff; }
        #game-wrapper { position: relative; border: 4px solid #333; box-shadow: 0 0 50px rgba(74, 224, 74, 0.15); border-radius: 8px; overflow: hidden; touch-action: none; max-width: 560px; width: 100%; }
        canvas { display: block; background: #000; cursor: crosshair; width: 100%; height: auto; }
        .controls { display: flex; gap: 15px; margin-top: 15px; z-index: 10; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 25px; font-size: 16px; font-family: inherit; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; transition: 0.2s; text-transform: uppercase; }
        #b { background: linear-gradient(180deg, #aaff00, #88cc00); color: #000; box-shadow: 0 4px 0 #5c8a00; }
        #ai-btn { background: #222; color: #00ccff; border: 2px solid #00ccff; box-shadow: 0 0 10px rgba(0, 204, 255, 0.3); }
        #pause-btn { background: #222; color: #ffaa00; border: 2px solid #ffaa00; box-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }
        button:active { transform: translateY(3px); box-shadow: none; }
        .ai-active { background: #00ccff !important; color: #000 !important; box-shadow: 0 0 20px #00ccff !important; }
        .pause-active { background: #ffaa00 !important; color: #000 !important; box-shadow: 0 0 20px #ffaa00 !important; }
        .dpad { display: none; margin-top: 10px; }
        @media (pointer: coarse) { .dpad { display: flex; } }
        .dpad { gap: 5px; justify-content: center; align-items: center; flex-wrap: wrap; width: 220px; }
        .dpad-row { display: flex; gap: 5px; justify-content: center; width: 100%; }
        .dpad button { padding: 0; width: 60px; height: 55px; font-size: 24px; background: #222; color: #4ae04a; border: 2px solid #4ae04a; border-radius: 8px; }
        .dpad button:active { background: #4ae04a; color: #000; }
        @media (max-width: 580px) { .stats { font-size: 14px; gap: 10px; } .controls { display: flex; gap: 4px; margin-top: 8px; width: 100%; flex-wrap: nowrap; } .controls button, .controls a { padding: 8px 2px !important; font-size: 11px !important; text-align: center; box-sizing: border-box; flex: 1; min-width: 0; } }
        #transition-overlay { position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;opacity:1;pointer-events:none;background:repeating-linear-gradient(0deg,#000 0px,#000 2px,rgba(0,0,0,0.85) 2px,rgba(0,0,0,0.85) 4px);transition:opacity 0.4s; }
    </style>
</head>
<body>
    <div id="transition-overlay"></div>

    <div class="stats">
        <div>SCORE: <span id="s">0</span></div>
        <div>LENGTH: <span id="l">3</span></div>
        <div>LVL: <span id="v">1</span></div>
    </div>

    <div id="game-wrapper">
        <canvas id="c" width="560" height="600"></canvas>
    </div>

    <div class="controls">
        <button id="b">START</button>
        <button id="pause-btn">PAUSE</button>
        <button id="ai-btn">AI: OFF</button>
        <button id="mute-btn" style="background:#222;color:#0ff;border:2px solid #0ff;line-height:0;padding:6px;"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16,7.5 Q21,12 16,16.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        <a href="index.html" style="padding: 12px 25px; font-size: 16px; font-family: 'Courier New', Courier, monospace; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; text-transform: uppercase; background: #222; color: #fff; border: 2px solid #fff; text-decoration: none; display: inline-block; transition: 0.2s;">MENU</a>
    </div>

    <div class="dpad">
        <div class="dpad-row"><button id="d-up">&#9650;</button></div>
        <div class="dpad-row"><button id="d-left">&#9664;</button><button id="d-down">&#9660;</button><button id="d-right">&#9654;</button></div>
    </div>

    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
    <script>
    (function() {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('b');
        const aiBtn = document.getElementById('ai-btn');
        const pauseBtn = document.getElementById('pause-btn');
        let muted = localStorage.getItem('arcade_muted') === 'true';
        const _mob = window.innerWidth <= 580;
        const muteBtn = document.getElementById('mute-btn');
        const _spkOn = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16,7.5 Q21,12 16,16.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        const _spkOff = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="15" y1="9" x2="21" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="21" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        muteBtn.innerHTML = muted ? _spkOff : _spkOn;
        muteBtn.onclick = () => { haptic(30); muted = !muted; localStorage.setItem('arcade_muted', muted); muteBtn.innerHTML = muted ? _spkOff : _spkOn; if (muted) stopMusic(); else { currentTrack = null; if (state === 'START' || state === 'OVER') playMusic('home'); else if (state === 'PLAY' && !paused) playMusic('game'); } };
        function haptic(ms) { try { if (navigator.vibrate) navigator.vibrate(ms || 50); } catch(e) {} }

        const W = 560, H = 600;
        canvas.width = W;
        canvas.height = H;

        // Grid setup
        const COLS = 28, ROWS = 28;
        const CELL = 20;
        const GRID_W = COLS * CELL;
        const GRID_H = ROWS * CELL;
        const OFFSET_X = Math.floor((W - GRID_W) / 2);
        const OFFSET_Y = Math.floor((H - GRID_H) / 2);

        let state = 'START', aiMode = false, paused = false;
        let score = 0, length = 3, level = 1, lastTime = performance.now(), gameTime = 0;
        let floatingTexts = [], particles = [];
        let difficulty = 1;
        const DIFF_NAMES = ['E: EASY', 'M: MEDIUM', 'H: HARD'];
        const DIFF_COLORS = ['#4ae04a', '#ffaa00', '#ff3333'];
        const DIFF_SPEEDS = [0.14, 0.10, 0.07]; // seconds per move
        let highScores = JSON.parse(localStorage.getItem('snake_deluxe_scores')) || [{n:'CPU', s:500}];
        highScores = highScores.slice(0, 10);

        let titleTimer = 0;
        let gameOverTimeoutId = null;

        // Snake
        let snake = [];
        let dir = {x: 1, y: 0};
        let nextDir = {x: 1, y: 0};
        let moveTimer = 0;
        let moveInterval = 0.10;
        let foodEaten = 0;
        let deathTimer = 0;

        // Food
        let food = null;
        let bonusFood = null;
        let bonusTimer = 0;

        // Special items system
        let specialItems = []; // active items on the grid
        let specialTimers = {}; // spawn timers per type
        const ITEM_TYPES = {
            cherry:     { points: 20, color: '#ff2266', glow: '#ff2266', life: 10, spawnMin: 8,  spawnMax: 15, label: 'CHERRY' },
            strawberry: { points: 30, color: '#ff4488', glow: '#ff4488', life: 8,  spawnMin: 15, spawnMax: 25, label: 'STRAWBERRY' },
            diamond:    { points: 100, color: '#00ffff', glow: '#00ffff', life: 4,  spawnMin: 25, spawnMax: 40, label: 'DIAMOND' },
            lightning:  { points: 10, color: '#ffee00', glow: '#ffee00', life: 7,  spawnMin: 20, spawnMax: 35, label: '2x SCORE', effect: 'multiplier', duration: 6 },
            shield:     { points: 10, color: '#4488ff', glow: '#4488ff', life: 6,  spawnMin: 30, spawnMax: 45, label: 'SHIELD', effect: 'shield', duration: 5 }
        };

        // Active powerup effects
        let activeEffects = {}; // { multiplier: timeLeft, shield: timeLeft }

        // Walls
        let walls = [];

        // Direction queue for responsive turning
        let dirQueue = [];

        function cellToPixel(cx, cy) {
            return { x: OFFSET_X + cx * CELL, y: OFFSET_Y + cy * CELL };
        }

        function isWall(cx, cy) {
            return walls.some(w => w.x === cx && w.y === cy);
        }

        function isSnake(cx, cy) {
            return snake.some(s => s.x === cx && s.y === cy);
        }

        function isFree(cx, cy) {
            if (cx < 0 || cx >= COLS || cy < 0 || cy >= ROWS) return false;
            if (isWall(cx, cy)) return false;
            if (isSnake(cx, cy)) return false;
            return true;
        }

        function randomFreeCell() {
            let attempts = 0;
            while (attempts < 1000) {
                const cx = Math.floor(Math.random() * COLS);
                const cy = Math.floor(Math.random() * ROWS);
                if (!isWall(cx, cy) && !isSnake(cx, cy)) {
                    if (food && food.x === cx && food.y === cy) { attempts++; continue; }
                    if (bonusFood && bonusFood.x === cx && bonusFood.y === cy) { attempts++; continue; }
                    if (specialItems.some(function(si) { return si.x === cx && si.y === cy; })) { attempts++; continue; }
                    return {x: cx, y: cy};
                }
                attempts++;
            }
            // Deterministic scan to find a genuinely free cell
            for (var sy = 0; sy < ROWS; sy++) {
                for (var sx = 0; sx < COLS; sx++) {
                    if (!isWall(sx, sy) && !isSnake(sx, sy) &&
                        !(food && food.x === sx && food.y === sy) &&
                        !(bonusFood && bonusFood.x === sx && bonusFood.y === sy) &&
                        !specialItems.some(function(si) { return si.x === sx && si.y === sy; })) {
                        return {x: sx, y: sy};
                    }
                }
            }
            return {x: Math.floor(COLS / 2), y: Math.floor(ROWS / 2)};
        }

        function isReachable(fromX, fromY, toX, toY) {
            var visited = {};
            var queue = [{x: fromX, y: fromY}];
            visited[fromX + ',' + fromY] = true;
            var dirs = [{x:0,y:-1},{x:0,y:1},{x:-1,y:0},{x:1,y:0}];
            while (queue.length > 0) {
                var cur = queue.shift();
                if (cur.x === toX && cur.y === toY) return true;
                for (var d = 0; d < dirs.length; d++) {
                    var nx = cur.x + dirs[d].x;
                    var ny = cur.y + dirs[d].y;
                    if (difficulty <= 1 && (nx < 0 || nx >= COLS)) {
                        nx = ((nx % COLS) + COLS) % COLS;
                    }
                    if (difficulty === 0 && (ny < 0 || ny >= ROWS)) {
                        ny = ((ny % ROWS) + ROWS) % ROWS;
                    }
                    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
                    var key = nx + ',' + ny;
                    if (visited[key]) continue;
                    if (isWall(nx, ny)) continue;
                    // Skip snake body except tail (which will move)
                    var isBody = false;
                    for (var si = 0; si < snake.length - 1; si++) {
                        if (snake[si].x === nx && snake[si].y === ny) { isBody = true; break; }
                    }
                    if (isBody) continue;
                    visited[key] = true;
                    queue.push({x: nx, y: ny});
                }
            }
            return false;
        }

        function ensureFoodReachable() {
            var maxRetries = 10;
            for (var attempt = 0; attempt < maxRetries; attempt++) {
                if (food && snake.length > 0 && isReachable(snake[0].x, snake[0].y, food.x, food.y)) {
                    return;
                }
                generateWalls();
                spawnFood();
            }
            // Guaranteed fallback: clear all walls and respawn food
            if (!food || snake.length === 0 || !isReachable(snake[0].x, snake[0].y, food.x, food.y)) {
                walls = [];
                spawnFood();
            }
        }

        function spawnFood() {
            const pos = randomFreeCell();
            food = {x: pos.x, y: pos.y};
        }

        function spawnBonusFood() {
            const pos = randomFreeCell();
            bonusFood = {x: pos.x, y: pos.y, life: 6.0};
        }

        function resetSpecialTimers() {
            Object.keys(ITEM_TYPES).forEach(function(type) {
                var t = ITEM_TYPES[type];
                specialTimers[type] = t.spawnMin + Math.random() * (t.spawnMax - t.spawnMin);
            });
            specialItems = [];
            activeEffects = {};
        }

        function spawnSpecialItem(type) {
            // Only one of each type at a time
            if (specialItems.some(function(si) { return si.type === type; })) return;
            var pos = randomFreeCell();
            // Also avoid other special items
            var blocked = specialItems.some(function(si) { return si.x === pos.x && si.y === pos.y; });
            if (blocked) return;
            specialItems.push({ type: type, x: pos.x, y: pos.y, life: ITEM_TYPES[type].life });
        }

        function getScoreMultiplier() {
            return activeEffects.multiplier && activeEffects.multiplier > 0 ? 2 : 1;
        }

        function hasShield() {
            return activeEffects.shield && activeEffects.shield > 0;
        }

        function generateWalls() {
            walls = [];
            if (level < 3) return;
            const count = Math.min((level - 2) * 3 + difficulty * 2, 30);
            // Generate wall clusters
            for (let i = 0; i < count; i++) {
                let attempts = 0;
                while (attempts < 50) {
                    const cx = Math.floor(Math.random() * (COLS - 4)) + 2;
                    const cy = Math.floor(Math.random() * (ROWS - 4)) + 2;
                    // Avoid center spawn area
                    if (Math.abs(cx - COLS / 2) < 4 && Math.abs(cy - ROWS / 2) < 4) { attempts++; continue; }
                    if (!isWall(cx, cy) && !isSnake(cx, cy) &&
                        !(food && food.x === cx && food.y === cy) &&
                        !(bonusFood && bonusFood.x === cx && bonusFood.y === cy)) {
                        walls.push({x: cx, y: cy});
                        break;
                    }
                    attempts++;
                }
            }
        }

        function initLevel() {
            const startX = Math.floor(COLS / 2);
            const startY = Math.floor(ROWS / 2);
            snake = [];
            for (let i = 0; i < 3; i++) {
                snake.push({x: startX - i, y: startY});
            }
            dir = {x: 1, y: 0};
            nextDir = {x: 1, y: 0};
            dirQueue = [];
            moveTimer = 0;
            moveInterval = Math.max(0.04, DIFF_SPEEDS[difficulty] - (level - 1) * 0.005);
            deathTimer = 0;
            bonusFood = null;
            bonusTimer = 8 + Math.random() * 10;
            resetSpecialTimers();
            generateWalls();
            spawnFood();
            ensureFoodReachable();
        }

        function startGame() {
            score = 0;
            length = 3;
            level = 1;
            foodEaten = 0;
            paused = false;
            floatingTexts = [];
            particles = [];
            if (gameOverTimeoutId) { clearTimeout(gameOverTimeoutId); gameOverTimeoutId = null; }
            initLevel();
            state = 'PLAY';
            lastTime = performance.now();
            gameTime = 0;
            playMusic('game');
            canvas.focus();
            updateHUD();
        }

        // === Particles ===
        function spawnExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 120 + 30;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.5 + Math.random() * 0.5,
                    color, size: Math.random() * 3 + 1
                });
            }
        }

        function spawnSparkle(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 60 + 20;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.3 + Math.random() * 0.4,
                    color, size: Math.random() * 2 + 1
                });
            }
        }

        // === Sound Engine ===
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

        function playTone(freq, duration, type, vol) {
            if (muted) return;
            if (typeof type === 'undefined') type = 'square';
            if (typeof vol === 'undefined') vol = 0.12;
            ensureAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            osc.onended = function() { osc.disconnect(); gain.disconnect(); };
        }

        function sfxEat() {
            playTone(262, 0.06, 'triangle', 0.09);
            setTimeout(function() { playTone(392, 0.06, 'triangle', 0.08); }, 40);
            setTimeout(function() { playTone(523, 0.07, 'triangle', 0.07); }, 80);
        }
        function sfxBonusEat() {
            [494, 587, 740, 988, 1175].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.1, 'triangle', 0.1); }, i * 45);
            });
        }
        function sfxCherry() {
            playTone(330, 0.07, 'triangle', 0.1);
            setTimeout(function() { playTone(494, 0.07, 'triangle', 0.08); }, 45);
            setTimeout(function() { playTone(659, 0.06, 'triangle', 0.06); }, 90);
        }
        function sfxStrawberry() {
            playTone(440, 0.07, 'triangle', 0.1);
            setTimeout(function() { playTone(587, 0.08, 'triangle', 0.09); }, 50);
            setTimeout(function() { playTone(784, 0.07, 'triangle', 0.07); }, 100);
        }
        function sfxDiamond() {
            [784, 988, 1319, 1568, 1760].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.12, 'triangle', 0.08); }, i * 35);
            });
        }
        function sfxPowerup() {
            [262, 392, 523, 659, 784, 1047].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.09, 'triangle', 0.08); }, i * 40);
            });
        }
        function sfxLevelUp() {
            [294, 392, 494, 587, 784, 988].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.18, 'triangle', 0.11); }, i * 90);
            });
        }
        function sfxDie() {
            playTone(110, 0.3, 'triangle', 0.12);
            [350, 262, 196, 147].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.2, 'triangle', 0.1); }, i * 75);
            });
        }
        function sfxGameOver() {
            [392, 370, 349, 330, 294, 262, 220, 196].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.25, 'triangle', 0.1); }, i * 120);
            });
            setTimeout(function() { playTone(110, 0.5, 'triangle', 0.07); }, 1000);
        }

        // === Music Engine ===
        let musicInterval = null;
        let currentTrack = null;

        function stopMusic() {
            if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
            currentTrack = null;
        }

        function playMusic(track) {
            if (currentTrack === track) return;
            stopMusic();
            currentTrack = track;
            if (muted) return;
            ensureAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();

            // Home: mysterious snake-charmer in Phrygian dominant
            var homeMelody = [
                330, 349, 415, 440, 0, 415, 349, 330,
                349, 0, 415, 440, 494, 440, 415, 0,
                330, 0, 349, 415, 0, 440, 415, 349,
                330, 349, 0, 415, 440, 0, 523, 494,
                440, 0, 415, 349, 330, 0, 349, 415,
                440, 494, 523, 0, 494, 440, 415, 0,
                349, 330, 349, 415, 0, 440, 0, 415,
                349, 330, 0, 349, 330, 0, 0, 0
            ];
            var homeBass = [
                165, 0, 175, 0, 208, 0, 220, 0,
                175, 0, 165, 0, 208, 220, 0, 208,
                165, 0, 0, 175, 208, 0, 220, 0,
                247, 0, 220, 0, 208, 175, 0, 165,
                175, 0, 208, 0, 220, 0, 247, 0,
                262, 0, 247, 220, 0, 208, 175, 0,
                165, 0, 175, 208, 0, 220, 0, 208,
                175, 165, 0, 175, 165, 0, 0, 0
            ];
            // Game: hypnotic slithering in Phrygian dominant
            var gameMelody = [
                330, 349, 415, 440, 494, 523, 494, 440,
                415, 349, 330, 0, 349, 415, 440, 0,
                494, 523, 587, 659, 0, 587, 523, 494,
                440, 415, 0, 349, 330, 349, 415, 0,
                440, 494, 523, 0, 587, 659, 698, 659,
                587, 523, 494, 0, 440, 415, 349, 330,
                349, 415, 440, 0, 494, 0, 523, 494,
                440, 415, 349, 0, 330, 0, 0, 0
            ];
            var gameBass = [
                165, 0, 175, 208, 0, 220, 247, 0,
                220, 208, 175, 0, 165, 0, 175, 0,
                208, 220, 0, 247, 262, 0, 247, 220,
                208, 0, 175, 165, 0, 175, 208, 0,
                220, 0, 247, 262, 0, 294, 330, 294,
                262, 247, 0, 220, 208, 0, 175, 165,
                0, 175, 208, 0, 220, 0, 247, 220,
                208, 175, 165, 0, 165, 0, 0, 0
            ];

            var melody = track === 'home' ? homeMelody : gameMelody;
            var bass = track === 'home' ? homeBass : gameBass;
            var tempo = track === 'home' ? 155 : 190;
            var melVol = 0.05;
            var bassVol = 0.03;
            var stepMs = 60000 / tempo;
            var step = 0;

            musicInterval = setInterval(function() {
                if (paused) return;
                var note = melody[step % melody.length];
                var bn = bass[step % bass.length];
                if (note > 0) playTone(note, stepMs / 1000 * 0.85, 'triangle', melVol);
                if (bn > 0) playTone(bn, stepMs / 1000 * 0.85, 'triangle', bassVol);
                step++;
            }, stepMs);
        }

        // === AI (Neural Override) ===
        function runAI() {
            if (deathTimer > 0) return;
            var head = snake[0];
            var target = food;
            // Prefer high-value items
            var bestPriority = 0;
            specialItems.forEach(function(si) {
                var prio = 0;
                if (si.type === 'diamond') prio = 5;
                else if (si.type === 'lightning' || si.type === 'shield') prio = 4;
                else if (si.type === 'strawberry') prio = 2;
                else if (si.type === 'cherry') prio = 1;
                if (prio > bestPriority) { target = si; bestPriority = prio; }
            });
            if (bonusFood && bestPriority < 3) target = bonusFood;

            // BFS pathfinding
            var visited = {};
            var queue = [{x: head.x, y: head.y, firstDir: null}];
            visited[head.x + ',' + head.y] = true;

            var dirs = [
                {x: 0, y: -1}, {x: 0, y: 1},
                {x: -1, y: 0}, {x: 1, y: 0}
            ];

            var bestDir = null;

            while (queue.length > 0) {
                var cur = queue.shift();
                if (cur.x === target.x && cur.y === target.y) {
                    bestDir = cur.firstDir;
                    break;
                }
                for (var d = 0; d < dirs.length; d++) {
                    var nx = cur.x + dirs[d].x;
                    var ny = cur.y + dirs[d].y;
                    // Wrap passable edges: Easy=all, Medium=sides only
                    if (difficulty <= 1 && (nx < 0 || nx >= COLS)) {
                        nx = ((nx % COLS) + COLS) % COLS;
                    }
                    if (difficulty === 0 && (ny < 0 || ny >= ROWS)) {
                        ny = ((ny % ROWS) + ROWS) % ROWS;
                    }
                    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) continue;
                    var key = nx + ',' + ny;
                    if (visited[key]) continue;
                    if (isWall(nx, ny)) continue;
                    // Avoid snake body except tail (will move)
                    var isBody = false;
                    for (var si = 0; si < snake.length - 1; si++) {
                        if (snake[si].x === nx && snake[si].y === ny) { isBody = true; break; }
                    }
                    if (isBody) continue;
                    visited[key] = true;
                    var fd = cur.firstDir || dirs[d];
                    queue.push({x: nx, y: ny, firstDir: fd});
                }
            }

            if (bestDir) {
                // Only change if not reversing
                if (bestDir.x !== -dir.x || bestDir.y !== -dir.y) {
                    nextDir = {x: bestDir.x, y: bestDir.y};
                }
            } else {
                // No path found - try any safe direction
                for (var d = 0; d < dirs.length; d++) {
                    var nx = head.x + dirs[d].x;
                    var ny = head.y + dirs[d].y;
                    if (difficulty <= 1 && (nx < 0 || nx >= COLS)) {
                        nx = ((nx % COLS) + COLS) % COLS;
                    }
                    if (difficulty === 0 && (ny < 0 || ny >= ROWS)) {
                        ny = ((ny % ROWS) + ROWS) % ROWS;
                    }
                    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && !isWall(nx, ny) && !isSnake(nx, ny)) {
                        if (dirs[d].x !== -dir.x || dirs[d].y !== -dir.y) {
                            nextDir = {x: dirs[d].x, y: dirs[d].y};
                            break;
                        }
                    }
                }
            }
        }

        // === Drawing ===
        function drawGrid() {
            ctx.strokeStyle = 'rgba(74, 224, 74, 0.06)';
            ctx.lineWidth = 0.5;
            for (var x = 1; x < COLS; x++) {
                ctx.beginPath();
                ctx.moveTo(OFFSET_X + x * CELL, OFFSET_Y);
                ctx.lineTo(OFFSET_X + x * CELL, OFFSET_Y + GRID_H);
                ctx.stroke();
            }
            for (var y = 1; y < ROWS; y++) {
                ctx.beginPath();
                ctx.moveTo(OFFSET_X, OFFSET_Y + y * CELL);
                ctx.lineTo(OFFSET_X + GRID_W, OFFSET_Y + y * CELL);
                ctx.stroke();
            }
        }

        function drawBorderEdge(x1, y1, x2, y2, passable) {
            if (passable) {
                ctx.strokeStyle = 'rgba(74, 224, 74, 0.25)';
                ctx.lineWidth = 1;
                ctx.setLineDash([8, 6]);
            } else {
                ctx.strokeStyle = '#ff3333';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff3333';
            }
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;
        }

        function drawBorder() {
            var x = OFFSET_X - 1, y = OFFSET_Y - 1;
            var w = GRID_W + 2, h = GRID_H + 2;
            // Easy: all passable. Medium: sides passable, top/bottom deadly. Hard: all deadly.
            var sidesPass = difficulty <= 1;  // Easy + Medium
            var topBotPass = difficulty === 0; // Easy only

            // Top
            drawBorderEdge(x, y, x + w, y, topBotPass);
            // Bottom
            drawBorderEdge(x, y + h, x + w, y + h, topBotPass);
            // Left
            drawBorderEdge(x, y, x, y + h, sidesPass);
            // Right
            drawBorderEdge(x + w, y, x + w, y + h, sidesPass);

            // Arrow hints on passable edges
            ctx.fillStyle = 'rgba(74, 224, 74, 0.2)';
            ctx.font = '14px Courier';
            ctx.textAlign = 'center';
            var mx = OFFSET_X + GRID_W / 2;
            var my = OFFSET_Y + GRID_H / 2;
            if (topBotPass) {
                ctx.fillText('\u2195', mx, OFFSET_Y - 4);
                ctx.fillText('\u2195', mx, OFFSET_Y + GRID_H + 14);
            }
            if (sidesPass) {
                ctx.save();
                ctx.translate(OFFSET_X - 6, my);
                ctx.rotate(-Math.PI / 2);
                ctx.fillText('\u2194', 0, 0);
                ctx.restore();
                ctx.save();
                ctx.translate(OFFSET_X + GRID_W + 8, my);
                ctx.rotate(-Math.PI / 2);
                ctx.fillText('\u2194', 0, 0);
                ctx.restore();
            }
        }

        function drawWalls() {
            walls.forEach(function(w) {
                var px = OFFSET_X + w.x * CELL;
                var py = OFFSET_Y + w.y * CELL;
                ctx.fillStyle = '#666';
                ctx.shadowBlur = 4;
                ctx.shadowColor = '#888';
                ctx.fillRect(px + 1, py + 1, CELL - 2, CELL - 2);
                // Brick pattern
                ctx.strokeStyle = '#444';
                ctx.lineWidth = 1;
                ctx.strokeRect(px + 1, py + 1, CELL - 2, CELL - 2);
                ctx.beginPath();
                ctx.moveTo(px + CELL / 2, py + 1);
                ctx.lineTo(px + CELL / 2, py + CELL / 2);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(px + 1, py + CELL / 2);
                ctx.lineTo(px + CELL - 1, py + CELL / 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            });
        }

        function drawSnake() {
            var shielded = hasShield();
            var snakeColor = shielded ? '#4488ff' : (aiMode ? '#00ccff' : '#4ae04a');
            var headColor = shielded ? '#66aaff' : (aiMode ? '#00eeff' : '#6eff6e');
            for (var i = snake.length - 1; i >= 0; i--) {
                var seg = snake[i];
                var px = OFFSET_X + seg.x * CELL;
                var py = OFFSET_Y + seg.y * CELL;
                var isHead = (i === 0);

                if (deathTimer > 0) {
                    // Flash effect
                    var flash = Math.floor(deathTimer * 10) % 2 === 0;
                    if (!flash) continue;
                    ctx.globalAlpha = deathTimer / 1.0;
                }

                ctx.fillStyle = isHead ? headColor : snakeColor;
                ctx.shadowBlur = isHead ? 10 : 4;
                ctx.shadowColor = snakeColor;

                var inset = isHead ? 0 : 1;
                ctx.fillRect(px + inset, py + inset, CELL - inset * 2, CELL - inset * 2);

                if (isHead) {
                    // Eyes
                    ctx.fillStyle = '#000';
                    ctx.shadowBlur = 0;
                    var eyeOff = 5;
                    var ex1, ey1, ex2, ey2;
                    if (dir.x === 1) { ex1 = px + 13; ey1 = py + 5; ex2 = px + 13; ey2 = py + 13; }
                    else if (dir.x === -1) { ex1 = px + 5; ey1 = py + 5; ex2 = px + 5; ey2 = py + 13; }
                    else if (dir.y === -1) { ex1 = px + 5; ey1 = py + 5; ex2 = px + 13; ey2 = py + 5; }
                    else { ex1 = px + 5; ey1 = py + 13; ex2 = px + 13; ey2 = py + 13; }
                    ctx.beginPath();
                    ctx.arc(ex1, ey1, 2, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(ex2, ey2, 2, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }

            // Shield bubble effect
            if (shielded && snake.length > 0 && deathTimer <= 0) {
                var sh = snake[0];
                var spx = OFFSET_X + sh.x * CELL + CELL / 2;
                var spy = OFFSET_Y + sh.y * CELL + CELL / 2;
                ctx.strokeStyle = 'rgba(68, 136, 255, ' + (0.4 + 0.3 * Math.sin(gameTime * 8)) + ')';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 8; ctx.shadowColor = '#4488ff';
                ctx.beginPath();
                ctx.arc(spx, spy, 13, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // 2x multiplier glow
            if (getScoreMultiplier() > 1 && snake.length > 0 && deathTimer <= 0) {
                for (var mi = 0; mi < snake.length; mi += 3) {
                    var ms = snake[mi];
                    var mpx = OFFSET_X + ms.x * CELL + CELL / 2;
                    var mpy = OFFSET_Y + ms.y * CELL + CELL / 2;
                    ctx.fillStyle = 'rgba(255, 238, 0, ' + (0.15 + 0.1 * Math.sin(gameTime * 10 + mi)) + ')';
                    ctx.beginPath();
                    ctx.arc(mpx, mpy, 12, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function drawFood() {
            if (!food) return;
            var px = OFFSET_X + food.x * CELL + CELL / 2;
            var py = OFFSET_Y + food.y * CELL + CELL / 2;
            var pulse = 1 + 0.15 * Math.sin(gameTime * 6);

            // Red apple
            ctx.fillStyle = '#ff3333';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff3333';
            ctx.beginPath();
            ctx.arc(px, py + 1, 7 * pulse, 0, Math.PI * 2);
            ctx.fill();
            // Stem
            ctx.strokeStyle = '#4a2';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.moveTo(px, py - 6 * pulse);
            ctx.lineTo(px + 2, py - 9 * pulse);
            ctx.stroke();
            // Leaf
            ctx.fillStyle = '#4a2';
            ctx.beginPath();
            ctx.ellipse(px + 4, py - 8 * pulse, 3, 1.5, 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawBonusFood() {
            if (!bonusFood) return;
            var px = OFFSET_X + bonusFood.x * CELL + CELL / 2;
            var py = OFFSET_Y + bonusFood.y * CELL + CELL / 2;
            var pulse = 1 + 0.2 * Math.sin(gameTime * 10);
            var blink = bonusFood.life < 2 ? (Math.floor(gameTime * 6) % 2 === 0) : true;
            if (!blink) return;

            // Golden star
            ctx.fillStyle = '#ffd700';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffd700';
            ctx.beginPath();
            var spikes = 5, outerR = 8 * pulse, innerR = 4 * pulse;
            for (var i = 0; i < spikes * 2; i++) {
                var r = (i % 2 === 0) ? outerR : innerR;
                var angle = (i * Math.PI / spikes) - Math.PI / 2;
                if (i === 0) ctx.moveTo(px + r * Math.cos(angle), py + r * Math.sin(angle));
                else ctx.lineTo(px + r * Math.cos(angle), py + r * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawSpecialItems() {
            specialItems.forEach(function(item) {
                var px = OFFSET_X + item.x * CELL + CELL / 2;
                var py = OFFSET_Y + item.y * CELL + CELL / 2;
                var t = ITEM_TYPES[item.type];
                var pulse = 1 + 0.15 * Math.sin(gameTime * 8);
                // Blink when about to expire
                var blink = item.life < 2 ? (Math.floor(gameTime * 6) % 2 === 0) : true;
                if (!blink) return;

                ctx.shadowBlur = 12;
                ctx.shadowColor = t.glow;

                if (item.type === 'cherry') {
                    // Two red circles with stems
                    var r = 5 * pulse;
                    ctx.fillStyle = '#ff2266';
                    ctx.beginPath(); ctx.arc(px - 3, py + 2, r, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(px + 4, py + 2, r, 0, Math.PI * 2); ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.strokeStyle = '#2a6e0a';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.moveTo(px - 3, py - 3); ctx.quadraticCurveTo(px, py - 10 * pulse, px + 4, py - 3); ctx.stroke();
                    // Leaf
                    ctx.fillStyle = '#2a6e0a';
                    ctx.beginPath(); ctx.ellipse(px + 1, py - 8 * pulse, 3, 1.5, 0.3, 0, Math.PI * 2); ctx.fill();
                }
                else if (item.type === 'strawberry') {
                    // Strawberry shape
                    ctx.fillStyle = '#ff4488';
                    ctx.beginPath();
                    ctx.moveTo(px, py - 7 * pulse);
                    ctx.quadraticCurveTo(px + 8 * pulse, py - 2, px, py + 8 * pulse);
                    ctx.quadraticCurveTo(px - 8 * pulse, py - 2, px, py - 7 * pulse);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    // Seeds
                    ctx.fillStyle = '#ffee88';
                    for (var s = 0; s < 3; s++) {
                        ctx.beginPath();
                        ctx.arc(px + (s - 1) * 3, py + s * 2, 1, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    // Leaves
                    ctx.fillStyle = '#2a6e0a';
                    ctx.beginPath(); ctx.ellipse(px - 3, py - 7 * pulse, 4, 2, -0.4, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.ellipse(px + 3, py - 7 * pulse, 4, 2, 0.4, 0, Math.PI * 2); ctx.fill();
                }
                else if (item.type === 'diamond') {
                    // Rotating diamond
                    var angle = gameTime * 3;
                    ctx.fillStyle = '#00ffff';
                    ctx.save();
                    ctx.translate(px, py);
                    ctx.rotate(angle);
                    var sz = 7 * pulse;
                    ctx.beginPath();
                    ctx.moveTo(0, -sz); ctx.lineTo(sz, 0); ctx.lineTo(0, sz); ctx.lineTo(-sz, 0);
                    ctx.closePath();
                    ctx.fill();
                    // Inner shine
                    ctx.fillStyle = 'rgba(255,255,255,0.5)';
                    ctx.beginPath();
                    ctx.moveTo(0, -sz * 0.5); ctx.lineTo(sz * 0.5, 0); ctx.lineTo(0, sz * 0.5); ctx.lineTo(-sz * 0.5, 0);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
                else if (item.type === 'lightning') {
                    // Lightning bolt
                    ctx.fillStyle = '#ffee00';
                    ctx.save();
                    ctx.translate(px, py);
                    var s = pulse;
                    ctx.beginPath();
                    ctx.moveTo(-2 * s, -8 * s); ctx.lineTo(3 * s, -2 * s); ctx.lineTo(0, -1 * s);
                    ctx.lineTo(4 * s, 8 * s); ctx.lineTo(-1 * s, 1 * s); ctx.lineTo(1 * s, 2 * s);
                    ctx.lineTo(-4 * s, -8 * s);
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                }
                else if (item.type === 'shield') {
                    // Shield icon
                    ctx.fillStyle = '#4488ff';
                    ctx.save();
                    ctx.translate(px, py);
                    var s = pulse;
                    ctx.beginPath();
                    ctx.moveTo(0, -8 * s);
                    ctx.quadraticCurveTo(8 * s, -6 * s, 7 * s, 0);
                    ctx.quadraticCurveTo(6 * s, 6 * s, 0, 9 * s);
                    ctx.quadraticCurveTo(-6 * s, 6 * s, -7 * s, 0);
                    ctx.quadraticCurveTo(-8 * s, -6 * s, 0, -8 * s);
                    ctx.fill();
                    // Inner cross/star
                    ctx.fillStyle = 'rgba(255,255,255,0.6)';
                    ctx.fillRect(-1, -4 * s, 2, 6 * s);
                    ctx.fillRect(-3 * s, -1, 6 * s, 2);
                    ctx.restore();
                }
                ctx.shadowBlur = 0;
            });
        }

        function drawActiveEffects() {
            var y = OFFSET_Y + GRID_H + 18;

        // === Home Screen ===
        function drawHomeScreen(dt) {
            titleTimer += dt;

            var bgG = ctx.createLinearGradient(0, 0, 0, H);
            bgG.addColorStop(0, '#000a05');
            bgG.addColorStop(0.5, '#000a10');
            bgG.addColorStop(1, '#050505');
            ctx.fillStyle = bgG;
            ctx.fillRect(0, 0, W, H);

            // Animated snake slithering around edges
            var edgeLen = 2 * (W + H);
            var snakeLen = 25;
            var snakeSpeed = 80;
            var headPos = ((titleTimer * snakeSpeed) % edgeLen + edgeLen) % edgeLen;

            function edgePosToXY(pos) {
                pos = ((pos % edgeLen) + edgeLen) % edgeLen;
                if (pos < W) return {x: pos, y: 8};
                pos -= W;
                if (pos < H) return {x: W - 8, y: pos};
                pos -= H;
                if (pos < W) return {x: W - pos, y: H - 8};
                pos -= W;
                return {x: 8, y: H - pos};
            }

            for (var i = 0; i < snakeLen; i++) {
                var seg = edgePosToXY(headPos - i * 8);
                var alpha = 1 - i / snakeLen;
                var isHead = (i === 0);
                ctx.fillStyle = isHead ? '#6eff6e' : '#4ae04a';
                ctx.globalAlpha = alpha * 0.8;
                ctx.shadowBlur = isHead ? 8 : 3;
                ctx.shadowColor = '#4ae04a';
                ctx.fillRect(seg.x - 5, seg.y - 5, 10, 10);
                ctx.shadowBlur = 0;

            var itemsRow2 = [
                { color: '#00ffff', glow: '#00ffff', label: '100', x: -90 },
                { color: '#ffee00', glow: '#ffee00', label: '2x', x: -10 },
                { color: '#4488ff', glow: '#4488ff', label: 'INV', x: 70 }
            ];

            itemsRow1.forEach(function(item) {
                ctx.fillStyle = item.color;
                ctx.shadowBlur = 4; ctx.shadowColor = item.glow;
                ctx.beginPath(); ctx.arc(W / 2 + item.x, 506, 4, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#aaa'; ctx.font = '10px Courier';
                ctx.fillText(item.label, W / 2 + item.x + 22, 510);
            });
            itemsRow2.forEach(function(item) {
                ctx.fillStyle = item.color;
                ctx.shadowBlur = 4; ctx.shadowColor = item.glow;
                ctx.beginPath(); ctx.arc(W / 2 + item.x, 524, 4, 0, Math.PI * 2); ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#aaa'; ctx.font = '10px Courier';
                ctx.fillText(item.label, W / 2 + item.x + 22, 528);
            });

            // Bottom text
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Courier';
            ctx.fillText(state === 'START' ? "EAT TO GROW!" : "GAME OVER", W / 2, 555);
            ctx.font = '12px Courier';
            ctx.fillStyle = '#888';
            ctx.fillText("SPACE: START | P: PAUSE | A: AI | S: SOUND | ESC: MENU", W / 2, 575);
            ctx.fillText("ARROW KEYS TO MOVE", W / 2, 592);
        }

        // === Difficulty click ===
        canvas.addEventListener('click', function(e) {
            if (state !== 'START' && state !== 'OVER') return;
            ensureAudio();
            playMusic('home');
            var rect = canvas.getBoundingClientRect();
            var scaleX = W / rect.width;
            var scaleY = H / rect.height;
            var mx = (e.clientX - rect.left) * scaleX;
            var my = (e.clientY - rect.top) * scaleY;
            var dBtnW = 100, dBtnH = 30, dBtnGap = 12;
            var dTotalW = 3 * dBtnW + 2 * dBtnGap;
            var dBtnStartX = (W - dTotalW) / 2;
            var dBtnY = 418;
            for (var d = 0; d < 3; d++) {
                var bx = dBtnStartX + d * (dBtnW + dBtnGap);
                if (mx >= bx && mx <= bx + dBtnW && my >= dBtnY && my <= dBtnY + dBtnH) {
                    difficulty = d;
                }
            }
        });

        // === Main Loop ===
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            var rawDt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            var dt = Math.min(rawDt, 0.05);

            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            if (state === 'START' || state === 'OVER') {
                drawHomeScreen(dt);
                requestAnimationFrame(loop);
                return;
            }

            if (paused) {
                drawGrid();
                drawBorder();
                drawWalls();
                drawSnake();
                drawFood();
                drawBonusFood();
                drawSpecialItems();
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 40px Courier';
                ctx.fillText("PAUSED", W / 2, H / 2 - 10);
                ctx.font = '16px Courier';
                ctx.fillStyle = '#fff';
                ctx.fillText("PRESS P OR CLICK RESUME", W / 2, H / 2 + 25);
                requestAnimationFrame(loop);
                return;
            }

            gameTime += dt;

            // Death animation
            if (deathTimer > 0) {
                deathTimer -= dt;
                drawGrid();
                drawBorder();
                drawWalls();
                drawFood();
                drawSpecialItems();
                drawSnake();

                // Particles
                particles.forEach(function(p) {
                    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                    if (p.life > 0) {
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.fillRect(p.x, p.y, p.size, p.size);
                    }
                });
                particles = particles.filter(function(p) { return p.life > 0; });
                ctx.globalAlpha = 1;

                if (deathTimer <= 0) {
                    state = 'OVER';
                    titleTimer = 0;
                    stopMusic();
                    sfxGameOver();
                    gameOverTimeoutId = setTimeout(function() {
                        if (state !== 'OVER') return;
                        if (!aiMode && score > 0 && (highScores.length < 10 || score > highScores[highScores.length - 1].s)) {
                            stopMusic();
                            var n = prompt("LEGENDARY SCORE! Enter Initials:", "ACE");
                            if (n) {
                                highScores.push({ n: n.substring(0, 3).toUpperCase(), s: score });
                                highScores.sort(function(a, b) { return b.s - a.s; });
                                highScores = highScores.slice(0, 10);
                                localStorage.setItem('snake_deluxe_scores', JSON.stringify(highScores));
                            }
                        }
                        playMusic('home');
                    }, 1000);
                }
                updateHUD();
                requestAnimationFrame(loop);
                return;
            }

            if (aiMode) runAI();

            // === Move snake ===
            moveTimer += dt;
            if (moveTimer >= moveInterval) {
                moveTimer -= moveInterval;

                // Process direction queue
                if (dirQueue.length > 0) {
                    var nd = dirQueue.shift();
                    if (nd.x !== -dir.x || nd.y !== -dir.y) {
                        nextDir = nd;
                    }
                }
                dir = {x: nextDir.x, y: nextDir.y};

                var head = snake[0];
                var nx = head.x + dir.x;
                var ny = head.y + dir.y;

                // Wrap passable edges: Easy=all, Medium=sides only, Hard=none
                var sidesWrap = difficulty <= 1;
                var topBotWrap = difficulty === 0;
                if (sidesWrap && (nx < 0 || nx >= COLS)) {
                    nx = ((nx % COLS) + COLS) % COLS;
                }
                if (topBotWrap && (ny < 0 || ny >= ROWS)) {
                    ny = ((ny % ROWS) + ROWS) % ROWS;
                }

                // Check wall collision on non-wrappable edges
                if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) {
                    // Die
                    var hp = cellToPixel(head.x, head.y);
                    spawnExplosion(hp.x + CELL / 2, hp.y + CELL / 2, aiMode ? '#00ccff' : '#4ae04a', 30);
                    sfxDie();
                    deathTimer = 1.0;
                    updateHUD();
                    requestAnimationFrame(loop);
                    return;
                }

                // Check wall obstacle collision
                if (isWall(nx, ny)) {
                    var hp = cellToPixel(head.x, head.y);
                    spawnExplosion(hp.x + CELL / 2, hp.y + CELL / 2, aiMode ? '#00ccff' : '#4ae04a', 30);
                    sfxDie();
                    deathTimer = 1.0;
                    updateHUD();
                    requestAnimationFrame(loop);
                    return;
                }

                // Check self collision (excluding tail since it will move)
                if (!hasShield()) {
                    for (var si = 0; si < snake.length - 1; si++) {
                        if (snake[si].x === nx && snake[si].y === ny) {
                            var hp = cellToPixel(head.x, head.y);
                            spawnExplosion(hp.x + CELL / 2, hp.y + CELL / 2, aiMode ? '#00ccff' : '#4ae04a', 30);
                            sfxDie();
                            deathTimer = 1.0;
                            updateHUD();
                            requestAnimationFrame(loop);
                            return;
                        }
                    }
                }

                // Move
                snake.unshift({x: nx, y: ny});
                var ate = false;

                // Check food
                if (food && nx === food.x && ny === food.y) {
                    score += 10 * level * getScoreMultiplier();
                    foodEaten++;
                    ate = true;
                    var fp = cellToPixel(food.x, food.y);
                    spawnSparkle(fp.x + CELL / 2, fp.y + CELL / 2, '#ff3333', 8);
                    var foodPts = 10 * level * getScoreMultiplier();
                    floatingTexts.push({x: fp.x + CELL / 2, y: fp.y, t: '+' + foodPts, life: 0.8, c: '#ff3333'});
                    sfxEat();
                    spawnFood();

                    // Level up every 10 food
                    if (foodEaten % 10 === 0) {
                        level++;
                        moveInterval = Math.max(0.04, DIFF_SPEEDS[difficulty] - (level - 1) * 0.005);
                        floatingTexts.push({x: W / 2, y: H / 2, t: 'LEVEL UP!', life: 1.5, c: '#4ae04a'});
                        sfxLevelUp();
                        generateWalls();
                        if (bonusFood && isWall(bonusFood.x, bonusFood.y)) {
                            bonusFood = null;
                        }
                        ensureFoodReachable();
                    }
                }

                // Check bonus food
                if (bonusFood && nx === bonusFood.x && ny === bonusFood.y) {
                    var bonusPts = 50 * level * getScoreMultiplier();
                    score += bonusPts;
                    ate = true;
                    var bp = cellToPixel(bonusFood.x, bonusFood.y);
                    spawnSparkle(bp.x + CELL / 2, bp.y + CELL / 2, '#ffd700', 15);
                    floatingTexts.push({x: bp.x + CELL / 2, y: bp.y, t: '+' + bonusPts, life: 1.0, c: '#ffd700'});
                    sfxBonusEat();
                    bonusFood = null;
                }

                // Check special items
                for (var si = specialItems.length - 1; si >= 0; si--) {
                    var item = specialItems[si];
                    if (nx === item.x && ny === item.y) {
                        var t = ITEM_TYPES[item.type];
                        var pts = t.points * level * getScoreMultiplier();
                        score += pts;
                        ate = true;
                        var ip = cellToPixel(item.x, item.y);
                        spawnSparkle(ip.x + CELL / 2, ip.y + CELL / 2, t.color, 12);
                        floatingTexts.push({x: ip.x + CELL / 2, y: ip.y, t: '+' + pts + ' ' + t.label, life: 1.2, c: t.color});
                        // Play sound
                        if (item.type === 'cherry') sfxCherry();
                        else if (item.type === 'strawberry') sfxStrawberry();
                        else if (item.type === 'diamond') sfxDiamond();
                        else sfxPowerup();
                        // Apply effect
                        if (t.effect) {
                            activeEffects[t.effect] = t.duration;
                            floatingTexts.push({x: W / 2, y: H / 2 - 30, t: t.label + ' ACTIVE!', life: 1.5, c: t.color});
                        }
                        specialItems.splice(si, 1);
                    }
                }

                if (!ate) {
                    snake.pop();
                }
            }

            // Bonus food timer
            if (!bonusFood) {
                bonusTimer -= dt;
                if (bonusTimer <= 0) {
                    spawnBonusFood();
                    bonusTimer = 12 + Math.random() * 10;
                }
            } else {
                bonusFood.life -= dt;
                if (bonusFood.life <= 0) {
                    bonusFood = null;
                }
            }

            // Special item timers
            Object.keys(ITEM_TYPES).forEach(function(type) {
                if (specialTimers[type] !== undefined) {
                    specialTimers[type] -= dt;
                    if (specialTimers[type] <= 0) {
                        spawnSpecialItem(type);
                        var t = ITEM_TYPES[type];
                        specialTimers[type] = t.spawnMin + Math.random() * (t.spawnMax - t.spawnMin);
                    }
                }
            });
            // Decay special item lifetimes
            for (var si = specialItems.length - 1; si >= 0; si--) {
                specialItems[si].life -= dt;
                if (specialItems[si].life <= 0) specialItems.splice(si, 1);
            }

            // Decay active effects
            Object.keys(activeEffects).forEach(function(eff) {
                if (activeEffects[eff] > 0) {
                    activeEffects[eff] -= dt;
                    if (activeEffects[eff] <= 0) activeEffects[eff] = 0;
                }
            });

            // === Draw ===
            drawGrid();
            drawBorder();
            drawWalls();
            drawFood();
            drawBonusFood();
            drawSpecialItems();
            drawSnake();
            drawActiveEffects();

            // Particles
            particles.forEach(function(p) {
                p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                if (p.life > 0) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
            });
            particles = particles.filter(function(p) { return p.life > 0; });
            ctx.globalAlpha = 1;

            // Floating texts
            floatingTexts = floatingTexts.filter(function(vt) {
                vt.y -= 40 * dt;
                vt.life -= dt * 0.8;
                ctx.globalAlpha = Math.max(0, vt.life);
                ctx.fillStyle = vt.c;
                ctx.font = 'bold 18px Courier';
                ctx.textAlign = 'center';
                ctx.fillText(vt.t, vt.x, vt.y);
                return vt.life > 0;
            });
            ctx.globalAlpha = 1;

            updateHUD();
            requestAnimationFrame(loop);
        }

        // === Controls ===
        btn.onclick = function() {
            haptic(30);
            ensureAudio();
            startGame();
        };

        aiBtn.onclick = function() {
            haptic(30);
            aiMode = !aiMode;
            aiBtn.innerText = aiMode ? "AI: ON" : "AI: OFF";
            aiBtn.className = aiMode ? "ai-active" : "";
            canvas.focus();
        };

        pauseBtn.onclick = function() {
            haptic(30);
            if (state !== 'PLAY' || deathTimer > 0) return;
            paused = !paused;
            pauseBtn.className = paused ? "pause-active" : "";
            pauseBtn.innerText = paused ? "RESUME" : "PAUSE";
            if (!paused) lastTime = performance.now();
        };

        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (state === 'START' || state === 'OVER') { setTimeout(function() { window.location.href = 'index.html'; }, 0); return; }
                if (paused) pauseBtn.click();
                else if (state === 'PLAY') pauseBtn.click();
                return;
            }
            if (state === 'START' || state === 'OVER') {
                if (e.key === ' ') { e.preventDefault(); btn.click(); return; }
                if (e.key === 'e' || e.key === 'E') { difficulty = 0; return; }
                if (e.key === 'm' || e.key === 'M') { difficulty = 1; return; }
                if (e.key === 'h' || e.key === 'H') { difficulty = 2; return; }
                if (e.key === 'a' || e.key === 'A') { aiBtn.click(); return; }
                if (e.key === 's' || e.key === 'S') { muteBtn.click(); return; }
                if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); return; }
                return;
            }
            if (e.key === 'a' || e.key === 'A') { aiBtn.click(); return; }
            if (e.key === 's' || e.key === 'S') { muteBtn.click(); return; }
            if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); return; }
            if (state !== 'PLAY' || paused || aiMode) return;

            var newDir = null;
            if (e.key === 'ArrowUp') { e.preventDefault(); newDir = {x: 0, y: -1}; }
            else if (e.key === 'ArrowDown') { e.preventDefault(); newDir = {x: 0, y: 1}; }
            else if (e.key === 'ArrowLeft') { e.preventDefault(); newDir = {x: -1, y: 0}; }
            else if (e.key === 'ArrowRight') { e.preventDefault(); newDir = {x: 1, y: 0}; }

            if (newDir) {
                // Prevent reversing into self
                var checkDir = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : dir;
                if (newDir.x !== -checkDir.x || newDir.y !== -checkDir.y) {
                    if (dirQueue.length < 3) {
                        dirQueue.push(newDir);
                    }
                }
            }
        });

        // === Touch / Swipe ===
        var touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            // Difficulty button hit-testing on touch devices
            if (state === 'START' || state === 'OVER') {
                ensureAudio();
                playMusic('home');
                var rect = canvas.getBoundingClientRect();
                var scaleX = W / rect.width;
                var scaleY = H / rect.height;
                var mx = (e.touches[0].clientX - rect.left) * scaleX;
                var my = (e.touches[0].clientY - rect.top) * scaleY;
                var dBtnW = 100, dBtnH = 30, dBtnGap = 12;
                var dTotalW = 3 * dBtnW + 2 * dBtnGap;
                var dBtnStartX = (W - dTotalW) / 2;
                var dBtnY = 418;
                for (var d = 0; d < 3; d++) {
                    var bx = dBtnStartX + d * (dBtnW + dBtnGap);
                    if (mx >= bx && mx <= bx + dBtnW && my >= dBtnY && my <= dBtnY + dBtnH) {
                        difficulty = d;
                    }
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            if (state !== 'PLAY' || paused || aiMode) return;
            var endX = e.changedTouches[0].clientX;
            var endY = e.changedTouches[0].clientY;
            var dx = endX - touchStartX;
            var dy = endY - touchStartY;
            var minSwipe = 20;
            if (Math.abs(dx) < minSwipe && Math.abs(dy) < minSwipe) return;

            var newDir = null;
            if (Math.abs(dx) > Math.abs(dy)) {
                newDir = dx > 0 ? {x: 1, y: 0} : {x: -1, y: 0};
            } else {
                newDir = dy > 0 ? {x: 0, y: 1} : {x: 0, y: -1};
            }
            if (newDir) {
                var checkDir = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : dir;
                if (newDir.x !== -checkDir.x || newDir.y !== -checkDir.y) {
                    if (dirQueue.length < 3) dirQueue.push(newDir);
                }
            }
        }, { passive: false });

        // D-pad
        var dUp = document.getElementById('d-up');
        var dDown = document.getElementById('d-down');
        var dLeft = document.getElementById('d-left');
        var dRight = document.getElementById('d-right');

        function dpadHandler(newDir) {
            return function(e) {
                e.preventDefault();
                haptic(50);
                if (state !== 'PLAY' || paused || aiMode) return;
                var checkDir = dirQueue.length > 0 ? dirQueue[dirQueue.length - 1] : dir;
                if (newDir.x !== -checkDir.x || newDir.y !== -checkDir.y) {
                    if (dirQueue.length < 3) dirQueue.push({x: newDir.x, y: newDir.y});
                }
            };
        }

        if (dUp) dUp.addEventListener('touchstart', dpadHandler({x: 0, y: -1}));
        if (dDown) dDown.addEventListener('touchstart', dpadHandler({x: 0, y: 1}));
        if (dLeft) dLeft.addEventListener('touchstart', dpadHandler({x: -1, y: 0}));
        if (dRight) dRight.addEventListener('touchstart', dpadHandler({x: 1, y: 0}));

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopMusic();
            } else {
                if (state === 'START' || state === 'OVER') playMusic('home');
                else if (state === 'PLAY' && !paused) playMusic('game');
            }
        });

        // Start home music
        function startHomeMusic() {
            ensureAudio();
            function play() {
                if (!muted && (state === 'START' || state === 'OVER')) { currentTrack = null; playMusic('home'); }
                document.removeEventListener('click', startHomeMusic);
                document.removeEventListener('keydown', startHomeMusic);
                document.removeEventListener('touchstart', startHomeMusic);
            }
            if (audioCtx.state === 'suspended') { audioCtx.resume().then(play); }
            else { play(); }
        }
        document.addEventListener('click', startHomeMusic);
        document.addEventListener('keydown', startHomeMusic);
        document.addEventListener('touchstart', startHomeMusic);
        startHomeMusic();

        var _tOv = document.getElementById('transition-overlay');
        if (_tOv) { setTimeout(function(){ _tOv.style.opacity='0'; setTimeout(function(){ _tOv.remove(); }, 500); }, 50); }

        requestAnimationFrame(loop);
    })();
    </script>
</body>
