<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffcc00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Gorillas</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23111'/%3E%3Crect x='4' y='3' width='24' height='18' rx='2' fill='%23000' stroke='%2300e5ff' stroke-width='1.5'/%3E%3Crect x='8' y='6' width='16' height='12' rx='1' fill='%23001a2e'/%3E%3Ccircle cx='10' cy='10' r='1.5' fill='%234ae04a'/%3E%3Ccircle cx='14' cy='8' r='1.5' fill='%23ffff00'/%3E%3Ccircle cx='18' cy='11' r='1.5' fill='%23ff4444'/%3E%3Ccircle cx='22' cy='9' r='1.5' fill='%2300e5ff'/%3E%3Crect x='8' y='24' width='4' height='5' rx='1' fill='%23ff4444'/%3E%3Crect x='14' y='24' width='4' height='5' rx='1' fill='%234ae04a'/%3E%3Ccircle cx='27' cy='26' r='2.5' fill='%23ffaa00'/%3E%3C/svg%3E">
    <style>
        body { background: #050505; color: #ffcc00; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; margin: 0; padding: 10px; box-sizing: border-box; overflow: auto; user-select: none; touch-action: manipulation; }
        .stats { margin-bottom: 10px; font-size: 22px; display: flex; gap: 30px; font-weight: bold; text-shadow: 2px 2px #000; flex-wrap: wrap; justify-content: center; }
        #s1, #s2, #wind { color: #fff; }
        #game-wrapper { position: relative; border: 4px solid #333; box-shadow: 0 0 50px rgba(255, 204, 0, 0.15); border-radius: 8px; overflow: hidden; touch-action: none; max-width: 560px; width: 100%; }
        canvas { display: block; background: #000; cursor: default; width: 100%; height: auto; }
        .controls { display: flex; gap: 15px; margin-top: 15px; z-index: 10; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 25px; font-size: 16px; font-family: inherit; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; transition: 0.2s; text-transform: uppercase; }
        #b { background: linear-gradient(180deg, #ffcc00, #cc9900); color: #000; box-shadow: 0 4px 0 #886600; }
        #ai-btn { background: #222; color: #00ccff; border: 2px solid #00ccff; box-shadow: 0 0 10px rgba(0, 204, 255, 0.3); }
        #pause-btn { background: #222; color: #ffaa00; border: 2px solid #ffaa00; box-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }
        button:active { transform: translateY(3px); box-shadow: none; }
        .ai-active { background: #00ccff !important; color: #000 !important; box-shadow: 0 0 20px #00ccff !important; }
        .pause-active { background: #ffaa00 !important; color: #000 !important; box-shadow: 0 0 20px #ffaa00 !important; }
        .touch-controls { display: none; margin-top: 30px; width: 100%; max-width: 560px; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; }
        @media (pointer: coarse) { .touch-controls { display: flex; } }
        .joystick-area { position: relative; width: 130px; height: 130px; touch-action: none; flex-shrink: 0; }
        .joystick-base { position: absolute; top: 0; left: 0; width: 130px; height: 130px; border-radius: 50%; background: rgba(255, 204, 0, 0.08); border: 2px solid rgba(255, 204, 0, 0.25); }
        .joystick-knob { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 40% 38%, rgba(255, 204, 0, 0.45), rgba(255, 204, 0, 0.18)); border: 2px solid rgba(255, 204, 0, 0.5); transition: top 0.08s, left 0.08s; pointer-events: none; }
        .joystick-dir { position: absolute; font-size: 14px; color: rgba(255, 204, 0, 0.3); pointer-events: none; font-family: 'Courier New', monospace; font-weight: bold; }
        .joystick-dir.up { top: 4px; left: 50%; transform: translateX(-50%); }
        .joystick-dir.down { bottom: 4px; left: 50%; transform: translateX(-50%); }
        .joystick-dir.left { left: 8px; top: 50%; transform: translateY(-50%); }
        .joystick-dir.right { right: 8px; top: 50%; transform: translateY(-50%); }
        .fire-btn { width: 80px; height: 80px; border-radius: 50%; background: rgba(255, 204, 0, 0.15); border: 3px solid rgba(255, 204, 0, 0.5); color: rgba(255, 204, 0, 0.8); font-family: 'Courier New', monospace; font-weight: bold; font-size: 14px; cursor: pointer; touch-action: none; flex-shrink: 0; text-transform: uppercase; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
        .fire-btn:active { background: rgba(255, 204, 0, 0.4); }
        @media (max-width: 580px) { .stats { font-size: 14px; gap: 10px; } .controls { display: flex; gap: 4px; margin-top: 8px; width: 100%; flex-wrap: nowrap; } .controls button, .controls a { padding: 8px 2px !important; font-size: 11px !important; text-align: center; box-sizing: border-box; flex: 1; min-width: 0; } }
        #transition-overlay { position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;opacity:1;pointer-events:none;background:repeating-linear-gradient(0deg,#000 0px,#000 2px,rgba(0,0,0,0.85) 2px,rgba(0,0,0,0.85) 4px);transition:opacity 0.4s; }
    </style>
</head>
<body>
    <div id="transition-overlay"></div>

    <div class="stats">
        <div>P1: <span id="s1">0</span></div>
        <div>WIND: <span id="wind">--</span></div>
        <div>P2: <span id="s2">0</span></div>
    </div>

    <div id="game-wrapper">
        <canvas id="c" width="560" height="600"></canvas>
    </div>

    <div class="controls">
        <button id="b">START</button>
        <button id="pause-btn">PAUSE</button>
        <button id="ai-btn">AI: OFF</button>
        <button id="mute-btn" style="background:#222;color:#0ff;border:2px solid #0ff;line-height:0;padding:6px;"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16,7.5 Q21,12 16,16.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        <a id="menu-btn" href="index.html" style="padding: 12px 25px; font-size: 16px; font-family: 'Courier New', Courier, monospace; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; text-transform: uppercase; background: #222; color: #fff; border: 2px solid #fff; text-decoration: none; display: inline-block; transition: 0.2s;">MENU</a>
    </div>

    <div class="touch-controls">
        <div class="joystick-area" id="joystick">
            <div class="joystick-base"></div>
            <div class="joystick-knob" id="joystick-knob"></div>
            <div class="joystick-dir up">&#9650;</div>
            <div class="joystick-dir down">&#9660;</div>
            <div class="joystick-dir left">&#9664;</div>
            <div class="joystick-dir right">&#9654;</div>
        </div>
        <button class="fire-btn" id="fire-btn">THROW</button>
    </div>

    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
    <script>
    (function() {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('b');
        const aiBtn = document.getElementById('ai-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const menuBtn = document.getElementById('menu-btn');
        let muted = localStorage.getItem('arcade_muted') === 'true';
        const muteBtn = document.getElementById('mute-btn');
        const _spkOn = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16,7.5 Q21,12 16,16.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        const _spkOff = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="15" y1="9" x2="21" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="21" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        muteBtn.innerHTML = muted ? _spkOff : _spkOn;
        muteBtn.onclick = () => { haptic(30); muted = !muted; localStorage.setItem('arcade_muted', muted); muteBtn.innerHTML = muted ? _spkOff : _spkOn; if (muted) stopMusic(); else { currentTrack = null; if (state === 'START' || state === 'OVER') playMusic('home'); else if (state === 'PLAY' && !paused) playMusic('game'); } };
        function haptic(ms) { try { if (navigator.vibrate) navigator.vibrate(ms || 50); } catch(e) {} }

        const W = 560, H = 600;
        canvas.width = W;
        canvas.height = H;

        let state = 'START', aiMode = false, paused = false;
        let lastTime = performance.now(), gameTime = 0;
        let floatingTexts = [], particles = [], stars = [];
        let highScores;
        try { const p = JSON.parse(localStorage.getItem('gorillas_deluxe_scores')); highScores = Array.isArray(p) ? p : [{n:'CPU', s:3}]; } catch(e) { highScores = [{n:'CPU', s:3}]; }
        highScores = highScores.slice(0, 10);

        let titleTimer = 0;

        // Game constants
        const GRAVITY = 9.8 * 30; // pixels/s^2
        const GROUND_Y = 570;
        const SKY_TOP = 40;
        const WIN_SCORE = 3;
        const GORILLA_W = 28;
        const GORILLA_H = 30;
        const BANANA_R = 5;
        const EXPLOSION_R = 28;

        // Game state
        let p1Score = 0, p2Score = 0;
        let buildings = [];
        let buildingDamage = []; // offscreen canvas for damage
        let damageCtx = null;
        let gorillas = [{x:0, y:0}, {x:0, y:0}]; // positions (center-bottom)
        let currentPlayer = 0; // 0 = P1, 1 = P2
        let angle = 45, velocity = 60;
        let banana = null; // {x, y, vx, vy, rotation}
        let wind = 0; // pixels/s^2 horizontal acceleration
        let explosions = []; // visual explosions
        let turnPhase = 'INPUT'; // 'INPUT', 'FLYING', 'EXPLODING', 'CELEBRATE', 'NEXT_ROUND', 'GAME_OVER'
        let phaseTimer = 0;
        let gorillaAnim = [0, 0]; // animation frame for each gorilla
        let gorillaAnimTimer = [0, 0];
        let sunSurprised = false;
        let sunSurprisedTimer = 0;

        // AI state
        let aiThinking = false;
        let aiThinkTimer = 0;
        let attractMode = false;

        // Difficulty
        let difficulty = 1;
        const DIFF_NAMES = ['E: EASY', 'M: MEDIUM', 'H: HARD'];
        const DIFF_COLORS = ['#4ae04a', '#ffaa00', '#ff3333'];
        const DIFF_AI_ERROR = [25, 12, 4]; // angle/velocity random error

        let keys = {};

        // Stars
        function initStars() {
            stars = [];
            for (let i = 0; i < 60; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * (GROUND_Y * 0.4),
                    s: Math.random() * 1.5 + 0.5,
                    b: Math.random(),
                    speed: Math.random() * 0.5 + 0.5
                });
            }
        }
        initStars();

        // === Sound Engine ===
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

        function playTone(freq, duration, type, vol, isMusic) {
            if (muted) return;
            if (type === undefined) type = 'square';
            if (vol === undefined) vol = 0.12;
            ensureAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            if (isMusic) musicOscs.push(osc);
            osc.onended = () => { osc.disconnect(); gain.disconnect(); if (isMusic) { const idx = musicOscs.indexOf(osc); if (idx !== -1) musicOscs.splice(idx, 1); } };
        }

        function sfxThrow() {
            playTone(300, 0.06, 'sawtooth', 0.08);
            setTimeout(() => playTone(500, 0.08, 'sawtooth', 0.06), 30);
            setTimeout(() => playTone(700, 0.06, 'sawtooth', 0.05), 60);
        }
        function sfxWhistle() {
            playTone(900 + Math.random() * 200, 0.04, 'sine', 0.02);
        }
        function sfxBuildingHit() {
            playTone(100, 0.3, 'sawtooth', 0.13);
            playTone(70, 0.4, 'sawtooth', 0.1);
            setTimeout(() => playTone(50, 0.3, 'sawtooth', 0.07), 80);
        }
        function sfxGorillaHit() {
            playTone(80, 0.5, 'sawtooth', 0.15);
            playTone(60, 0.6, 'sawtooth', 0.12);
            setTimeout(() => {
                [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 0.15, 'square', 0.08), i * 80));
            }, 200);
        }
        function sfxVictory() {
            [392, 494, 587, 784, 988, 1175].forEach((f, i) => setTimeout(() => playTone(f, 0.2, 'square', 0.1), i * 100));
            setTimeout(() => {
                [1175, 988, 1175].forEach((f, i) => setTimeout(() => playTone(f, 0.15, 'triangle', 0.08), i * 120));
            }, 700);
        }
        function sfxGameOver() {
            [494, 440, 392, 330, 294, 262].forEach((f, i) => setTimeout(() => playTone(f, 0.22, 'triangle', 0.09), i * 130));
        }
        function sfxMiss() {
            playTone(200, 0.1, 'triangle', 0.04);
        }

        // === Music Engine ===
        let musicInterval = null;
        let currentTrack = null;
        let musicOscs = [];

        function stopMusic() {
            if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
            musicOscs.forEach(osc => { try { osc.stop(); osc.disconnect(); } catch(e) {} });
            musicOscs = [];
            currentTrack = null;
        }

        function playMusic(track) {
            if (currentTrack === track) return;
            stopMusic();
            currentTrack = track;
            if (muted) return;
            ensureAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();

            // Home: playful, bouncy 8-bit tune
            const homeMelody = [
                392, 0, 440, 0, 494, 0, 523, 0,
                587, 0, 523, 0, 494, 0, 440, 0,
                392, 0, 0, 0, 330, 0, 0, 0,
                294, 0, 330, 0, 392, 0, 440, 0,
                494, 0, 523, 0, 587, 0, 659, 0,
                784, 0, 659, 0, 587, 0, 523, 0,
                494, 0, 440, 0, 392, 0, 0, 0,
                330, 294, 330, 0, 392, 0, 0, 0
            ];
            const homeBass = [
                196, 0, 0, 0, 0, 0, 0, 0,
                294, 0, 0, 0, 0, 0, 0, 0,
                196, 0, 0, 0, 165, 0, 0, 0,
                147, 0, 0, 0, 196, 0, 0, 0,
                247, 0, 0, 0, 0, 0, 0, 0,
                392, 0, 0, 0, 294, 0, 0, 0,
                247, 0, 0, 0, 196, 0, 0, 0,
                165, 0, 0, 0, 196, 0, 0, 0
            ];
            // Game: cheerful, anticipatory
            const gameMelody = [
                523, 0, 0, 0, 494, 0, 0, 0,
                440, 0, 494, 0, 523, 0, 0, 0,
                587, 0, 0, 0, 523, 0, 494, 0,
                440, 0, 0, 0, 0, 0, 0, 0,
                392, 0, 440, 0, 494, 0, 523, 0,
                587, 0, 659, 0, 587, 0, 523, 0,
                494, 0, 0, 0, 440, 0, 0, 0,
                392, 0, 0, 0, 0, 0, 0, 0
            ];
            const gameBass = [
                262, 0, 0, 0, 247, 0, 0, 0,
                220, 0, 0, 0, 262, 0, 0, 0,
                294, 0, 0, 0, 262, 0, 0, 0,
                220, 0, 0, 0, 0, 0, 0, 0,
                196, 0, 0, 0, 247, 0, 0, 0,
                294, 0, 0, 0, 294, 0, 0, 0,
                247, 0, 0, 0, 220, 0, 0, 0,
                196, 0, 0, 0, 0, 0, 0, 0
            ];

            const melody = track === 'home' ? homeMelody : gameMelody;
            const bass = track === 'home' ? homeBass : gameBass;
            const tempo = track === 'home' ? 160 : 140;
            const melVol = 0.05;
            const bassVol = 0.03;
            const stepMs = 60000 / tempo;
            let step = 0;

            musicInterval = setInterval(() => {
                if (paused) return;
                const note = melody[step % melody.length];
                const bn = bass[step % bass.length];
                if (note > 0) playTone(note, stepMs / 1000 * 0.9, 'triangle', melVol, true);
                if (bn > 0) playTone(bn, stepMs / 1000 * 0.9, 'triangle', bassVol, true);
                step++;
            }, stepMs);
        }

        // === Building Generation ===
        const BUILDING_COLORS = ['#660000', '#004466', '#444400', '#660044', '#003333', '#333366', '#553300', '#005500'];
        const WINDOW_COLOR = '#ffff66';
        const WINDOW_OFF_COLOR = '#333322';

        function generateBuildings() {
            buildings = [];
            let x = 0;
            while (x < W) {
                const w = 30 + Math.floor(Math.random() * 40);
                const h = 80 + Math.floor(Math.random() * 220);
                const color = BUILDING_COLORS[Math.floor(Math.random() * BUILDING_COLORS.length)];
                buildings.push({ x: x, w: w, h: h, y: GROUND_Y - h, color: color });
                x += w;
            }
            // Create damage canvas
            const dmgCanvas = document.createElement('canvas');
            dmgCanvas.width = W;
            dmgCanvas.height = H;
            damageCtx = dmgCanvas.getContext('2d');
            damageCtx.clearRect(0, 0, W, H);
        }

        function placeGorillas() {
            // P1 on left third, P2 on right third
            const leftBuildings = buildings.filter(b => b.x + b.w / 2 > 30 && b.x + b.w / 2 < W * 0.35);
            const rightBuildings = buildings.filter(b => b.x + b.w / 2 > W * 0.65 && b.x + b.w / 2 < W - 30);

            let lb = leftBuildings[Math.floor(Math.random() * leftBuildings.length)] || buildings[1];
            let rb = rightBuildings[Math.floor(Math.random() * rightBuildings.length)] || buildings[buildings.length - 2];

            gorillas[0] = { x: lb.x + lb.w / 2, y: lb.y };
            gorillas[1] = { x: rb.x + rb.w / 2, y: rb.y };
        }

        function randomizeWind() {
            wind = (Math.random() - 0.5) * 160; // -80 to +80 px/s^2
        }

        // === Damage System ===
        function applyExplosionDamage(cx, cy, radius) {
            // Draw a black circle on the damage canvas
            damageCtx.globalCompositeOperation = 'source-over';
            damageCtx.fillStyle = '#000';
            damageCtx.beginPath();
            damageCtx.arc(cx, cy, radius, 0, Math.PI * 2);
            damageCtx.fill();
        }

        // === Collision Detection ===
        function hitTestBuildings(x, y) {
            for (let i = 0; i < buildings.length; i++) {
                const b = buildings[i];
                if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= GROUND_Y) {
                    // Check if this pixel is damaged
                    const pixel = damageCtx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
                    if (pixel[3] > 128) return false; // damaged area (black pixel = hole)
                    return true;
                }
            }
            return false;
        }

        function hitTestGorilla(x, y, playerIdx) {
            const g = gorillas[playerIdx];
            const gx = g.x - GORILLA_W / 2;
            const gy = g.y - GORILLA_H;
            return x >= gx && x <= gx + GORILLA_W && y >= gy && y <= g.y;
        }

        // === Particles ===
        function spawnExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const a = Math.random() * Math.PI * 2;
                const speed = Math.random() * 150 + 40;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(a) * speed,
                    vy: Math.sin(a) * speed,
                    life: 0.5 + Math.random() * 0.7,
                    color: color,
                    size: Math.random() * 4 + 1
                });
            }
        }

        // === Drawing ===
        function drawStars(dt) {
            stars.forEach(s => {
                s.b += dt * s.speed;
                const brightness = (Math.sin(s.b) + 1) / 2;
                ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + brightness * 0.5) + ')';
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });
        }

        function drawSun() {
            const sx = W / 2, sy = 55, sr = 28;
            // Sun body
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(sx, sy, sr, 0, Math.PI * 2);
            ctx.fill();
            // Rays
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 2;
            for (let i = 0; i < 12; i++) {
                const a = (i / 12) * Math.PI * 2 + gameTime * 0.3;
                ctx.beginPath();
                ctx.moveTo(sx + Math.cos(a) * (sr + 3), sy + Math.sin(a) * (sr + 3));
                ctx.lineTo(sx + Math.cos(a) * (sr + 10), sy + Math.sin(a) * (sr + 10));
                ctx.stroke();
            }
            ctx.lineWidth = 1;
            // Face
            if (sunSurprised && sunSurprisedTimer > 0) {
                // Surprised face (O mouth, wide eyes)
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(sx - 8, sy - 5, 5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(sx + 8, sy - 5, 5, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(sx - 8, sy - 5, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(sx + 8, sy - 5, 3, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(sx - 8, sy - 5, 1.5, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(sx + 8, sy - 5, 1.5, 0, Math.PI * 2); ctx.fill();
                // O mouth
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(sx, sy + 8, 6, 0, Math.PI * 2);
                ctx.stroke();
                ctx.lineWidth = 1;
            } else {
                // Happy face
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(sx - 8, sy - 4, 3, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(sx + 8, sy - 4, 3, 0, Math.PI * 2); ctx.fill();
                // Smile
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(sx, sy + 2, 10, 0.2, Math.PI - 0.2);
                ctx.stroke();
                ctx.lineWidth = 1;
            }
        }

        function drawSkyGradient() {
            const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
            grad.addColorStop(0, '#000022');
            grad.addColorStop(0.5, '#000044');
            grad.addColorStop(1, '#000066');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, W, GROUND_Y);
        }

        // Offscreen buffer for building rendering
        let buildingBuffer = null;
        let buildingBufferCtx = null;

        function ensureBuildingBuffer() {
            if (!buildingBuffer) {
                buildingBuffer = document.createElement('canvas');
                buildingBuffer.width = W;
                buildingBuffer.height = H;
                buildingBufferCtx = buildingBuffer.getContext('2d');
            }
        }

        function drawBuildings() {
            ensureBuildingBuffer();
            const bCtx = buildingBufferCtx;
            bCtx.clearRect(0, 0, W, H);

            for (let i = 0; i < buildings.length; i++) {
                const b = buildings[i];
                bCtx.fillStyle = b.color;
                bCtx.fillRect(b.x, b.y, b.w, b.h);

                // Windows
                const winW = 4, winH = 5, winGapX = 8, winGapY = 10;
                const startX = b.x + 4;
                const startY = b.y + 6;
                for (let wy = startY; wy < GROUND_Y - winGapY; wy += winGapY) {
                    for (let wx = startX; wx < b.x + b.w - winW - 2; wx += winGapX) {
                        // Semi-random window on/off based on position
                        const on = ((wx * 7 + wy * 13 + i * 31) % 5) < 3;
                        bCtx.fillStyle = on ? WINDOW_COLOR : WINDOW_OFF_COLOR;
                        bCtx.fillRect(wx, wy, winW, winH);
                    }
                }
            }

            // Cut out damage holes from the building buffer
            if (damageCtx) {
                bCtx.save();
                bCtx.globalCompositeOperation = 'destination-out';
                bCtx.drawImage(damageCtx.canvas, 0, 0);
                bCtx.restore();
            }

            // Draw the building buffer onto the main canvas
            ctx.drawImage(buildingBuffer, 0, 0);
        }

        function drawGround() {
            ctx.fillStyle = '#333';
            ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
        }

        function drawGorilla(idx, animFrame) {
            const g = gorillas[idx];
            const x = g.x - GORILLA_W / 2;
            const y = g.y - GORILLA_H;
            const c = '#8B4513'; // brown
            const dark = '#5C2E00';

            ctx.fillStyle = c;

            // Body (main torso)
            ctx.fillRect(x + 8, y + 8, 12, 14);

            // Head
            ctx.fillRect(x + 9, y, 10, 10);
            // Face details
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(x + 10, y + 2, 8, 6); // face
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 11, y + 3, 2, 2); // left eye
            ctx.fillRect(x + 15, y + 3, 2, 2); // right eye
            ctx.fillRect(x + 13, y + 5, 2, 2); // nose
            ctx.fillRect(x + 12, y + 7, 4, 1); // mouth

            ctx.fillStyle = c;

            // Arms
            if (animFrame === 1) {
                // Left arm up (throwing or celebrating)
                ctx.fillRect(x + 2, y + 2, 6, 4);
                ctx.fillRect(x + 2, y + 0, 4, 4);
                // Right arm up
                ctx.fillRect(x + 20, y + 2, 6, 4);
                ctx.fillRect(x + 22, y + 0, 4, 4);
            } else if (animFrame === 2) {
                // Left arm up, right down (throwing pose)
                ctx.fillRect(x + 2, y + 2, 6, 4);
                ctx.fillRect(x + 2, y + 0, 4, 4);
                // Right arm down
                ctx.fillRect(x + 20, y + 10, 6, 4);
                ctx.fillRect(x + 22, y + 14, 4, 6);
            } else if (animFrame === 3) {
                // Arms alternating (celebrating)
                ctx.fillRect(x + 2, y + 0, 6, 4);
                ctx.fillRect(x + 20, y + 10, 6, 4);
                ctx.fillRect(x + 22, y + 14, 4, 6);
            } else {
                // Arms at sides (idle)
                ctx.fillRect(x + 2, y + 10, 6, 4);
                ctx.fillRect(x + 2, y + 14, 4, 6);
                ctx.fillRect(x + 20, y + 10, 6, 4);
                ctx.fillRect(x + 22, y + 14, 4, 6);
            }

            // Legs
            ctx.fillStyle = dark;
            ctx.fillRect(x + 8, y + 22, 5, 8);
            ctx.fillRect(x + 15, y + 22, 5, 8);

            // Feet
            ctx.fillStyle = c;
            ctx.fillRect(x + 7, y + 28, 6, 2);
            ctx.fillRect(x + 15, y + 28, 6, 2);
        }

        function drawBanana(x, y, rot) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rot);
            // Banana shape: crescent
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(0, 0, BANANA_R, 0.3, Math.PI - 0.3);
            ctx.arc(0, -2, BANANA_R - 2, Math.PI - 0.3, 0.3, true);
            ctx.closePath();
            ctx.fill();
            // Stem
            ctx.fillStyle = '#996600';
            ctx.fillRect(-1, -BANANA_R - 1, 2, 3);
            ctx.restore();
        }

        function drawWindIndicator() {
            const cx = W / 2, cy = 115;
            const windStr = Math.abs(wind);
            const maxLen = 60;
            const len = (windStr / 80) * maxLen;

            ctx.textAlign = 'center';
            ctx.font = '13px Courier';
            ctx.fillStyle = '#aaa';

            if (Math.abs(wind) < 3) {
                document.getElementById('wind').innerText = 'CALM';
                ctx.fillStyle = '#66ccff';
                ctx.font = '11px Courier';
                ctx.fillText('WIND: CALM', cx, cy + 5);
                return;
            }

            const dir = wind > 0 ? 1 : -1;
            const strength = Math.round(windStr);
            document.getElementById('wind').innerText = (dir > 0 ? '> ' : '< ') + strength;

            // Arrow on canvas
            ctx.strokeStyle = '#66ccff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx - dir * len / 2, cy);
            ctx.lineTo(cx + dir * len / 2, cy);
            ctx.stroke();
            // Arrowhead
            ctx.beginPath();
            ctx.moveTo(cx + dir * len / 2, cy);
            ctx.lineTo(cx + dir * len / 2 - dir * 6, cy - 4);
            ctx.moveTo(cx + dir * len / 2, cy);
            ctx.lineTo(cx + dir * len / 2 - dir * 6, cy + 4);
            ctx.stroke();
            ctx.lineWidth = 1;
            // Label below arrow
            ctx.fillStyle = '#66ccff';
            ctx.font = '11px Courier';
            ctx.textAlign = 'center';
            ctx.fillText('WIND', cx, cy + 14);
        }

        function drawAngleVelocityHUD() {
            if (turnPhase !== 'INPUT') return;
            const isP1 = currentPlayer === 0;
            const x = isP1 ? 15 : W - 155;
            const y = GROUND_Y - 55;

            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(x, y, 140, 50);
            ctx.strokeStyle = isP1 ? '#ff6666' : '#6666ff';
            ctx.lineWidth = 1;
            ctx.strokeRect(x, y, 140, 50);

            ctx.textAlign = 'left';
            ctx.font = 'bold 14px Courier';
            ctx.fillStyle = isP1 ? '#ff6666' : '#6666ff';
            ctx.fillText(isP1 ? (aiMode || attractMode ? 'CPU' : 'P1') : 'CPU', x + 5, y + 15);

            ctx.fillStyle = '#ffcc00';
            ctx.font = '13px Courier';
            ctx.fillText('ANG: ' + Math.round(angle) + '\u00B0', x + 5, y + 32);
            ctx.fillText('VEL: ' + Math.round(velocity), x + 5, y + 46);
        }

        // Draw trajectory guide (small dots showing initial arc)
        function drawTrajectoryGuide() {
            if (turnPhase !== 'INPUT') return;
            if (attractMode && state === 'START') return;
            const g = gorillas[currentPlayer];
            const rad = currentPlayer === 0 ? angle * Math.PI / 180 : (180 - angle) * Math.PI / 180;
            const vx = Math.cos(rad) * velocity * 3;
            const vy = -Math.sin(rad) * velocity * 3;
            let px = g.x + Math.cos(rad) * 20, py = g.y - GORILLA_H - 5 + Math.sin(rad) * -10;

            ctx.fillStyle = 'rgba(255,204,0,0.3)';
            for (let t = 0; t < 15; t++) {
                const dt = t * 0.05;
                const dx = px + vx * dt + 0.5 * wind * dt * dt;
                const dy = py + vy * dt + 0.5 * GRAVITY * dt * dt;
                if (dy > GROUND_Y || dx < 0 || dx > W) break;
                ctx.fillRect(dx - 1, dy - 1, 2, 2);
            }
        }

        // === Game Logic ===
        function throwBanana() {
            const g = gorillas[currentPlayer];
            // Angle: for P1, 0=right, 90=up. For P2, angle is mirrored.
            const rad = currentPlayer === 0 ? angle * Math.PI / 180 : (180 - angle) * Math.PI / 180;
            const vx = Math.cos(rad) * velocity * 3;
            const vy = -Math.sin(rad) * velocity * 3;

            // Spawn banana above gorilla's head, offset in throw direction
            banana = {
                x: g.x + Math.cos(rad) * 20,
                y: g.y - GORILLA_H - 5 + Math.sin(rad) * -10,
                vx: vx,
                vy: vy,
                rotation: 0,
                age: 0
            };

            turnPhase = 'FLYING';
            sfxThrow();

            // Throwing animation
            gorillaAnim[currentPlayer] = 2;
            gorillaAnimTimer[currentPlayer] = 0.4;
        }

        function updateBanana(dt) {
            if (!banana) return;

            banana.vx += wind * dt;
            banana.vy += GRAVITY * dt;
            banana.x += banana.vx * dt;
            banana.y += banana.vy * dt;
            banana.rotation += dt * 8;
            banana.age += dt;

            // Whistle sound occasionally
            if (Math.random() < 0.08) sfxWhistle();

            // Check sun proximity
            const dxSun = banana.x - W / 2;
            const dySun = banana.y - 55;
            if (Math.sqrt(dxSun * dxSun + dySun * dySun) < 45) {
                sunSurprised = true;
                sunSurprisedTimer = 0.8;
            }

            // Check hitting opponent gorilla
            const opponent = 1 - currentPlayer;
            if (hitTestGorilla(banana.x, banana.y, opponent)) {
                // Hit!
                handleGorillaHit(opponent);
                return;
            }

            // Check hitting self (misfire) — skip while banana is near thrower
            if (banana.age > 0.3 && hitTestGorilla(banana.x, banana.y, currentPlayer)) {
                // Hit self! Other player scores
                handleGorillaHit(currentPlayer);
                return;
            }

            // Check hitting buildings (skip briefly after throw to clear thrower's building)
            if (banana.age > 0.15 && hitTestBuildings(banana.x, banana.y)) {
                handleBuildingHit(banana.x, banana.y);
                return;
            }

            // Check hitting ground
            if (banana.y >= GROUND_Y) {
                handleBuildingHit(banana.x, GROUND_Y);
                return;
            }

            // Off screen
            if (banana.x < -50 || banana.x > W + 50 || banana.y > H + 50) {
                sfxMiss();
                banana = null;
                turnPhase = 'EXPLODING';
                phaseTimer = 0.5;
            }
        }

        function handleGorillaHit(hitPlayerIdx) {
            const scorer = 1 - hitPlayerIdx;
            spawnExplosion(banana.x, banana.y, '#ff4400', 30);
            spawnExplosion(banana.x, banana.y, '#ffcc00', 20);
            spawnExplosion(banana.x, banana.y, '#fff', 10);
            applyExplosionDamage(banana.x, banana.y, EXPLOSION_R);

            explosions.push({ x: banana.x, y: banana.y, r: 0, maxR: EXPLOSION_R * 1.5, life: 0.8, initLife: 0.8 });

            banana = null;
            sfxGorillaHit();

            if (scorer === 0) {
                p1Score++;
                floatingTexts.push({ x: gorillas[hitPlayerIdx].x, y: gorillas[hitPlayerIdx].y - 40, t: 'P1 SCORES!', life: 2.0, c: '#ff6666' });
            } else {
                p2Score++;
                floatingTexts.push({ x: gorillas[hitPlayerIdx].x, y: gorillas[hitPlayerIdx].y - 40, t: 'CPU SCORES!', life: 2.0, c: '#6666ff' });
            }

            // Celebrate animation for scorer
            gorillaAnim[scorer] = 1;
            gorillaAnimTimer[scorer] = 2.0;

            updateHUD();

            if (p1Score >= WIN_SCORE || p2Score >= WIN_SCORE) {
                turnPhase = 'GAME_OVER';
                phaseTimer = 3.0;
                if (state === 'PLAY') {
                    sfxVictory();
                }
            } else {
                turnPhase = 'CELEBRATE';
                phaseTimer = 2.0;
            }
        }

        function handleBuildingHit(hx, hy) {
            spawnExplosion(hx, hy, '#ff6600', 15);
            spawnExplosion(hx, hy, '#ffaa00', 10);
            applyExplosionDamage(hx, hy, EXPLOSION_R);

            explosions.push({ x: hx, y: hy, r: 0, maxR: EXPLOSION_R, life: 0.5, initLife: 0.5 });

            banana = null;
            sfxBuildingHit();
            turnPhase = 'EXPLODING';
            phaseTimer = 0.8;
        }

        function nextTurn() {
            currentPlayer = 1 - currentPlayer;
            turnPhase = 'INPUT';
            angle = 45 + Math.random() * 20;
            velocity = 40 + Math.random() * 30;

            // CPU always plays P2; also plays P1 in AI mode or attract mode
            if (currentPlayer === 1 || aiMode || attractMode) {
                aiThinking = true;
                aiThinkTimer = 0.5 + Math.random() * 0.8;
            }
        }

        function startNewRound() {
            generateBuildings();
            placeGorillas();
            randomizeWind();
            banana = null;
            explosions = [];
            particles = [];
            floatingTexts = [];
            gorillaAnim = [0, 0];
            gorillaAnimTimer = [0, 0];
            sunSurprised = false;
            sunSurprisedTimer = 0;
            aiThinking = false;
            aiThinkTimer = 0;
            currentPlayer = Math.random() < 0.5 ? 0 : 1;
            turnPhase = 'INPUT';
            angle = 45 + Math.random() * 20;
            velocity = 40 + Math.random() * 30;

            if (currentPlayer === 1 || aiMode || attractMode) {
                aiThinking = true;
                aiThinkTimer = 0.5 + Math.random() * 0.8;
            }
        }

        function resetGame() {
            p1Score = 0;
            p2Score = 0;
            startNewRound();
            updateHUD();
        }

        // === AI ===
        function aiSimulateShot(shooterIdx, testAngle, testVel) {
            // Simulate a trajectory and return closest distance to target
            const shooter = gorillas[shooterIdx];
            const target = gorillas[1 - shooterIdx];
            const rad = shooterIdx === 0 ? testAngle * Math.PI / 180 : (180 - testAngle) * Math.PI / 180;
            let vx = Math.cos(rad) * testVel * 3;
            let vy = -Math.sin(rad) * testVel * 3;
            let x = shooter.x + Math.cos(rad) * 20;
            let y = shooter.y - GORILLA_H - 5 + Math.sin(rad) * -10;
            const step = 0.02;
            let bestDist = Infinity;
            for (let t = 0; t < 8; t += step) {
                vx += wind * step;
                vy += GRAVITY * step;
                x += vx * step;
                y += vy * step;
                const dx = x - target.x;
                const dy = y - (target.y - GORILLA_H / 2);
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < bestDist) bestDist = dist;
                // Stop if below ground or off screen
                if (y > GROUND_Y || x < -50 || x > W + 50) break;
            }
            return bestDist;
        }

        function aiCalculateShot(shooterIdx) {
            // Brute-force search: try many angle/velocity combos, pick the best
            let bestAngle = 45, bestVel = 60, bestDist = Infinity;

            // Coarse search
            for (let a = 15; a <= 80; a += 5) {
                for (let v = 25; v <= 95; v += 10) {
                    const d = aiSimulateShot(shooterIdx, a, v);
                    if (d < bestDist) { bestDist = d; bestAngle = a; bestVel = v; }
                }
            }
            // Fine search around best
            for (let a = bestAngle - 5; a <= bestAngle + 5; a += 1) {
                for (let v = bestVel - 10; v <= bestVel + 10; v += 2) {
                    if (a < 5 || a > 85 || v < 15 || v > 100) continue;
                    const d = aiSimulateShot(shooterIdx, a, v);
                    if (d < bestDist) { bestDist = d; bestAngle = a; bestVel = v; }
                }
            }

            // Add difficulty-based error: [Easy, Medium, Hard]
            const error = DIFF_AI_ERROR[difficulty];
            bestAngle += (Math.random() - 0.5) * error;
            bestVel += (Math.random() - 0.5) * error;

            return { angle: Math.max(10, Math.min(80, bestAngle)), velocity: Math.max(20, Math.min(100, bestVel)) };
        }

        function updateAI(dt) {
            if (!aiThinking) return;

            aiThinkTimer -= dt;
            if (aiThinkTimer <= 0) {
                const shot = aiCalculateShot(currentPlayer);
                angle = shot.angle;
                velocity = shot.velocity;
                aiThinking = false;
                throwBanana();
            }
        }

        // === Update HUD ===
        function updateHUD() {
            document.getElementById('s1').innerText = p1Score;
            document.getElementById('s2').innerText = p2Score;
        }

        // === Main Game Scene Drawing ===
        function drawGameScene(dt) {
            // Sky
            drawSkyGradient();
            drawStars(dt);
            drawSun();

            // Wind indicator
            drawWindIndicator();

            // Ground
            drawGround();

            // Buildings
            drawBuildings();

            // Gorillas
            for (let i = 0; i < 2; i++) {
                // Update animation
                if (gorillaAnimTimer[i] > 0) {
                    gorillaAnimTimer[i] -= dt;
                    // Celebration alternating
                    if (gorillaAnim[i] === 1 && gorillaAnimTimer[i] > 0) {
                        gorillaAnim[i] = (Math.floor(gameTime * 6) % 2 === 0) ? 1 : 3;
                    }
                    if (gorillaAnimTimer[i] <= 0) {
                        gorillaAnim[i] = 0;
                    }
                }
                drawGorilla(i, gorillaAnim[i]);
            }

            // Banana
            if (banana) {
                drawBanana(banana.x, banana.y, banana.rotation);
            }

            // Explosions
            explosions = explosions.filter(ex => {
                ex.life -= dt;
                ex.r += (ex.maxR / 0.3) * dt;
                if (ex.r > ex.maxR) ex.r = ex.maxR;
                if (ex.life > 0) {
                    const alpha = Math.min(1, ex.life / (ex.initLife || 0.8));
                    ctx.globalAlpha = alpha;
                    // Outer ring
                    ctx.fillStyle = '#ff4400';
                    ctx.beginPath();
                    ctx.arc(ex.x, ex.y, ex.r, 0, Math.PI * 2);
                    ctx.fill();
                    // Inner ring
                    ctx.fillStyle = '#ffaa00';
                    ctx.beginPath();
                    ctx.arc(ex.x, ex.y, ex.r * 0.6, 0, Math.PI * 2);
                    ctx.fill();
                    // Core
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(ex.x, ex.y, ex.r * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    return true;
                }
                return false;
            });

            // Particles
            particles.forEach(p => {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.vy += 200 * dt; // gravity on particles
                p.life -= dt;
                if (p.life > 0) {
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x, p.y, p.size, p.size);
                }
            });
            particles = particles.filter(p => p.life > 0);
            ctx.globalAlpha = 1;

            // Floating texts
            floatingTexts = floatingTexts.filter(ft => {
                ft.y -= 30 * dt;
                ft.life -= dt * 0.8;
                ctx.globalAlpha = Math.max(0, ft.life);
                ctx.fillStyle = ft.c;
                ctx.font = 'bold 18px Courier';
                ctx.textAlign = 'center';
                ctx.fillText(ft.t, ft.x, ft.y);
                return ft.life > 0;
            });
            ctx.globalAlpha = 1;

            // Angle/velocity HUD
            drawAngleVelocityHUD();
            drawTrajectoryGuide();

            // Sun surprised timer
            if (sunSurprised) {
                sunSurprisedTimer -= dt;
                if (sunSurprisedTimer <= 0) sunSurprised = false;
            }
        }

        // === Home Screen ===
        function drawHomeScreen(dt) {
            titleTimer += dt;

            // Run attract mode AI vs AI
            if (attractMode) {
                updateGameLogic(dt);
            } else {
                // Start attract mode
                attractMode = true;
                resetGame();
            }

            // Draw the game scene behind
            drawGameScene(dt);

            // Dark overlay
            ctx.fillStyle = 'rgba(0,0,0,0.55)';
            ctx.fillRect(0, 0, W, H);

            // Title
            const titlePulse = 1 + 0.05 * Math.sin(titleTimer * 8);
            const titleGlow = 15 + 10 * Math.sin(titleTimer * 8);
            const titleSize = Math.round(48 * titlePulse);

            ctx.textAlign = 'center';
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold ' + titleSize + 'px Courier';
            ctx.shadowBlur = titleGlow;
            ctx.shadowColor = '#ffcc00';
            ctx.fillText('GORILLAS', W / 2, 75);
            ctx.shadowBlur = 0;

            ctx.font = '14px Courier';
            ctx.fillStyle = '#aaa';
            ctx.fillText('BASED ON QBASIC GORILLA.BAS', W / 2, 98);

            // High scores panel
            const panelX = W / 2 - 160, panelY = 115, panelW = 320, panelH = 260;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(panelX, panelY, panelW, panelH);
            ctx.strokeStyle = '#ffcc00';
            ctx.lineWidth = 2;
            ctx.strokeRect(panelX, panelY, panelW, panelH);

            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold 16px Courier';
            ctx.textAlign = 'center';
            ctx.fillText('--- HALL OF FAME ---', W / 2, panelY + 25);

            ctx.fillStyle = '#aaa';
            ctx.font = '13px Courier';
            ctx.textAlign = 'left';
            ctx.fillText('RNK', panelX + 15, panelY + 45);
            ctx.fillText('NAME', panelX + 55, panelY + 45);
            ctx.textAlign = 'right';
            ctx.fillText('WINS', panelX + panelW - 15, panelY + 45);

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(panelX + 10, panelY + 50);
            ctx.lineTo(panelX + panelW - 10, panelY + 50);
            ctx.stroke();

            for (let i = 0; i < 10; i++) {
                const rowY = panelY + 68 + i * 20;
                if (i < highScores.length) {
                    const h = highScores[i];
                    const isTop3 = i < 3;
                    ctx.fillStyle = isTop3 ? ['#ffd700', '#c0c0c0', '#cd7f32'][i] : '#aaa';
                    ctx.font = isTop3 ? 'bold 13px Courier' : '13px Courier';
                    ctx.textAlign = 'left';
                    ctx.fillText((i + 1).toString().padStart(2, ' ') + '.', panelX + 15, rowY);
                    ctx.fillText(h.n, panelX + 55, rowY);
                    ctx.textAlign = 'right';
                    ctx.fillText(h.s, panelX + panelW - 15, rowY);
                } else {
                    ctx.fillStyle = '#333';
                    ctx.font = '13px Courier';
                    ctx.textAlign = 'left';
                    ctx.fillText((i + 1).toString().padStart(2, ' ') + '.', panelX + 15, rowY);
                    ctx.fillText('---', panelX + 55, rowY);
                    ctx.textAlign = 'right';
                    ctx.fillText('---', panelX + panelW - 15, rowY);
                }
            }

            // Difficulty selector
            ctx.textAlign = 'center';
            ctx.fillStyle = '#aaa';
            ctx.font = 'bold 14px Courier';
            ctx.fillText('DIFFICULTY', W / 2, 408);

            const dBtnW = 100, dBtnH = 30, dBtnGap = 12;
            const dTotalW = 3 * dBtnW + 2 * dBtnGap;
            const dBtnStartX = (W - dTotalW) / 2;
            const dBtnY = 418;
            for (let d = 0; d < 3; d++) {
                const bx = dBtnStartX + d * (dBtnW + dBtnGap);
                const selected = d === difficulty;
                ctx.fillStyle = selected ? DIFF_COLORS[d] : '#222';
                ctx.fillRect(bx, dBtnY, dBtnW, dBtnH);
                ctx.strokeStyle = DIFF_COLORS[d];
                ctx.lineWidth = selected ? 2 : 1;
                ctx.strokeRect(bx, dBtnY, dBtnW, dBtnH);
                ctx.fillStyle = selected ? '#000' : DIFF_COLORS[d];
                ctx.font = selected ? 'bold 12px Courier' : '12px Courier';
                ctx.textAlign = 'center';
                ctx.fillText(DIFF_NAMES[d], bx + dBtnW / 2, dBtnY + 20);
            }

            // Game info
            ctx.textAlign = 'center';
            ctx.font = '12px Courier';
            ctx.fillStyle = '#888';
            ctx.fillText('FIRST TO ' + WIN_SCORE + ' WINS!', W / 2, 470);

            // Blinking "PRESS START"
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Courier';
            if (state === 'OVER') {
                ctx.fillText('GAME OVER', W / 2, 500);
                ctx.font = 'bold 14px Courier';
                ctx.fillStyle = p1Score >= WIN_SCORE ? '#ff6666' : '#6666ff';
                ctx.fillText(p1Score >= WIN_SCORE ? (aiMode ? 'CPU 1 WINS!' : 'PLAYER 1 WINS!') : 'CPU WINS!', W / 2, 520);
            } else {
                if (Math.floor(titleTimer * 3) % 2 === 0) {
                    ctx.fillText('PRESS START', W / 2, 505);
                }
            }

            // Controls help
            ctx.font = '13px Courier';
            ctx.fillStyle = '#aaa';
            ctx.fillText('L/R: AIM | U/D: POWER | SPACE: THROW | A: AI | S: SOUND', W / 2, 555);
            ctx.fillText('ESC: MENU', W / 2, 572);
        }

        // === Game Logic Update ===
        function updateGameLogic(dt) {
            if (turnPhase === 'FLYING') {
                updateBanana(dt);
            } else if (turnPhase === 'EXPLODING') {
                phaseTimer -= dt;
                if (phaseTimer <= 0) {
                    nextTurn();
                }
            } else if (turnPhase === 'CELEBRATE') {
                phaseTimer -= dt;
                if (phaseTimer <= 0) {
                    startNewRound();
                }
            } else if (turnPhase === 'GAME_OVER') {
                phaseTimer -= dt;
                if (phaseTimer <= 0) {
                    if (state === 'PLAY') {
                        state = 'OVER';
                        menuBtn.innerText = 'MENU';
                        menuBtn.href = 'index.html';
                        titleTimer = 0;
                        stopMusic();
                        sfxGameOver();
                        const finalScore = Math.max(p1Score, p2Score);
                        setTimeout(() => {
                            if (state !== 'OVER') return;
                            if (!aiMode && (highScores.length < 10 || finalScore > highScores[highScores.length - 1].s)) {
                                stopMusic();
                                const n = prompt('LEGENDARY SCORE! Enter Initials:', 'ACE');
                                if (n) {
                                    highScores.push({ n: n.substring(0, 3).toUpperCase(), s: finalScore });
                                    highScores.sort((a, b) => b.s - a.s);
                                    highScores = highScores.slice(0, 10);
                                    localStorage.setItem('gorillas_deluxe_scores', JSON.stringify(highScores));
                                }
                            }
                            playMusic('home');
                        }, 1000);
                    } else {
                        // Attract mode game over, restart
                        resetGame();
                    }
                }
            } else if (turnPhase === 'INPUT') {
                updateAI(dt);
            }
        }

        // === Main Loop ===
        function loop(timestamp) {
            const rawDt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            const dt = Math.min(rawDt, 0.05);

            ctx.clearRect(0, 0, W, H);

            if (state === 'START' || state === 'OVER') {
                drawHomeScreen(dt);
                gameTime += dt;
                requestAnimationFrame(loop);
                return;
            }

            if (paused) {
                drawGameScene(0);
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 40px Courier';
                ctx.fillText('PAUSED', W / 2, H / 2 - 10);
                ctx.font = '16px Courier';
                ctx.fillStyle = '#fff';
                ctx.fillText('PRESS P OR CLICK RESUME', W / 2, H / 2 + 25);
                requestAnimationFrame(loop);
                return;
            }

            gameTime += dt;

            // Handle keyboard input for angle/velocity
            if (turnPhase === 'INPUT' && !aiThinking) {
                const angleSpeed = 60 * dt;
                const velSpeed = 50 * dt;
                if (keys['ArrowLeft']) angle = Math.min(90, angle + angleSpeed);
                if (keys['ArrowRight']) angle = Math.max(0, angle - angleSpeed);
                if (keys['ArrowUp']) velocity = Math.min(100, velocity + velSpeed);
                if (keys['ArrowDown']) velocity = Math.max(5, velocity - velSpeed);
            }

            updateGameLogic(dt);
            drawGameScene(dt);

            // Turn indicator
            if (turnPhase === 'INPUT') {
                const g = gorillas[currentPlayer];
                ctx.fillStyle = currentPlayer === 0 ? '#ff6666' : '#6666ff';
                ctx.font = 'bold 12px Courier';
                ctx.textAlign = 'center';
                const label = currentPlayer === 0 ? (aiMode ? 'CPU' : 'P1') : 'CPU';

                // Arrow pointing down at gorilla
                const arrowY = g.y - GORILLA_H - 15 + Math.sin(gameTime * 5) * 4;
                ctx.beginPath();
                ctx.moveTo(g.x, arrowY + 8);
                ctx.lineTo(g.x - 5, arrowY);
                ctx.lineTo(g.x + 5, arrowY);
                ctx.closePath();
                ctx.fill();
                ctx.fillText(label, g.x, arrowY - 4);
            }

            updateHUD();
            requestAnimationFrame(loop);
        }

        // === Difficulty Click ===
        canvas.addEventListener('click', (e) => {
            if (state !== 'START' && state !== 'OVER') return;
            ensureAudio();
            playMusic('home');
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            const scaleY = H / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;
            const dBtnW = 100, dBtnH = 30, dBtnGap = 12;
            const dTotalW = 3 * dBtnW + 2 * dBtnGap;
            const dBtnStartX = (W - dTotalW) / 2;
            const dBtnY = 418;
            for (let d = 0; d < 3; d++) {
                const bx = dBtnStartX + d * (dBtnW + dBtnGap);
                if (mx >= bx && mx <= bx + dBtnW && my >= dBtnY && my <= dBtnY + dBtnH) {
                    difficulty = d;
                }
            }
        });

        // === Controls ===
        btn.onclick = () => {
            haptic(30);
            ensureAudio();
            attractMode = false;
            p1Score = 0;
            p2Score = 0;
            paused = false;
            keys = {};
            floatingTexts = [];
            particles = [];
            startNewRound();
            state = 'PLAY';
            menuBtn.innerText = 'HOME';
            menuBtn.href = '#';
            lastTime = performance.now();
            gameTime = 0;
            playMusic('game');
            canvas.focus();
            updateHUD();
        };

        aiBtn.onclick = () => {
            haptic(30);
            aiMode = !aiMode;
            aiBtn.innerText = aiMode ? 'AI: ON' : 'AI: OFF';
            aiBtn.className = aiMode ? 'ai-active' : '';
            canvas.focus();
        };

        pauseBtn.onclick = () => {
            haptic(30);
            if (state !== 'PLAY') return;
            paused = !paused;
            pauseBtn.className = paused ? 'pause-active' : '';
            pauseBtn.innerText = paused ? 'RESUME' : 'PAUSE';
            if (!paused) lastTime = performance.now();
        };

        menuBtn.onclick = (e) => {
            if (state === 'PLAY') {
                e.preventDefault();
                haptic(30);
                state = 'START';
                paused = false;
                pauseBtn.innerText = 'PAUSE';
                pauseBtn.className = '';
                stopMusic();
                playMusic('home');
                keys = {};
                menuBtn.innerText = 'MENU';
                menuBtn.href = 'index.html';
            }
        };

        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (state === 'START' || state === 'OVER') { window.location.href = 'index.html'; return; }
                if (paused) pauseBtn.click();
                else if (state === 'PLAY') pauseBtn.click();
                return;
            }
            if (state === 'START' || state === 'OVER') {
                if (e.key === ' ') { e.preventDefault(); btn.click(); return; }
                if (e.key === 'e' || e.key === 'E') { difficulty = 0; return; }
                if (e.key === 'm' || e.key === 'M') { difficulty = 1; return; }
                if (e.key === 'h' || e.key === 'H') { difficulty = 2; return; }
                if (e.key === 'a' || e.key === 'A') { aiBtn.click(); return; }
                if (e.key === 's' || e.key === 'S') { muteBtn.click(); return; }
                if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); return; }
                return;
            }
            if (e.key === 'a' || e.key === 'A') { aiBtn.click(); return; }
            if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); return; }
            if (e.key === 's' || e.key === 'S') { muteBtn.click(); return; }
            if (state !== 'PLAY' || paused) return;
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
                keys[e.key] = true;
            }
            if ((e.key === ' ' || e.key === 'Enter') && turnPhase === 'INPUT' && !aiThinking) {
                e.preventDefault();
                if (currentPlayer === 0 && !aiMode) {
                    throwBanana();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                keys[e.key] = false;
            }
        });

        // === Touch ===
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            ensureAudio();

            if (state === 'START' || state === 'OVER') {
                playMusic('home');
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                const scaleY = H / rect.height;
                const mx = (e.touches[0].clientX - rect.left) * scaleX;
                const my = (e.touches[0].clientY - rect.top) * scaleY;
                const dBtnW = 100, dBtnH = 30, dBtnGap = 12;
                const dTotalW = 3 * dBtnW + 2 * dBtnGap;
                const dBtnStartX = (W - dTotalW) / 2;
                const dBtnY = 418;
                for (let d = 0; d < 3; d++) {
                    const bx = dBtnStartX + d * (dBtnW + dBtnGap);
                    if (mx >= bx && mx <= bx + dBtnW && my >= dBtnY && my <= dBtnY + dBtnH) {
                        difficulty = d;
                    }
                }
                return;
            }
        }, { passive: false });

        // D-pad
        // Virtual joystick + fire button
        (function() {
            var joystick = document.getElementById('joystick');
            var knob = document.getElementById('joystick-knob');
            var fireBtn = document.getElementById('fire-btn');
            if (!joystick || !knob) return;
            var BASE_R = 65, KNOB_R = 25, DEAD_ZONE = 12;
            var active = false, lastDir = null;

            function getCenter() {
                var r = joystick.getBoundingClientRect();
                return { x: r.left + BASE_R, y: r.top + BASE_R };
            }
            function updateKnob(tx, ty) {
                var c = getCenter();
                var dx = tx - c.x, dy = ty - c.y;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var maxDist = BASE_R - KNOB_R * 0.5;
                if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
                knob.style.left = (BASE_R + dx - KNOB_R) + 'px';
                knob.style.top = (BASE_R + dy - KNOB_R) + 'px';
                return { dx: dx, dy: dy, dist: Math.sqrt(dx * dx + dy * dy) };
            }
            function resetKnob() {
                knob.style.left = (BASE_R - KNOB_R) + 'px';
                knob.style.top = (BASE_R - KNOB_R) + 'px';
                knob.style.transition = 'top 0.15s, left 0.15s';
            }
            function clearDir() {
                keys['ArrowUp'] = false; keys['ArrowDown'] = false;
                keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
                lastDir = null;
            }
            function setDir(dx, dy) {
                var dir;
                if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? 'right' : 'left';
                else dir = dy > 0 ? 'down' : 'up';
                if (dir === lastDir) return;
                clearDir(); lastDir = dir; haptic(30);
                if (dir === 'up') keys['ArrowUp'] = true;
                else if (dir === 'down') keys['ArrowDown'] = true;
                else if (dir === 'left') keys['ArrowLeft'] = true;
                else if (dir === 'right') keys['ArrowRight'] = true;
            }
            joystick.addEventListener('touchstart', function(e) {
                e.preventDefault(); active = true;
                knob.style.transition = 'none';
                var t = e.touches[0];
                var v = updateKnob(t.clientX, t.clientY);
                if (v.dist > DEAD_ZONE) setDir(v.dx, v.dy);
            }, { passive: false });
            joystick.addEventListener('touchmove', function(e) {
                if (!active) return; e.preventDefault();
                var t = e.touches[0];
                var v = updateKnob(t.clientX, t.clientY);
                if (v.dist > DEAD_ZONE) setDir(v.dx, v.dy);
                else clearDir();
            }, { passive: false });
            function onEnd(e) {
                if (!active) return; e.preventDefault();
                active = false; clearDir(); resetKnob();
            }
            joystick.addEventListener('touchend', onEnd, { passive: false });
            joystick.addEventListener('touchcancel', onEnd, { passive: false });

            if (fireBtn) {
                fireBtn.addEventListener('touchstart', function(e) {
                    e.preventDefault(); haptic(50);
                    if (state !== 'PLAY' || paused) return;
                    if (turnPhase === 'INPUT' && !aiThinking) {
                        if (currentPlayer === 0 && !aiMode) {
                            throwBanana();
                        }
                    }
                }, { passive: false });
                fireBtn.addEventListener('touchend', function(e) {
                    e.preventDefault();
                }, { passive: false });
                fireBtn.addEventListener('touchcancel', function(e) {
                    e.preventDefault();
                }, { passive: false });
            }
        })();

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                stopMusic();
            } else {
                if (state === 'START' || state === 'OVER') playMusic('home');
                else if (state === 'PLAY' && !paused) playMusic('game');
            }
        });

        // Start home music
        let audioStarted = false;
        function startHomeMusic() {
            if (audioStarted) return;
            audioStarted = true;
            ensureAudio();
            function play() {
                if (!muted && (state === 'START' || state === 'OVER')) { currentTrack = null; playMusic('home'); }
                document.removeEventListener('click', startHomeMusic);
                document.removeEventListener('keydown', startHomeMusic);
                document.removeEventListener('touchstart', startHomeMusic);
            }
            if (audioCtx.state === 'suspended') { audioCtx.resume().then(play); }
            else { play(); }
        }
        document.addEventListener('click', startHomeMusic);
        document.addEventListener('keydown', startHomeMusic);
        document.addEventListener('touchstart', startHomeMusic);
        startHomeMusic();

        // Init attract mode
        generateBuildings();
        placeGorillas();
        randomizeWind();

        var _tOv = document.getElementById('transition-overlay');
        if (_tOv) { setTimeout(function(){ _tOv.addEventListener('transitionend', function(){ _tOv.remove(); }, { once: true }); _tOv.style.opacity='0'; }, 50); }

        requestAnimationFrame(loop);
    })();
    </script>
</body>
