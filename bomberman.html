                updateParticles(dt);
                if (levelCompleteTimer <= 0) {
                    level++;
                    initLevel();
                }
                updateHUD();
                requestAnimationFrame(loop);
                return;
            }

            // AI mode
            if (aiMode) runAI(dt);

            // Update game
            updatePlayer(dt);
            updateBombs(dt);
            updateEnemies(dt);
            checkExplosionHits();
            updatePowerups(dt);
            updateFloatingTexts(dt);
            updateParticles(dt);

            // Reveal exit when all enemies are dead
            if (allEnemiesDead && !exitRevealed) {
                exitRevealed = true;
                if (grid[exitRow][exitCol] === BRICK) {
                    grid[exitRow][exitCol] = EMPTY;
                    spawnExplosionParticles(gridToPixelX(exitCol), gridToPixelY(exitRow), '#00ff00', 12);
                }
                addFloatingText('EXIT OPEN!', gridToPixelX(exitCol), gridToPixelY(exitRow), '#00ff00');
                sfxPowerup();
            }

            // Player death
            if (!player.alive) {
                deathTimer -= dt;
                if (deathTimer <= 0) {
                    lives--;
                    updateHUD();
                    if (lives <= 0) {
                        // Game over
                        sfxGameOver();
                        stopMusic();
                        if (!aiMode && score > 0 && (highScores.length < 10 || score > highScores[highScores.length - 1].s)) {
                            var name = prompt('HIGH SCORE! Enter name (3 chars):', 'AAA');
                            if (name) {
                                name = name.substring(0, 3).toUpperCase();
                                highScores.push({n: name, s: score});
                                highScores.sort(function(a, b) { return b.s - a.s; });
                                highScores = highScores.slice(0, 10);
                                localStorage.setItem('bomberman_scores', JSON.stringify(highScores));
                            }
                        }
                        state = 'OVER';
                        attractInitialized = false;
                        menuBtn.innerText = 'MENU';
                        menuBtn.href = 'index.html';
                        gameOverTimeoutId = setTimeout(function() { playMusic('home'); }, 1200);
                    } else {
                        resetAfterDeath();
                    }
                }
            }

            drawGameScene(dt);
            updateHUD();
            requestAnimationFrame(loop);
        }

        // === Difficulty click ===
        canvas.addEventListener('click', function(e) {
            if (state !== 'START' && state !== 'OVER') return;
            ensureAudio();
            playMusic('home');
            var rect = canvas.getBoundingClientRect();
            var scaleX = W / rect.width;
            var scaleY = H / rect.height;
            var mx = (e.clientX - rect.left) * scaleX;
            var my = (e.clientY - rect.top) * scaleY;

            // Calculate button positions (must match drawHomeScreen)
            var previewY = 180;
            var panelY = previewY + GRID_H * 0.42 + 15;
            var panelH = 130;
            var dBtnW = 100, dBtnH = 26, dBtnGap = 12;
            var dTotalW = 3 * dBtnW + 2 * dBtnGap;
            var dBtnStartX = (W - dTotalW) / 2;
            var dBtnY = panelY + panelH + 26;
            for (var d = 0; d < 3; d++) {
                var bx = dBtnStartX + d * (dBtnW + dBtnGap);
                if (mx >= bx && mx <= bx + dBtnW && my >= dBtnY && my <= dBtnY + dBtnH) {
                    difficulty = d;
                }
            }
        });

        // === Controls ===
        btn.onclick = function() {
            haptic(30);
            ensureAudio();
            if (gameOverTimeoutId) { clearTimeout(gameOverTimeoutId); gameOverTimeoutId = null; }
            score = 0; lives = 3; level = 1;
            player.maxBombs = 1; player.fireRange = 2; player.speed = 1;
            paused = false;
            keys = {};
            floatingTexts = []; particles = [];
            initLevel();
            state = 'PLAY';
            menuBtn.innerText = 'HOME';
            menuBtn.href = '#';
            lastTime = performance.now();
            gameTime = 0;
            stopMusic();
            playMusic('game');
            canvas.focus();
            updateHUD();
        };

        aiBtn.onclick = function() {
            haptic(30);
            aiMode = !aiMode;
            if (!aiMode) keys = {};
            aiBtn.innerText = aiMode ? "AI: ON" : "AI: OFF";
            aiBtn.className = aiMode ? "ai-active" : "";
            canvas.focus();
        };

        pauseBtn.onclick = function() {
            haptic(30);
            if (state !== 'PLAY') return;
            paused = !paused;
            pauseBtn.className = paused ? "pause-active" : "";
            pauseBtn.innerText = paused ? "RESUME" : "PAUSE";
            if (!paused) lastTime = performance.now();
        };

        menuBtn.onclick = function(e) {
            if (state === 'PLAY') {
                e.preventDefault();
                haptic(30);
                state = 'START';
                paused = false;
                pauseBtn.innerText = 'PAUSE';
                pauseBtn.className = '';
                stopMusic();
                keys = {};
                attractInitialized = false;
                playMusic('home');
                menuBtn.innerText = 'MENU';
                menuBtn.href = 'index.html';
            }
        };

        // === Keyboard Controls ===
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (state === 'START' || state === 'OVER') { setTimeout(function() { window.location.href = 'index.html'; }, 0); return; }
                if (paused) pauseBtn.click();
                else if (state === 'PLAY') pauseBtn.click();
                return;
            }
            if (state === 'START' || state === 'OVER') {
                if (e.key === ' ') { e.preventDefault(); btn.click(); return; }
                if (e.key === 'e' || e.key === 'E') { difficulty = 0; return; }
                if (e.key === 'm' || e.key === 'M') { difficulty = 1; return; }
                if (e.key === 'h' || e.key === 'H') { difficulty = 2; return; }
                if (e.key === 'a' || e.key === 'A') { aiBtn.click(); return; }
                if (e.key === 's' || e.key === 'S') { muteBtn.click(); return; }
                if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); return; }
                return;
            }
            if (e.key === 'a' || e.key === 'A') { aiBtn.click(); return; }
            if (e.key === 's' || e.key === 'S') { muteBtn.click(); return; }
            if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); return; }
            if (state !== 'PLAY' || paused || aiMode) return;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
                keys[e.key] = true;
            }
            if (e.key === ' ') {
                e.preventDefault();
                keys[' '] = true;
            }
        });

        window.addEventListener('keyup', function(e) {
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ') {
                keys[e.key] = false;
            }
        });

        // === Touch / Swipe ===
        var touchStartX = 0, touchStartY = 0;
        var touchTotalMove = 0;
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchTotalMove = 0;
            if (state === 'START' || state === 'OVER') {
                ensureAudio();
                playMusic('home');
                var rect = canvas.getBoundingClientRect();
                var scaleX = W / rect.width;
                var scaleY = H / rect.height;
                var mx = (e.touches[0].clientX - rect.left) * scaleX;
                var my = (e.touches[0].clientY - rect.top) * scaleY;
                var previewY = 180;
                var panelY = previewY + GRID_H * 0.42 + 15;
                var panelH = 130;
                var dBtnW = 100, dBtnH = 26, dBtnGap = 12;
                var dTotalW = 3 * dBtnW + 2 * dBtnGap;
                var dBtnStartX = (W - dTotalW) / 2;
                var dBtnY = panelY + panelH + 26;
                for (var d = 0; d < 3; d++) {
                    var bx = dBtnStartX + d * (dBtnW + dBtnGap);
                    if (mx >= bx && mx <= bx + dBtnW && my >= dBtnY && my <= dBtnY + dBtnH) {
                        difficulty = d;
                    }
                }
            }
        }, { passive: false });

        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            var touchEndX = e.changedTouches[0].clientX;
            var touchEndY = e.changedTouches[0].clientY;
            if (state !== 'PLAY' || paused || aiMode) return;
            var dx = touchEndX - touchStartX;
            var dy = touchEndY - touchStartY;
            var adx = Math.abs(dx), ady = Math.abs(dy);
            if (Math.max(adx, ady) < 25) {
                // Tap = place bomb
                keys[' '] = true;
                setTimeout(function() { keys[' '] = false; }, 200);
                return;
            }
            if (adx > ady) {
                if (dx > 0) keys['ArrowRight'] = true; else keys['ArrowLeft'] = true;
                setTimeout(function() { keys['ArrowRight'] = false; keys['ArrowLeft'] = false; }, 200);
            } else {
                if (dy > 0) keys['ArrowDown'] = true; else keys['ArrowUp'] = true;
                setTimeout(function() { keys['ArrowDown'] = false; keys['ArrowUp'] = false; }, 200);
            }
        }, { passive: false });

        // Virtual joystick + fire button
        (function() {
            var joystick = document.getElementById('joystick');
            var knob = document.getElementById('joystick-knob');
            var fireBtn = document.getElementById('fire-btn');
            if (!joystick || !knob) return;
            var BASE_R = 65, KNOB_R = 25, DEAD_ZONE = 12;
            var active = false, lastDir = null;

            function getCenter() {
                var r = joystick.getBoundingClientRect();
                return { x: r.left + BASE_R, y: r.top + BASE_R };
            }
            function updateKnob(tx, ty) {
                var c = getCenter();
                var dx = tx - c.x, dy = ty - c.y;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var maxDist = BASE_R - KNOB_R * 0.5;
                if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
                knob.style.left = (BASE_R + dx - KNOB_R) + 'px';
                knob.style.top = (BASE_R + dy - KNOB_R) + 'px';
                return { dx: dx, dy: dy, dist: Math.sqrt(dx * dx + dy * dy) };
            }
            function resetKnob() {
                knob.style.left = (BASE_R - KNOB_R) + 'px';
                knob.style.top = (BASE_R - KNOB_R) + 'px';
                knob.style.transition = 'top 0.15s, left 0.15s';
            }
            function clearDir() {
                keys['ArrowUp'] = false; keys['ArrowDown'] = false;
                keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
                lastDir = null;
            }
            function setDir(dx, dy) {
                var dir;
                if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? 'right' : 'left';
                else dir = dy > 0 ? 'down' : 'up';
                if (dir === lastDir) return;
                clearDir(); lastDir = dir; haptic(30);
                if (dir === 'up') keys['ArrowUp'] = true;
                else if (dir === 'down') keys['ArrowDown'] = true;
                else if (dir === 'left') keys['ArrowLeft'] = true;
                else if (dir === 'right') keys['ArrowRight'] = true;
            }
            joystick.addEventListener('touchstart', function(e) {
                e.preventDefault(); active = true;
                knob.style.transition = 'none';
                var t = e.touches[0];
                var v = updateKnob(t.clientX, t.clientY);
                if (v.dist > DEAD_ZONE) setDir(v.dx, v.dy);
            }, { passive: false });
            joystick.addEventListener('touchmove', function(e) {
                if (!active) return; e.preventDefault();
                var t = e.touches[0];
                var v = updateKnob(t.clientX, t.clientY);
                if (v.dist > DEAD_ZONE) setDir(v.dx, v.dy);
                else clearDir();
            }, { passive: false });
            function onEnd(e) {
                if (!active) return; e.preventDefault();
                active = false; clearDir(); resetKnob();
            }
            joystick.addEventListener('touchend', onEnd, { passive: false });
            joystick.addEventListener('touchcancel', onEnd, { passive: false });

            if (fireBtn) {
                fireBtn.addEventListener('touchstart', function(e) {
                    e.preventDefault(); haptic(50);
                    if (state !== 'PLAY' || paused || aiMode) return;
                    keys[' '] = true;
                }, { passive: false });
                fireBtn.addEventListener('touchend', function(e) {
                    e.preventDefault(); keys[' '] = false;
                }, { passive: false });
                fireBtn.addEventListener('touchcancel', function(e) {
                    e.preventDefault(); keys[' '] = false;
                }, { passive: false });
            }
        })();

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopMusic();
            } else {
                if (state === 'START' || state === 'OVER') playMusic('home');
                else if (state === 'PLAY' && !paused) playMusic('game');
            }
        });

        // Start home music
        function startHomeMusic() {
            ensureAudio();
            function play() {
                if (!muted && (state === 'START' || state === 'OVER')) { currentTrack = null; playMusic('home'); }
                document.removeEventListener('click', startHomeMusic);
                document.removeEventListener('keydown', startHomeMusic);
                document.removeEventListener('touchstart', startHomeMusic);
            }
            if (audioCtx.state === 'suspended') { audioCtx.resume().then(play); }
            else { play(); }
        }
        document.addEventListener('click', startHomeMusic);
        document.addEventListener('keydown', startHomeMusic);
        document.addEventListener('touchstart', startHomeMusic);

        var _tOv = document.getElementById('transition-overlay');
        if (_tOv) { setTimeout(function(){ _tOv.style.opacity='0'; setTimeout(function(){ _tOv.remove(); }, 400); }, 50); }

        requestAnimationFrame(loop);
    })();
    </script>
</body>
