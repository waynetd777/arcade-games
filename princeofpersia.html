                levelCompleteTimer -= dt;
                drawStars(dt);
                drawTiles();
                drawPrince();
                ctx.textAlign = 'center';
                ctx.fillStyle = '#c084fc';
                ctx.font = 'bold 28px Courier';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#c084fc';
                ctx.fillText("LEVEL CLEAR!", W / 2, H / 2);
                ctx.shadowBlur = 0;
                // Floating texts
                floatingTexts = floatingTexts.filter(function(vt) {
                    vt.y -= 40 * dt;
                    vt.life -= dt * 0.8;
                    ctx.globalAlpha = Math.max(0, vt.life);
                    ctx.fillStyle = vt.c;
                    ctx.font = 'bold 18px Courier';
                    ctx.textAlign = 'center';
                    ctx.fillText(vt.t, vt.x - camX, vt.y - camY);
                    return vt.life > 0;
                });
                ctx.globalAlpha = 1;
                if (levelCompleteTimer <= 0) {
                    level++;
                    initLevel();
                }
                updateHUD();
                requestAnimationFrame(loop);
                return;
            }

            // Death animation
            if (deathTimer > 0) {
                deathTimer -= dt;
                drawStars(dt);
                drawTiles();
                drawPrince();
                guards.forEach(function(g) { drawGuard(g); });
                // Particles
                particles.forEach(function(p) {
                    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                    if (p.life > 0) {
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.fillRect(p.x - camX, p.y - camY, p.size, p.size);
                    }
                });
                particles = particles.filter(function(p) { return p.life > 0; });
                ctx.globalAlpha = 1;
                drawHUD();

                if (deathTimer <= 0) {
                    lives--;
                    health = DIFF_HEALTH[difficulty];
                    updateHUD();
                    if (lives <= 0) {
                        state = 'OVER';
                        titleTimer = 0;
                        stopMusic();
                        sfxGameOver();
                        if (gameOverTimeoutId) clearTimeout(gameOverTimeoutId);
                        gameOverTimeoutId = setTimeout(function() {
                            if (state !== 'OVER') return;
                            if (!aiMode && score >= 100 && (highScores.length < 10 || score >= highScores[highScores.length - 1].s)) {
                                stopMusic();
                                const n = prompt("LEGENDARY SCORE! Enter Initials:", "ACE");
                                if (n) {
                                    highScores.push({ n: n.substring(0, 3).toUpperCase(), s: score });
                                    highScores.sort(function(a, b) { return b.s - a.s; });
                                    highScores = highScores.slice(0, 10);
                                    localStorage.setItem('pop_deluxe_scores', JSON.stringify(highScores));
                                }
                            }
                            playMusic('home');
                        }, 1000);
                    } else {
                        initLevel();
                    }
                }
                updateHUD();
                requestAnimationFrame(loop);
                return;
            }

            if (aiMode) runAI(dt);

            // Timer
            timeLeft -= dt;
            if (timeLeft <= 0) {
                timeLeft = 0;
                killPrince();
            }

            // Update
            updatePrince(dt);
            updateGuards(dt);
            updateFallingTiles(dt);
            updateCamera();

            // === Draw ===
            // Background gradient (cached)
            ctx.fillStyle = bgGradGame;
            ctx.fillRect(0, 0, W, H);

            drawTiles();

            // Guards
            guards.forEach(function(g) { drawGuard(g); });

            // Prince
            drawPrince();

            // Particles
            particles.forEach(function(p) {
                p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                if (p.life > 0) {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.fillRect(p.x - camX, p.y - camY, p.size, p.size);
                }
            });
            particles = particles.filter(function(p) { return p.life > 0; });
            ctx.globalAlpha = 1;

            // Floating texts
            floatingTexts = floatingTexts.filter(function(vt) {
                vt.y -= 40 * dt;
                vt.life -= dt * 0.8;
                ctx.globalAlpha = Math.max(0, vt.life);
                ctx.fillStyle = vt.c;
                ctx.font = 'bold 18px Courier';
                ctx.textAlign = 'center';
                ctx.fillText(vt.t, vt.x - camX, vt.y - camY);
                return vt.life > 0;
            });
            ctx.globalAlpha = 1;

            // HUD
            drawHUD();

            updateHUD();
            requestAnimationFrame(loop);
        }

        function drawGameContent() {
            drawTiles();
            guards.forEach(function(g) { drawGuard(g); });
            drawPrince();
            drawHUD();
        }

        // === Home Screen ===
        let homeAnimTimer = 0;
        const homeTorches = [];
        for (let ti = 0; ti < 6; ti++) {
            homeTorches.push({ x: 40 + ti * 100, y: 120 + Math.random() * 40, flicker: Math.random() * Math.PI * 2 });
        }

        function drawHomeScreen(dt) {
            titleTimer += dt;
            homeAnimTimer += dt;

            ctx.fillStyle = bgGradHome;
            ctx.fillRect(0, 0, W, H);

            drawStars(dt);

            // Animated torches on edges
            homeTorches.forEach(function(torch) {
                const flicker = Math.sin(homeAnimTimer * 6 + torch.flicker) * 3;
                // Torch bracket
                ctx.fillStyle = '#555';
                ctx.fillRect(torch.x - 2, torch.y, 4, 15);
                // Flame
                ctx.fillStyle = '#ff6600';
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#ff6600';
                ctx.beginPath();
                ctx.ellipse(torch.x, torch.y - 4 + flicker, 5, 8 + flicker, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.ellipse(torch.x, torch.y - 2 + flicker, 3, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            // Title pulse
            const titlePulse = 1 + 0.05 * Math.sin(titleTimer * 8);
            const titleGlow = 15 + 10 * Math.sin(titleTimer * 8);
            const titleSize = Math.round(32 * titlePulse);

            ctx.textAlign = 'center';
            ctx.fillStyle = '#c084fc';
            ctx.font = 'bold ' + titleSize + 'px Courier';
            ctx.shadowBlur = titleGlow;
            ctx.shadowColor = '#c084fc';
            ctx.fillText("PRINCE OF", W / 2, 52);
            ctx.font = 'bold ' + Math.round(40 * titlePulse) + 'px Courier';
            ctx.fillStyle = '#ffd700';
            ctx.shadowColor = '#ffd700';
            ctx.fillText("PERSIA", W / 2, 88);
            ctx.shadowBlur = 0;

            // High scores panel
            const panelX = W / 2 - 160, panelY = 100, panelW = 320, panelH = 280;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(panelX, panelY, panelW, panelH);
            ctx.strokeStyle = '#c084fc';
            ctx.lineWidth = 2;
            ctx.strokeRect(panelX, panelY, panelW, panelH);

            ctx.fillStyle = '#c084fc';
            ctx.font = 'bold 16px Courier';
            ctx.textAlign = 'center';
            ctx.fillText("--- HALL OF FAME ---", W / 2, panelY + 25);

            ctx.fillStyle = '#666';
            ctx.font = '11px Courier';
            ctx.textAlign = 'left';
            ctx.fillText("RNK", panelX + 15, panelY + 45);
            ctx.fillText("NAME", panelX + 55, panelY + 45);
            ctx.textAlign = 'right';
            ctx.fillText("SCORE", panelX + panelW - 15, panelY + 45);

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(panelX + 10, panelY + 50);
            ctx.lineTo(panelX + panelW - 10, panelY + 50);
            ctx.stroke();

            for (let i = 0; i < 10; i++) {
                const rowY = panelY + 68 + i * 22;
                if (i < highScores.length) {
                    const h = highScores[i];
                    const isTop3 = i < 3;
                    ctx.fillStyle = isTop3 ? ['#ffd700', '#c0c0c0', '#cd7f32'][i] : '#aaa';
                    ctx.font = isTop3 ? 'bold 13px Courier' : '13px Courier';
                    ctx.textAlign = 'left';
                    ctx.fillText(((i + 1).toString()).padStart(2, ' ') + '.', panelX + 15, rowY);
                    ctx.fillText(h.n, panelX + 55, rowY);
                    ctx.textAlign = 'right';
                    ctx.fillText(h.s, panelX + panelW - 15, rowY);
                } else {
                    ctx.fillStyle = '#333';
                    ctx.font = '13px Courier';
                    ctx.textAlign = 'left';
                    ctx.fillText(((i + 1).toString()).padStart(2, ' ') + '.', panelX + 15, rowY);
                    ctx.fillText("---", panelX + 55, rowY);
                    ctx.textAlign = 'right';
                    ctx.fillText("---", panelX + panelW - 15, rowY);
                }
            }

            // Difficulty selector
            ctx.textAlign = 'center';
            ctx.fillStyle = '#aaa';
            ctx.font = 'bold 14px Courier';
            ctx.fillText("DIFFICULTY", W / 2, 408);

            const dBtnW = 100, dBtnH = 30, dBtnGap = 12;
            const dTotalW = 3 * dBtnW + 2 * dBtnGap;
            const dBtnStartX = (W - dTotalW) / 2;
            const dBtnY = 418;
            for (let d = 0; d < 3; d++) {
                const bx = dBtnStartX + d * (dBtnW + dBtnGap);
                const selected = d === difficulty;
                ctx.fillStyle = selected ? DIFF_COLORS[d] : '#222';
                ctx.fillRect(bx, dBtnY, dBtnW, dBtnH);
                ctx.strokeStyle = DIFF_COLORS[d];
                ctx.lineWidth = selected ? 2 : 1;
                ctx.strokeRect(bx, dBtnY, dBtnW, dBtnH);
                ctx.fillStyle = selected ? '#000' : DIFF_COLORS[d];
                ctx.font = selected ? 'bold 12px Courier' : '12px Courier';
                ctx.textAlign = 'center';
                ctx.fillText(DIFF_NAMES[d], bx + dBtnW / 2, dBtnY + 20);
            }

            // Controls info
            ctx.textAlign = 'center';
            ctx.font = '12px Courier';
            ctx.fillStyle = '#888';
            ctx.fillText("CONTROLS:", W / 2, 470);
            const ctrlInfo = [
                { label: 'ARROWS: MOVE', color: '#c084fc' },
                { label: 'SPACE: JUMP', color: '#33ff66' },
                { label: 'Z: ATTACK', color: '#ff6666' }
            ];
            ctrlInfo.forEach(function(ci, idx) {
                const cx = W / 2 - 120 + idx * 120;
                ctx.fillStyle = ci.color;
                ctx.font = '10px Courier';
                ctx.fillText(ci.label, cx, 488);
            });

            // Bottom text
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Courier';
            ctx.fillText(state === 'START' ? "ESCAPE THE DUNGEON!" : "GAME OVER", W / 2, 520);
            if (state === 'OVER') {
                ctx.font = 'bold 14px Courier';
                ctx.fillStyle = '#ffd700';
                ctx.fillText("FINAL SCORE: " + score, W / 2, 540);
            }
            ctx.font = '12px Courier';
            ctx.fillStyle = '#888';
            ctx.fillText("SPACE: START | P: PAUSE | A: AI | S: SOUND | ESC: MENU", W / 2, 560);
            ctx.fillText("DOWN: CAREFUL STEP | CROUCH BLOCKS ATTACKS", W / 2, 578);
        }

        // === Difficulty click ===
        canvas.addEventListener('click', function(e) {
            if (state !== 'START' && state !== 'OVER') return;
            ensureAudio();
            playMusic('home');
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            const scaleY = H / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;
            const dBtnW = 100, dBtnH = 30, dBtnGap = 12;
            const dTotalW = 3 * dBtnW + 2 * dBtnGap;
            const dBtnStartX = (W - dTotalW) / 2;
            const dBtnY = 418;
            for (let d = 0; d < 3; d++) {
                const bx = dBtnStartX + d * (dBtnW + dBtnGap);
                if (mx >= bx && mx <= bx + dBtnW && my >= dBtnY && my <= dBtnY + dBtnH) {
                    difficulty = d;
                }
            }
        });

        // === Controls ===
        btn.onclick = function() {
            haptic(30);
            ensureAudio();
            if (gameOverTimeoutId) { clearTimeout(gameOverTimeoutId); gameOverTimeoutId = null; }
            score = 0; lives = 3; health = DIFF_HEALTH[difficulty]; level = 1;
            paused = false;
            keys = {};
            floatingTexts = []; particles = [];
            initLevel();
            state = 'PLAY';
            lastTime = performance.now();
            gameTime = 0;
            playMusic('game');
            canvas.focus();
            updateHUD();
        };

        aiBtn.onclick = function() {
            haptic(30);
            aiMode = !aiMode;
            if (!aiMode) keys = {};
            aiBtn.innerText = aiMode ? "AI: ON" : "AI: OFF";
            aiBtn.className = aiMode ? "ai-active" : "";
            canvas.focus();
        };

        pauseBtn.onclick = function() {
            haptic(30);
            if (state !== 'PLAY') return;
            paused = !paused;
            pauseBtn.className = paused ? "pause-active" : "";
            pauseBtn.innerText = paused ? "RESUME" : "PAUSE";
            if (!paused) lastTime = performance.now();
        };

        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (state === 'START' || state === 'OVER') { setTimeout(function() { window.location.href = 'index.html'; }, 0); return; }
                if (paused) pauseBtn.click();
                else if (state === 'PLAY') pauseBtn.click();
                return;
            }
            if (state === 'START' || state === 'OVER') {
                if (e.key === ' ') { e.preventDefault(); btn.click(); return; }
                if (e.key === 'e' || e.key === 'E') { difficulty = 0; return; }
                if (e.key === 'm' || e.key === 'M') { difficulty = 1; return; }
                if (e.key === 'h' || e.key === 'H') { difficulty = 2; return; }
                if (e.key === 'a' || e.key === 'A') { aiBtn.click(); return; }
                if (e.key === 's' || e.key === 'S') { muteBtn.click(); return; }
                if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); return; }
                return;
            }
            if (e.key === 'a' || e.key === 'A') { aiBtn.click(); return; }
            if (e.key === 's' || e.key === 'S') { muteBtn.click(); return; }
            if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); return; }
            if (state !== 'PLAY' || paused || aiMode) return;
            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','z','Z'].indexOf(e.key) >= 0) {
                e.preventDefault();
                keys[e.key] = true;
            }
        });

        window.addEventListener('keyup', function(e) {
            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' ','z','Z'].indexOf(e.key) >= 0) {
                keys[e.key] = false;
            }
        });

        // === Touch ===
        let touchStartX = 0;
        let touchStartY = 0;
        let touchTotalMove = 0;
        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchTotalMove = 0;
            if (state === 'START' || state === 'OVER') {
                ensureAudio();
                playMusic('home');
                const rect = canvas.getBoundingClientRect();
                const scaleX = W / rect.width;
                const scaleY = H / rect.height;
                const mx = (e.touches[0].clientX - rect.left) * scaleX;
                const my = (e.touches[0].clientY - rect.top) * scaleY;
                const dBtnW = 100, dBtnH = 30, dBtnGap = 12;
                const dTotalW = 3 * dBtnW + 2 * dBtnGap;
                const dBtnStartX = (W - dTotalW) / 2;
                const dBtnY = 418;
                for (let d = 0; d < 3; d++) {
                    const bx = dBtnStartX + d * (dBtnW + dBtnGap);
                    if (mx >= bx && mx <= bx + dBtnW && my >= dBtnY && my <= dBtnY + dBtnH) {
                        difficulty = d;
                    }
                }
            }
        }, { passive: false });
        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            touchTotalMove += Math.abs(e.touches[0].clientX - touchStartX) + Math.abs(e.touches[0].clientY - touchStartY);
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: false });
        document.addEventListener('touchend', function() {
            if (touchTotalMove < 10 && state === 'PLAY' && !paused && !aiMode) {
                keys[' '] = true;
                setTimeout(function() { keys[' '] = false; }, 100);
            }
        });
        document.addEventListener('touchcancel', function() {});

        // D-pad
        const dLeft = document.getElementById('d-left');
        const dRight = document.getElementById('d-right');
        const dUp = document.getElementById('d-up');
        const dDown = document.getElementById('d-down');
        const dFire = document.getElementById('d-fire');
        const dAttack = document.getElementById('d-attack');
        if (dLeft) {
            dLeft.addEventListener('touchstart', function(e) { e.preventDefault(); haptic(50); if (state !== 'PLAY' || paused || aiMode) return; keys['ArrowLeft'] = true; });
            dLeft.addEventListener('touchend', function(e) { e.preventDefault(); keys['ArrowLeft'] = false; });
        }
        if (dRight) {
            dRight.addEventListener('touchstart', function(e) { e.preventDefault(); haptic(50); if (state !== 'PLAY' || paused || aiMode) return; keys['ArrowRight'] = true; });
            dRight.addEventListener('touchend', function(e) { e.preventDefault(); keys['ArrowRight'] = false; });
        }
        if (dUp) {
            dUp.addEventListener('touchstart', function(e) { e.preventDefault(); haptic(50); if (state !== 'PLAY' || paused || aiMode) return; keys['ArrowUp'] = true; });
            dUp.addEventListener('touchend', function(e) { e.preventDefault(); keys['ArrowUp'] = false; });
        }
        if (dDown) {
            dDown.addEventListener('touchstart', function(e) { e.preventDefault(); haptic(50); if (state !== 'PLAY' || paused || aiMode) return; keys['ArrowDown'] = true; });
            dDown.addEventListener('touchend', function(e) { e.preventDefault(); keys['ArrowDown'] = false; });
        }
        if (dFire) {
            dFire.addEventListener('touchstart', function(e) { e.preventDefault(); haptic(50); if (state !== 'PLAY' || paused || aiMode) return; keys[' '] = true; });
            dFire.addEventListener('touchend', function(e) { e.preventDefault(); keys[' '] = false; });
        }
        if (dAttack) {
            dAttack.addEventListener('touchstart', function(e) { e.preventDefault(); haptic(50); if (state !== 'PLAY' || paused || aiMode) return; keys['z'] = true; });
            dAttack.addEventListener('touchend', function(e) { e.preventDefault(); keys['z'] = false; });
        }

        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                stopMusic();
            } else {
                if (state === 'START' || state === 'OVER') playMusic('home');
                else if (state === 'PLAY' && !paused) playMusic('game');
            }
        });

        // Start home music
        function startHomeMusic() {
            ensureAudio();
            function play() {
                if (!muted && (state === 'START' || state === 'OVER')) { currentTrack = null; playMusic('home'); }
                document.removeEventListener('click', startHomeMusic);
                document.removeEventListener('keydown', startHomeMusic);
                document.removeEventListener('touchstart', startHomeMusic);
            }
            if (audioCtx.state === 'suspended') { audioCtx.resume().then(play); }
            else { play(); }
        }
        document.addEventListener('click', startHomeMusic);
        document.addEventListener('keydown', startHomeMusic);
        document.addEventListener('touchstart', startHomeMusic);
        startHomeMusic();

        const _tOv = document.getElementById('transition-overlay');
        if (_tOv) { setTimeout(function(){ _tOv.style.opacity='0'; setTimeout(function(){ _tOv.remove(); }, 400); }, 60); }

        requestAnimationFrame(loop);
    })();
    </script>
</body>
</html>
