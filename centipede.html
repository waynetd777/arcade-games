<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00e5ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Centipede Deluxe</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23111'/%3E%3Crect x='4' y='3' width='24' height='18' rx='2' fill='%23000' stroke='%2300e5ff' stroke-width='1.5'/%3E%3Crect x='8' y='6' width='16' height='12' rx='1' fill='%23001a2e'/%3E%3Ccircle cx='10' cy='10' r='1.5' fill='%234ae04a'/%3E%3Ccircle cx='14' cy='8' r='1.5' fill='%23ffff00'/%3E%3Ccircle cx='18' cy='11' r='1.5' fill='%23ff4444'/%3E%3Ccircle cx='22' cy='9' r='1.5' fill='%2300e5ff'/%3E%3Crect x='8' y='24' width='4' height='5' rx='1' fill='%23ff4444'/%3E%3Crect x='14' y='24' width='4' height='5' rx='1' fill='%234ae04a'/%3E%3Ccircle cx='27' cy='26' r='2.5' fill='%23ffaa00'/%3E%3C/svg%3E">
    <style>
        body { background: #050505; color: #ffc107; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; margin: 0; padding: 10px; box-sizing: border-box; overflow: auto; user-select: none; touch-action: manipulation; }
        .stats { margin-bottom: 10px; font-size: 22px; display: flex; gap: 30px; font-weight: bold; text-shadow: 2px 2px #000; flex-wrap: wrap; justify-content: center; }
        #s, #l, #v { color: #fff; }
        #game-wrapper { position: relative; border: 4px solid #333; box-shadow: 0 0 50px rgba(255, 193, 7, 0.15); border-radius: 8px; overflow: hidden; touch-action: none; max-width: 560px; width: 100%; }
        canvas { display: block; background: #000; cursor: crosshair; width: 100%; height: auto; }
        .controls { display: flex; gap: 15px; margin-top: 15px; z-index: 10; flex-wrap: wrap; justify-content: center; }
        button { padding: 14px 25px; font-size: 16px; font-family: inherit; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; transition: 0.2s; text-transform: uppercase; min-height: 44px; }
        #b { background: linear-gradient(180deg, #ffc107, #c89900); color: #000; box-shadow: 0 4px 0 #8a6d00; }
        #ai-btn { background: #222; color: #00ccff; border: 2px solid #00ccff; box-shadow: 0 0 10px rgba(0, 204, 255, 0.3); }
        #pause-btn { background: #222; color: #ffaa00; border: 2px solid #ffaa00; box-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }
        button:active { transform: translateY(3px); box-shadow: none; }
        .ai-active { background: #00ccff !important; color: #000 !important; box-shadow: 0 0 20px #00ccff !important; }
        .pause-active { background: #ffaa00 !important; color: #000 !important; box-shadow: 0 0 20px #ffaa00 !important; }
        .touch-controls { display: none; margin-top: 30px; width: 100%; max-width: 560px; justify-content: space-between; align-items: center; padding: 0 20px; box-sizing: border-box; }
        @media (pointer: coarse) { .touch-controls { display: flex; } }
        .joystick-area { position: relative; width: 130px; height: 130px; touch-action: none; flex-shrink: 0; }
        .joystick-base { position: absolute; top: 0; left: 0; width: 130px; height: 130px; border-radius: 50%; background: rgba(255, 193, 7, 0.08); border: 2px solid rgba(255, 193, 7, 0.25); }
        .joystick-knob { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 40% 38%, rgba(255, 193, 7, 0.45), rgba(255, 193, 7, 0.18)); border: 2px solid rgba(255, 193, 7, 0.5); transition: top 0.08s, left 0.08s; pointer-events: none; }
        .joystick-dir { position: absolute; font-size: 14px; color: rgba(255, 193, 7, 0.3); pointer-events: none; font-family: 'Courier New', monospace; font-weight: bold; }
        .joystick-dir.up { top: 4px; left: 50%; transform: translateX(-50%); }
        .joystick-dir.down { bottom: 4px; left: 50%; transform: translateX(-50%); }
        .joystick-dir.left { left: 8px; top: 50%; transform: translateY(-50%); }
        .joystick-dir.right { right: 8px; top: 50%; transform: translateY(-50%); }
        .fire-btn { width: 80px; height: 80px; border-radius: 50%; background: rgba(255, 193, 7, 0.15); border: 3px solid rgba(255, 193, 7, 0.5); color: rgba(255, 193, 7, 0.8); font-family: 'Courier New', monospace; font-weight: bold; font-size: 14px; cursor: pointer; touch-action: none; flex-shrink: 0; text-transform: uppercase; display: flex; align-items: center; justify-content: center; padding: 0; line-height: 1; }
        .fire-btn:active { background: rgba(255, 193, 7, 0.4); }
        @media (max-width: 580px) { .stats { font-size: 14px; gap: 10px; } .controls { display: flex; gap: 4px; margin-top: 8px; width: 100%; flex-wrap: nowrap; } .controls button, .controls a { padding: 8px 2px !important; font-size: 11px !important; text-align: center; box-sizing: border-box; flex: 1; min-width: 0; } }
        #transition-overlay { position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;opacity:1;pointer-events:none;background:repeating-linear-gradient(0deg,#000 0px,#000 2px,rgba(0,0,0,0.85) 2px,rgba(0,0,0,0.85) 4px);transition:opacity 0.4s; }
    </style>
</head>
<body>
    <div id="transition-overlay"></div>

    <div class="stats">
        <div>SCORE: <span id="s">0</span></div>
        <div>LIVES: <span id="l">3</span></div>
        <div>LVL: <span id="v">1</span></div>
    </div>

    <div id="game-wrapper">
        <canvas id="c" width="560" height="600"></canvas>
    </div>

    <div class="controls">
        <button id="b">START</button>
        <button id="pause-btn">PAUSE</button>
        <button id="ai-btn">AI: OFF</button>
        <button id="mute-btn" style="background:#222;color:#0ff;border:2px solid #0ff;line-height:0;padding:6px;"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16,7.5 Q21,12 16,16.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        <a id="menu-btn" href="index.html" style="padding: 12px 25px; font-size: 16px; font-family: 'Courier New', Courier, monospace; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; text-transform: uppercase; background: #222; color: #fff; border: 2px solid #fff; text-decoration: none; display: inline-block; transition: 0.2s;">MENU</a>
    </div>

    <div class="touch-controls">
        <div class="joystick-area" id="joystick">
            <div class="joystick-base"></div>
            <div class="joystick-knob" id="joystick-knob"></div>
            <div class="joystick-dir up">&#9650;</div>
            <div class="joystick-dir down">&#9660;</div>
            <div class="joystick-dir left">&#9664;</div>
            <div class="joystick-dir right">&#9654;</div>
        </div>
        <button class="fire-btn" id="fire-btn">FIRE</button>
    </div>

    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js', { updateViaCache: 'none' }).then(function(r){ r.update(); });</script>
    <script>
    (function() {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('b');
        const menuBtn = document.getElementById('menu-btn');
        const aiBtn = document.getElementById('ai-btn');
        const pauseBtn = document.getElementById('pause-btn');
        let muted = localStorage.getItem('arcade_muted') === 'true';
        const _mob = window.innerWidth <= 580;
        const muteBtn = document.getElementById('mute-btn');
        const _spkOn = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16,7.5 Q21,12 16,16.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        const _spkOff = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="15" y1="9" x2="21" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="21" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        muteBtn.innerHTML = muted ? _spkOff : _spkOn;
        muteBtn.onclick = () => { haptic(30); muted = !muted; localStorage.setItem('arcade_muted', muted); muteBtn.innerHTML = muted ? _spkOff : _spkOn; if (muted) stopMusic(); else { currentTrack = null; if (state === 'START' || state === 'OVER') playMusic('home'); else if (state === 'PLAY' && !paused) playMusic('game'); } };
        function haptic(ms) { try { if (navigator.vibrate) navigator.vibrate(ms || 50); } catch(e) {} }

        const W = 560, H = 600;
        canvas.width = W;
        canvas.height = H;

        // Grid
        const COLS = 28, ROWS = 30;
        const TILE = W / COLS; // 20
        const PLAYER_ZONE_ROWS = 6;

        let state = 'START', aiMode = false, paused = false;
        let score = 0, lives = 3, level = 1, lastTime = performance.now(), gameTime = 0;
        let floatingTexts = [], particles = [], stars = [];
        let difficulty = 1;
        const DIFF_NAMES = ['E: EASY', 'M: MEDIUM', 'H: HARD'];
        const DIFF_COLORS = ['#4ae04a', '#ffaa00', '#ff3333'];
        const DIFF_SPEED = [0.7, 1.0, 1.4];
        let highScores = JSON.parse(localStorage.getItem('centipede_deluxe_scores')) || [{n:'CPU', s:5000}];
        highScores = highScores.slice(0, 10);

        let titleTimer = 0;
        let gameOverTimeoutId = null;

        // Player
        let player = { x: W / 2, y: H - TILE * 1.5 };
        let playerBullet = null;
        let fireTimer = 0;
        let keys = {};
        let deathTimer = 0;
        let levelStartTimer = 0;

        // Mushrooms: grid[row][col] = hp (0=empty, 1-4=mushroom, negative=poisoned)
        let mushrooms = [];

        // Centipede segments
        let centipedes = []; // array of centipede chains: [{x, y, dir, isHead}]

        // Enemies
        let spider = null;
        let spiderTimer = 0;
        let flea = null;
        let fleaTimer = 0;
        let scorpion = null;
        let scorpionTimer = 0;

        // Stars
        function initStars() {
            stars = [];
            for (let i = 0; i < 60; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    s: Math.random() * 1.5 + 0.5,
                    b: Math.random(),
                    speed: Math.random() * 0.5 + 0.5
                });
            }
        }
        initStars();

        // === Sound Engine ===
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

        function playTone(freq, duration, type, vol) {
            if (muted) return;
            type = type || 'square';
            vol = vol !== undefined ? vol : 0.12;
            ensureAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            osc.onended = function() { osc.disconnect(); gain.disconnect(); };
        }

        function sfxShoot() { playTone(880, 0.03, 'square', 0.07); playTone(1320, 0.02, 'square', 0.05); }
        function sfxMushroomHit() { playTone(350, 0.05, 'square', 0.07); playTone(220, 0.04, 'square', 0.05); }
        function sfxSegmentHit() {
            playTone(660, 0.05, 'square', 0.1);
            playTone(440, 0.04, 'square', 0.08);
            setTimeout(function() { playTone(330, 0.04, 'square', 0.06); }, 40);
        }
        function sfxSpider() { playTone(185, 0.03, 'square', 0.05); playTone(220, 0.03, 'square', 0.04); }
        function sfxSpiderHit() {
            playTone(550, 0.06, 'square', 0.1);
            setTimeout(function() { playTone(770, 0.05, 'square', 0.08); }, 30);
            setTimeout(function() { playTone(1100, 0.04, 'square', 0.06); }, 60);
        }
        function sfxFlea() { playTone(1100, 0.02, 'square', 0.05); playTone(880, 0.02, 'square', 0.04); }
        function sfxPlayerHit() {
            [440, 330, 220, 165, 110].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.1, 'square', 0.11); }, i * 40); });
        }
        function sfxLevelClear() {
            [440, 523, 660, 784, 880, 1047, 1320].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.1, 'square', 0.1); }, i * 60); });
        }
        function sfxGameOver() {
            [523, 494, 440, 392, 330, 294, 262].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.15, 'square', 0.1); }, i * 90); });
            setTimeout(function() { playTone(131, 0.3, 'square', 0.08); }, 650);
        }
        function sfxScorpion() { playTone(147, 0.03, 'square', 0.05); playTone(175, 0.03, 'square', 0.04); }

        // === Music Engine ===
        let musicInterval = null;
        let currentTrack = null;

        function stopMusic() {
            if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
            currentTrack = null;
        }

        function playMusic(track) {
            if (currentTrack === track) return;
            stopMusic();
            currentTrack = track;
            if (muted) return;
            ensureAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();

            // Home: frantic insectoid scurrying in B minor
            var homeMelody = [
                494, 554, 587, 659, 740, 784, 740, 659,
                587, 554, 494, 0, 554, 587, 659, 740,
                784, 880, 988, 880, 784, 740, 659, 587,
                554, 494, 0, 554, 587, 0, 659, 740,
                784, 0, 740, 659, 587, 554, 494, 554,
                587, 659, 740, 784, 880, 0, 988, 880,
                784, 740, 659, 0, 587, 554, 494, 554,
                587, 659, 587, 554, 494, 0, 0, 0
            ];
            var homeBass = [
                247, 277, 294, 0, 247, 0, 294, 330,
                370, 0, 330, 294, 247, 0, 277, 294,
                330, 370, 0, 392, 370, 330, 0, 294,
                247, 0, 277, 0, 294, 330, 0, 370,
                392, 0, 370, 330, 294, 0, 247, 277,
                294, 330, 0, 370, 392, 0, 440, 392,
                370, 330, 0, 294, 247, 0, 277, 294,
                330, 0, 294, 247, 247, 0, 0, 0
            ];
            // Game: rapid-fire bug scurrying in B minor
            var gameMelody = [
                494, 554, 587, 659, 740, 784, 880, 988,
                880, 784, 740, 659, 587, 554, 494, 0,
                554, 587, 659, 740, 0, 784, 880, 988,
                880, 784, 740, 0, 659, 587, 554, 494,
                587, 659, 740, 784, 880, 988, 0, 880,
                784, 740, 659, 587, 554, 0, 494, 554,
                587, 659, 740, 0, 784, 880, 988, 880,
                784, 740, 659, 587, 554, 0, 0, 0
            ];
            var gameBass = [
                247, 0, 294, 0, 247, 294, 330, 0,
                370, 0, 330, 0, 294, 247, 0, 277,
                294, 0, 330, 370, 0, 392, 0, 440,
                392, 370, 0, 330, 294, 0, 247, 0,
                277, 294, 330, 0, 370, 392, 0, 440,
                392, 370, 330, 0, 294, 0, 247, 277,
                294, 0, 330, 0, 370, 392, 440, 392,
                370, 330, 294, 0, 247, 0, 0, 0
            ];

            var melody = track === 'home' ? homeMelody : gameMelody;
            var bass = track === 'home' ? homeBass : gameBass;
            var tempo = track === 'home' ? 230 : 290;
            var melVol = 0.05;
            var bassVol = 0.03;
            var stepMs = 60000 / tempo;
            var step = 0;

            musicInterval = setInterval(function() {
                if (paused) return;
                var note = melody[step % melody.length];
                var bn = bass[step % bass.length];
                if (note > 0) playTone(note, stepMs / 1000 * 0.4, 'square', melVol);
                if (bn > 0) playTone(bn, stepMs / 1000 * 0.4, 'square', bassVol);
                step++;
            }, stepMs);
        }

        // === Mushrooms ===
        function initMushrooms() {
            mushrooms = [];
            for (var r = 0; r < ROWS; r++) {
                mushrooms[r] = [];
                for (var c = 0; c < COLS; c++) {
                    mushrooms[r][c] = 0;
                }
            }
            // Scatter mushrooms randomly (not in top 2 rows or bottom row)
            var count = 25 + level * 3;
            for (var i = 0; i < count; i++) {
                var mr = 2 + Math.floor(Math.random() * (ROWS - 4));
                var mc = Math.floor(Math.random() * COLS);
                if (mushrooms[mr][mc] === 0) {
                    mushrooms[mr][mc] = 4;
                }
            }
        }

        function gridCol(x) { return Math.floor(x / TILE); }
        function gridRow(y) { return Math.floor(y / TILE); }

        function mushroomAt(r, c) {
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return false;
            return mushrooms[r][c] !== 0;
        }

        // === Centipede ===
        function initCentipede() {
            centipedes = [];
            var segCount = 10 + Math.min(level, 5);
            var startRow = Math.min(level - 1, 5);
            var chain = [];
            for (var i = 0; i < segCount; i++) {
                chain.push({
                    x: (COLS - 1 - i) * TILE + TILE / 2,
                    y: startRow * TILE + TILE / 2,
                    dir: -1, // -1 = left, 1 = right
                    isHead: i === 0,
                    dropTarget: -1,
                    poisonDrop: false,
                    ascending: false
                });
            }
            centipedes.push(chain);
        }

        function initLevel() {
            player.x = W / 2;
            player.y = H - TILE * 1.5;
            playerBullet = null;
            fireTimer = 0;
            deathTimer = 0;
            levelStartTimer = 1.5;
            initMushrooms();
            initCentipede();
            spider = null;
            spiderTimer = 3 + Math.random() * 5;
            flea = null;
            fleaTimer = 5 + Math.random() * 8;
            scorpion = null;
            scorpionTimer = 10 + Math.random() * 15;
        }

        function resetAfterDeath() {
            player.x = W / 2;
            player.y = H - TILE * 1.5;
            playerBullet = null;
            fireTimer = 0;
            deathTimer = 0;
            levelStartTimer = 1.0;
            // Repair all partially damaged mushrooms to full
            for (var r = 0; r < ROWS; r++) {
                for (var c = 0; c < COLS; c++) {
                    if (mushrooms[r][c] > 0 && mushrooms[r][c] < 4) mushrooms[r][c] = 4;
                    if (mushrooms[r][c] < 0) mushrooms[r][c] = 4; // un-poison
                }
            }
            // Reset centipede and enemies
            initCentipede();
            spider = null;
            flea = null;
            scorpion = null;
            spiderTimer = 3 + Math.random() * 3;
            fleaTimer = 4 + Math.random() * 4;
            scorpionTimer = 5 + Math.random() * 5;
        }

        // === Particles ===
        function spawnExplosion(x, y, color, count) {
            for (var i = 0; i < count; i++) {
                var angle = Math.random() * Math.PI * 2;
                var speed = Math.random() * 120 + 30;
                particles.push({
                    x: x, y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.5 + Math.random() * 0.5,
                    color: color, size: Math.random() * 3 + 1
                });
            }
        }

        // === Drawing ===
        function drawStars(dt) {
            stars.forEach(function(s) {
                s.b += dt * s.speed;
                var brightness = (Math.sin(s.b) + 1) / 2;
                ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + brightness * 0.5) + ')';
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });
        }

        function drawMushroom(col, row, hp, poisoned) {
            var x = col * TILE;
            var y = row * TILE;
            var absHp = Math.abs(hp);
            // Red caps, brown stems (poisoned = magenta cap, purple stem)
            var capColors = poisoned
                ? ['#ff00ff', '#cc00cc', '#9900aa', '#660077']
                : ['#ff6b6b', '#dd4444', '#aa2222', '#771111'];
            var capColor = capColors[4 - absHp] || capColors[0];
            var stemColor = poisoned ? '#884488' : '#8B7355';

            ctx.shadowBlur = 3;
            ctx.shadowColor = capColor;

            var cx = x + TILE / 2;
            var cy = y + TILE / 2;
            var r = TILE / 2 - 1;

            if (absHp >= 3) {
                // Full - brown stem + red dome cap
                ctx.fillStyle = stemColor;
                ctx.fillRect(cx - 2, cy - 1, 4, r + 2);
                ctx.fillStyle = capColor;
                ctx.beginPath();
                ctx.arc(cx, cy - 2, r, Math.PI, 0);
                ctx.fill();
            } else if (absHp === 2) {
                // Damaged - shorter stem + smaller cap
                ctx.fillStyle = stemColor;
                ctx.fillRect(cx - 2, cy, 4, r);
                ctx.fillStyle = capColor;
                ctx.beginPath();
                ctx.arc(cx, cy, r * 0.8, Math.PI, 0);
                ctx.fill();
            } else {
                // Very damaged - stub
                ctx.fillStyle = stemColor;
                ctx.fillRect(cx - 2, cy + 1, 4, r - 1);
                ctx.fillStyle = capColor;
                ctx.fillRect(cx - 4, cy, 8, 3);
            }
            ctx.shadowBlur = 0;
        }

        function drawMushroomField() {
            for (var r = 0; r < ROWS; r++) {
                for (var c = 0; c < COLS; c++) {
                    if (mushrooms[r][c] !== 0) {
                        drawMushroom(c, r, mushrooms[r][c], mushrooms[r][c] < 0);
                    }
                }
            }
        }

        function drawCentipedeSegment(seg, time) {
            var color = seg.isHead ? '#ff3333' : '#ffcc00';
            var eyeColor = '#fff';
            ctx.fillStyle = color;
            ctx.shadowBlur = 6;
            ctx.shadowColor = color;

            // Body circle
            ctx.beginPath();
            ctx.arc(seg.x, seg.y, TILE / 2 - 1, 0, Math.PI * 2);
            ctx.fill();

            // Inner detail
            ctx.fillStyle = seg.isHead ? '#ff6666' : '#ffdd44';
            ctx.beginPath();
            ctx.arc(seg.x, seg.y, TILE / 4, 0, Math.PI * 2);
            ctx.fill();

            // Legs (animated)
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            var legPhase = Math.sin(time * 12 + seg.x * 0.3);
            ctx.beginPath();
            ctx.moveTo(seg.x - 5, seg.y);
            ctx.lineTo(seg.x - 8, seg.y + 6 + legPhase * 2);
            ctx.moveTo(seg.x + 5, seg.y);
            ctx.lineTo(seg.x + 8, seg.y + 6 - legPhase * 2);
            ctx.stroke();

            if (seg.isHead) {
                // Eyes
                ctx.fillStyle = eyeColor;
                ctx.beginPath();
                ctx.arc(seg.x + seg.dir * 3, seg.y - 3, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.arc(seg.x + seg.dir * 3, seg.y + 3, 2.5, 0, Math.PI * 2);
                ctx.fill();
                // Pupils
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(seg.x + seg.dir * 4, seg.y - 3, 1, 0, Math.PI * 2);
                ctx.fill();
                ctx.arc(seg.x + seg.dir * 4, seg.y + 3, 1, 0, Math.PI * 2);
                ctx.fill();
                // Antennae
                ctx.strokeStyle = '#ff6666';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(seg.x, seg.y - 5);
                ctx.lineTo(seg.x + seg.dir * 6, seg.y - 10 + Math.sin(time * 10) * 2);
                ctx.moveTo(seg.x, seg.y + 5);
                ctx.lineTo(seg.x + seg.dir * 6, seg.y + 10 + Math.sin(time * 10 + 1) * 2);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
            ctx.lineWidth = 1;
        }

        function drawPlayer(x, y) {
            var color = aiMode ? '#00ccff' : '#ffc107';
            ctx.fillStyle = color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = color;
            // Ship body - arrow/wand shape
            ctx.beginPath();
            ctx.moveTo(x, y - 10);
            ctx.lineTo(x - 8, y - 3);
            ctx.lineTo(x - 12, y + 8);
            ctx.lineTo(x - 4, y + 5);
            ctx.lineTo(x, y + 2);
            ctx.lineTo(x + 4, y + 5);
            ctx.lineTo(x + 12, y + 8);
            ctx.lineTo(x + 8, y - 3);
            ctx.closePath();
            ctx.fill();
            // Cannon tip
            ctx.fillRect(x - 2, y - 14, 4, 6);
            ctx.shadowBlur = 0;
        }

        function drawSpider(sp, time) {
            ctx.fillStyle = '#ff00ff';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ff00ff';
            // Body
            ctx.beginPath();
            ctx.ellipse(sp.x, sp.y, 9, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            // Head
            ctx.beginPath();
            ctx.arc(sp.x, sp.y - 7, 5, 0, Math.PI * 2);
            ctx.fill();
            // Legs
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 1.5;
            var lp = Math.sin(time * 14) * 3;
            for (var side = -1; side <= 1; side += 2) {
                ctx.beginPath();
                ctx.moveTo(sp.x + side * 5, sp.y - 3);
                ctx.lineTo(sp.x + side * 14, sp.y - 8 + lp);
                ctx.moveTo(sp.x + side * 6, sp.y);
                ctx.lineTo(sp.x + side * 15, sp.y + 2 - lp);
                ctx.moveTo(sp.x + side * 5, sp.y + 3);
                ctx.lineTo(sp.x + side * 13, sp.y + 10 + lp);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
            ctx.lineWidth = 1;
        }

        function drawFlea(fl, time) {
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath();
            ctx.arc(fl.x, fl.y, 5, 0, Math.PI * 2);
            ctx.fill();
            // Trail
            ctx.fillStyle = 'rgba(0,255,255,0.3)';
            ctx.beginPath();
            ctx.arc(fl.x, fl.y - 8, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawScorpion(sc, time) {
            ctx.fillStyle = '#ff8800';
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#ff8800';
            // Body
            ctx.beginPath();
            ctx.ellipse(sc.x, sc.y, 10, 6, 0, 0, Math.PI * 2);
            ctx.fill();
            // Tail
            ctx.strokeStyle = '#ff8800';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(sc.x - sc.dir * 10, sc.y);
            ctx.quadraticCurveTo(sc.x - sc.dir * 16, sc.y - 10, sc.x - sc.dir * 12, sc.y - 14);
            ctx.stroke();
            // Stinger
            ctx.fillStyle = '#ffcc00';
            ctx.beginPath();
            ctx.arc(sc.x - sc.dir * 12, sc.y - 14, 2, 0, Math.PI * 2);
            ctx.fill();
            // Legs
            var lp = Math.sin(time * 12) * 2;
            ctx.strokeStyle = '#ff8800';
            ctx.lineWidth = 1;
            for (var i = -1; i <= 1; i += 2) {
                ctx.beginPath();
                ctx.moveTo(sc.x + i * 4, sc.y + 4);
                ctx.lineTo(sc.x + i * 8, sc.y + 10 + lp);
                ctx.moveTo(sc.x + i * 7, sc.y + 4);
                ctx.lineTo(sc.x + i * 12, sc.y + 9 - lp);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
            ctx.lineWidth = 1;
        }

        function updateHUD() {
            document.getElementById('s').innerText = score;
            document.getElementById('l').innerText = lives;
            document.getElementById('v').innerText = level;
        }

        // === Count total segments ===
        function totalSegments() {
            var count = 0;
            centipedes.forEach(function(chain) { count += chain.length; });
            return count;
        }

        // === Count mushrooms in player zone ===
        function playerZoneMushrooms() {
            var count = 0;
            for (var r = ROWS - PLAYER_ZONE_ROWS; r < ROWS; r++) {
                for (var c = 0; c < COLS; c++) {
                    if (mushrooms[r][c] !== 0) count++;
                }
            }
            return count;
        }

        // === AI ===
        function runAI(dt) {
            // Find nearest centipede segment
            var nearestSeg = null, nearestDist = Infinity;
            centipedes.forEach(function(chain) {
                chain.forEach(function(seg) {
                    var dist = Math.abs(seg.x - player.x) + Math.abs(seg.y - player.y) * 0.3;
                    if (dist < nearestDist) { nearestDist = dist; nearestSeg = seg; }
                });
            });

            // Check for spider threat
            var dodgeSpider = false;
            var dodgeDir = 0;
            if (spider) {
                var sdist = Math.sqrt(Math.pow(spider.x - player.x, 2) + Math.pow(spider.y - player.y, 2));
                if (sdist < 60) {
                    dodgeSpider = true;
                    dodgeDir = spider.x > player.x ? -1 : 1;
                }
            }

            var targetX = player.x;
            var targetY = player.y;

            // Check for flea threat
            var dodgeFlea = false;
            var fleaDodgeDir = 0;
            if (flea) {
                var fdist = Math.abs(flea.x - player.x);
                if (fdist < 30 && flea.y > player.y - 80 && flea.y < player.y) {
                    dodgeFlea = true;
                    fleaDodgeDir = flea.x > player.x ? -1 : 1;
                }
            }

            if (dodgeSpider) {
                targetX = player.x + dodgeDir * 80;
                targetY = H - TILE * 2;
            } else if (dodgeFlea) {
                targetX = player.x + fleaDodgeDir * 60;
                targetY = player.y;
            } else if (nearestSeg) {
                targetX = nearestSeg.x;
                // Position vertically to intercept descending centipedes
                var segY = Math.max(H - PLAYER_ZONE_ROWS * TILE, Math.min(H - TILE, nearestSeg.y > H - PLAYER_ZONE_ROWS * TILE ? nearestSeg.y + TILE * 2 : H - TILE * 2));
                targetY = segY;
            }

            var dx = targetX - player.x;
            var dy = targetY - player.y;

            // Check if target direction is blocked by mushroom
            var nextCol = gridCol(player.x + (dx > 0 ? TILE / 2 + 2 : -TILE / 2 - 2));
            var nextRow = gridRow(player.y + (dy > 0 ? TILE / 2 + 2 : -TILE / 2 - 2));
            var pCol = gridCol(player.x);
            var pRow = gridRow(player.y);
            var hBlocked = nextCol >= 0 && nextCol < COLS && pRow >= 0 && pRow < ROWS && mushrooms[pRow][nextCol] !== 0;
            var vBlocked = pCol >= 0 && pCol < COLS && nextRow >= 0 && nextRow < ROWS && mushrooms[nextRow][pCol] !== 0;

            keys['ArrowLeft'] = dx < -5 && !hBlocked;
            keys['ArrowRight'] = dx > 5 && !hBlocked;
            // If horizontally blocked, try to go around vertically
            if (hBlocked && Math.abs(dx) > 5) {
                keys['ArrowUp'] = true;
            } else {
                keys['ArrowUp'] = dy < -5 && !vBlocked;
            }
            keys['ArrowDown'] = dy > 5 && !vBlocked;

            // Fire when roughly aligned
            var aligned = false;
            if (nearestSeg && Math.abs(nearestSeg.x - player.x) < 12) aligned = true;
            if (spider && Math.abs(spider.x - player.x) < 15 && spider.y < player.y) aligned = true;
            keys[' '] = aligned && !playerBullet;
        }

        // === Update centipede movement ===
        function updateCentipedes(dt) {
            var speed = (80 + level * 10) * DIFF_SPEED[difficulty] * dt;

            centipedes.forEach(function(chain) {
                // Move head, followers follow
                if (chain.length === 0) return;
                var head = chain[0];
                head.isHead = true;

                // Move head
                var moved = speed;
                while (moved > 0) {
                    var step = Math.min(moved, 1);
                    moved -= step;

                    if (head.poisonDrop) {
                        // Drop straight to bottom
                        head.y += step;
                        if (head.y >= (ROWS - 1) * TILE + TILE / 2) {
                            head.y = (ROWS - 1) * TILE + TILE / 2;
                            head.poisonDrop = false;
                            head.dir *= -1;
                        }
                        continue;
                    }

                    head.x += head.dir * step;

                    // Check wall collision
                    var hitWall = head.x <= TILE / 2 || head.x >= W - TILE / 2;

                    // Check mushroom collision
                    var gc = gridCol(head.x + head.dir * (TILE / 2));
                    var gr = gridRow(head.y);
                    var hitMush = false;
                    if (gc >= 0 && gc < COLS && gr >= 0 && gr < ROWS && mushrooms[gr][gc] !== 0) {
                        hitMush = true;
                        // Check for poisoned mushroom
                        if (mushrooms[gr][gc] < 0) {
                            head.poisonDrop = true;
                            continue; // skip normal drop logic this frame
                        }
                    }

                    if (hitWall || hitMush) {
                        // Clamp position
                        if (hitWall) {
                            head.x = head.dir < 0 ? TILE / 2 : W - TILE / 2;
                        } else {
                            head.x -= head.dir * step;
                        }
                        // Move one row up or down depending on ascending flag
                        if (head.ascending) {
                            head.y -= TILE;
                        } else {
                            head.y += TILE;
                        }
                        head.dir *= -1;

                        // If below field, switch to ascending
                        if (head.y > (ROWS - 1) * TILE + TILE / 2) {
                            head.y = (ROWS - 1) * TILE + TILE / 2;
                            head.ascending = true;
                        }
                        // If above field while ascending, switch back to descending
                        if (head.y < TILE / 2) {
                            head.y = TILE / 2;
                            head.ascending = false;
                        }
                    }
                }

                // Followers trail behind
                for (var i = 1; i < chain.length; i++) {
                    var prev = chain[i - 1];
                    var seg = chain[i];
                    seg.isHead = false;
                    var tdx = prev.x - seg.x;
                    var tdy = prev.y - seg.y;
                    var dist = Math.sqrt(tdx * tdx + tdy * tdy);
                    var targetDist = TILE * 0.85;
                    if (dist > targetDist) {
                        var ratio = (dist - targetDist) / dist;
                        seg.x += tdx * ratio * 0.8;
                        seg.y += tdy * ratio * 0.8;
                    }
                    seg.dir = tdx >= 0 ? 1 : -1;
                }
            });
        }

        // === Main Loop ===
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            var rawDt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            var dt = Math.min(rawDt, 0.05);

            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            if (state === 'START' || state === 'OVER') {
                drawHomeScreen(dt);
                requestAnimationFrame(loop);
                return;
            }

            if (paused) {
                drawStars(0);
                drawMushroomField();
                drawGameContent();
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 40px Courier';
                ctx.fillText("PAUSED", W / 2, H / 2 - 10);
                ctx.font = '16px Courier';
                ctx.fillStyle = '#fff';
                ctx.fillText("PRESS P OR CLICK RESUME", W / 2, H / 2 + 25);
                requestAnimationFrame(loop);
                return;
            }

            gameTime += dt;

            // Level start
            if (levelStartTimer > 0) {
                levelStartTimer -= dt;
                drawStars(0);
                drawMushroomField();
                centipedes.forEach(function(chain) {
                    chain.forEach(function(seg) { drawCentipedeSegment(seg, gameTime); });
                });
                drawPlayer(player.x, player.y);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffc107';
                ctx.font = 'bold 28px Courier';
                ctx.fillText("WAVE " + level, W / 2, H / 2);
                floatingTexts = floatingTexts.filter(function(vt) {
                    vt.y -= 40 * dt;
                    vt.life -= dt * 0.8;
                    ctx.globalAlpha = Math.max(0, vt.life);
                    ctx.fillStyle = vt.c;
                    ctx.font = 'bold 18px Courier';
                    ctx.textAlign = 'center';
                    ctx.fillText(vt.t, vt.x, vt.y);
                    return vt.life > 0;
                });
                ctx.globalAlpha = 1;
                updateHUD();
                requestAnimationFrame(loop);
                return;
            }

            // Death anim
            if (deathTimer > 0) {
                deathTimer -= dt;
                drawStars(dt);
                drawMushroomField();
                centipedes.forEach(function(chain) {
                    chain.forEach(function(seg) { drawCentipedeSegment(seg, gameTime); });
                });
                var prog = 1 - deathTimer / 1.0;
                ctx.globalAlpha = 1 - prog;
                drawPlayer(player.x, player.y);
                ctx.globalAlpha = 1;
                particles.forEach(function(p) {
                    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
                    if (p.life > 0) {
                        ctx.globalAlpha = p.life;
                        ctx.fillStyle = p.color;
                        ctx.fillRect(p.x, p.y, p.size, p.size);
                    }
                });
                particles = particles.filter(function(p) { return p.life > 0; });
                ctx.globalAlpha = 1;

                if (deathTimer <= 0) {
                    if (lives <= 0) {
                        state = 'OVER';
                        menuBtn.innerText = 'MENU';
                        menuBtn.href = 'index.html';
                        titleTimer = 0;
                        stopMusic();
                        sfxGameOver();
                        if (gameOverTimeoutId) clearTimeout(gameOverTimeoutId);
                        gameOverTimeoutId = setTimeout(function() {
                            if (state !== 'OVER') return;
                            if (!aiMode && score > 0 && (highScores.length < 10 || score > highScores[highScores.length - 1].s)) {
                                stopMusic();
                                var n = prompt("LEGENDARY SCORE! Enter Initials:", "ACE");
                                if (n) {
                                    highScores.push({ n: n.substring(0, 3).toUpperCase(), s: score });
                                    highScores.sort(function(a, b) { return b.s - a.s; });
                                    highScores = highScores.slice(0, 10);
                                    localStorage.setItem('centipede_deluxe_scores', JSON.stringify(highScores));
                                }
                            }
                            playMusic('home');
                        }, 1000);
                    } else {
                        resetAfterDeath();
                    }
                }
                updateHUD();
                requestAnimationFrame(loop);
                return;
            }

            if (aiMode) runAI(dt);

            // === Player movement ===
            var playerSpeed = 220 * DIFF_SPEED[difficulty];
            var oldPx = player.x, oldPy = player.y;
            if (keys['ArrowLeft']) player.x -= playerSpeed * dt;
            if (keys['ArrowRight']) player.x += playerSpeed * dt;
            // Clamp to player zone
            player.x = Math.max(TILE / 2, Math.min(W - TILE / 2, player.x));
            // Check mushroom collision for horizontal movement
            var pCol = gridCol(player.x);
            var pRow = gridRow(player.y);
            if (pCol >= 0 && pCol < COLS && pRow >= 0 && pRow < ROWS && mushrooms[pRow][pCol] !== 0) {
                player.x = oldPx;
            }
            if (keys['ArrowUp']) player.y -= playerSpeed * dt;
            if (keys['ArrowDown']) player.y += playerSpeed * dt;
            player.y = Math.max(H - PLAYER_ZONE_ROWS * TILE, Math.min(H - TILE / 2, player.y));
            // Check mushroom collision for vertical movement
            pCol = gridCol(player.x);
            pRow = gridRow(player.y);
            if (pCol >= 0 && pCol < COLS && pRow >= 0 && pRow < ROWS && mushrooms[pRow][pCol] !== 0) {
                player.y = oldPy;
            }

            // === Player firing ===
            fireTimer -= dt;
            if (keys[' '] && fireTimer <= 0 && !playerBullet) {
                playerBullet = { x: player.x, y: player.y - 14 };
                fireTimer = 0.15;
                sfxShoot();
            }

            // === Move bullet ===
            if (playerBullet) {
                playerBullet.y -= 600 * dt;
                if (playerBullet.y < -10) playerBullet = null;
            }

            // === Centipede movement ===
            updateCentipedes(dt);

            // === Level clear ===
            if (deathTimer <= 0 && totalSegments() === 0) {
                level++;
                sfxLevelClear();
                floatingTexts.push({ x: W / 2, y: H / 2, t: "WAVE CLEAR!", life: 1.5, c: '#ffc107' });
                initLevel();
                updateHUD();
                requestAnimationFrame(loop);
                return;
            }

            // === Spider ===
            spiderTimer -= dt;
            if (!spider && spiderTimer <= 0) {
                var spSide = Math.random() > 0.5 ? 1 : -1;
                spider = {
                    x: spSide > 0 ? -15 : W + 15,
                    y: H - TILE * (2 + Math.random() * 4),
                    vx: spSide * (100 + Math.random() * 80) * DIFF_SPEED[difficulty],
                    vy: (Math.random() - 0.5) * 120,
                    soundTimer: 0
                };
                spiderTimer = (8 + Math.random() * 10) / (1 + level * 0.15);
            }
            if (spider) {
                spider.x += spider.vx * dt;
                spider.y += spider.vy * dt;
                // Bounce vertically in player zone
                if (spider.y < H - PLAYER_ZONE_ROWS * TILE) { spider.vy = Math.abs(spider.vy); }
                if (spider.y > H - TILE) { spider.vy = -Math.abs(spider.vy); }
                // Random direction changes
                if (Math.random() < 2 * dt) spider.vy = (Math.random() - 0.5) * 150;

                spider.soundTimer -= dt;
                if (spider.soundTimer <= 0) { sfxSpider(); spider.soundTimer = 0.2; }

                // Destroy mushrooms spider passes over
                var sr = gridRow(spider.y);
                var sc = gridCol(spider.x);
                if (sr >= 0 && sr < ROWS && sc >= 0 && sc < COLS && mushrooms[sr][sc] !== 0) {
                    mushrooms[sr][sc] = 0;
                }

                // Off screen
                if (spider.x < -30 || spider.x > W + 30) spider = null;
            }

            // === Flea ===
            fleaTimer -= dt;
            if (!flea && fleaTimer <= 0 && playerZoneMushrooms() < 5) {
                flea = {
                    x: Math.random() * (W - TILE * 2) + TILE,
                    y: -10,
                    hp: 2,
                    soundTimer: 0
                };
                fleaTimer = 6 + Math.random() * 8;
            }
            if (flea) {
                flea.y += 200 * DIFF_SPEED[difficulty] * dt;
                flea.soundTimer -= dt;
                if (flea.soundTimer <= 0) { sfxFlea(); flea.soundTimer = 0.15; }
                // Leave mushrooms behind
                var fr = gridRow(flea.y);
                var fc = gridCol(flea.x);
                if (fr >= 0 && fr < ROWS && fc >= 0 && fc < COLS && mushrooms[fr][fc] === 0 && Math.random() < 0.3) {
                    mushrooms[fr][fc] = 4;
                }
                if (flea.y > H + 10) flea = null;
            }

            // === Scorpion ===
            scorpionTimer -= dt;
            if (!scorpion && scorpionTimer <= 0 && level >= 2) {
                var scDir = Math.random() > 0.5 ? 1 : -1;
                var scRow = 2 + Math.floor(Math.random() * (ROWS - PLAYER_ZONE_ROWS - 4));
                scorpion = {
                    x: scDir > 0 ? -15 : W + 15,
                    y: scRow * TILE + TILE / 2,
                    dir: scDir,
                    soundTimer: 0
                };
                scorpionTimer = 15 + Math.random() * 20;
            }
            if (scorpion) {
                scorpion.x += scorpion.dir * 80 * DIFF_SPEED[difficulty] * dt;
                scorpion.soundTimer -= dt;
                if (scorpion.soundTimer <= 0) { sfxScorpion(); scorpion.soundTimer = 0.25; }
                // Poison mushrooms it passes
                var scCol = gridCol(scorpion.x);
                var scRow2 = gridRow(scorpion.y);
                if (scCol >= 0 && scCol < COLS && scRow2 >= 0 && scRow2 < ROWS && mushrooms[scRow2][scCol] > 0) {
                    mushrooms[scRow2][scCol] = -Math.abs(mushrooms[scRow2][scCol]);
                }
                if (scorpion.x < -30 || scorpion.x > W + 30) scorpion = null;
            }

            // === Collisions ===
            // Bullet vs centipede
            if (playerBullet) {
                var bulletHit = false;
                for (var ci = 0; ci < centipedes.length && !bulletHit; ci++) {
                    var chain = centipedes[ci];
                    for (var si = 0; si < chain.length && !bulletHit; si++) {
                        var seg = chain[si];
                        var bdx = playerBullet.x - seg.x;
                        var bdy = playerBullet.y - seg.y;
                        if (bdx * bdx + bdy * bdy < TILE * TILE * 0.6) {
                            // Hit!
                            var pts = seg.isHead ? 100 : 10;
                            score += pts;
                            floatingTexts.push({ x: seg.x, y: seg.y, t: '+' + pts, life: 0.8, c: seg.isHead ? '#ff3333' : '#ffcc00' });
                            spawnExplosion(seg.x, seg.y, seg.isHead ? '#ff3333' : '#ffcc00', 15);
                            sfxSegmentHit();

                            // Place mushroom where segment was
                            var mr = gridRow(seg.y);
                            var mc = gridCol(seg.x);
                            if (mr >= 0 && mr < ROWS && mc >= 0 && mc < COLS && mushrooms[mr][mc] === 0) {
                                mushrooms[mr][mc] = 4;
                            }

                            // Split centipede
                            var before = chain.slice(0, si);
                            var after = chain.slice(si + 1);
                            centipedes.splice(ci, 1);
                            if (before.length > 0) centipedes.push(before);
                            if (after.length > 0) {
                                after[0].isHead = true;
                                after[0].dir *= -1;
                                centipedes.push(after);
                            }

                            playerBullet = null;
                            bulletHit = true;
                        }
                    }
                }
            }

            // Bullet vs mushroom
            if (playerBullet) {
                var br = gridRow(playerBullet.y);
                var bc = gridCol(playerBullet.x);
                if (br >= 0 && br < ROWS && bc >= 0 && bc < COLS && mushrooms[br][bc] !== 0) {
                    var absHp = Math.abs(mushrooms[br][bc]);
                    var wasPoisoned = mushrooms[br][bc] < 0;
                    absHp--;
                    if (absHp <= 0) {
                        mushrooms[br][bc] = 0;
                        score += 1;
                        spawnExplosion(bc * TILE + TILE / 2, br * TILE + TILE / 2, wasPoisoned ? '#ff00ff' : '#00cc44', 8);

                        var pdy = seg.y - player.y;
                        if (pdx * pdx + pdy * pdy < TILE * TILE * 0.8) {

                        }
                    });
                });

                if (spider) {
                    var spdx = spider.x - player.x;

                    var fldy = flea.y - player.y;

            // Particles
            particles.forEach(function(p) {
                p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;

                    ctx.arc(sx, sy, 7, 0, Math.PI * 2);

                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(sx + side * 3, sy - 2, 2, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.arc(sx + side * 3, sy + 2, 2, 0, Math.PI * 2);
                        ctx.fill();

            // High scores panel
            var panelX = W / 2 - 160, panelY = 110, panelW = 320, panelH = 280;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(panelX, panelY, panelW, panelH);

            ctx.textAlign = 'center';

            ctx.fillStyle = '#666';
            ctx.font = '11px Courier';
            ctx.textAlign = 'left';
            ctx.fillText("RNK", panelX + 15, panelY + 45);
            ctx.fillText("NAME", panelX + 55, panelY + 45);
            ctx.textAlign = 'right';
            ctx.fillText("SCORE", panelX + panelW - 15, panelY + 45);

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(panelX + 10, panelY + 50);
            ctx.lineTo(panelX + panelW - 10, panelY + 50);
            ctx.stroke();

            for (var i = 0; i < 10; i++) {
                var rowY = panelY + 68 + i * 22;
                if (i < highScores.length) {

                    ctx.font = isTop3 ? 'bold 13px Courier' : '13px Courier';
                    ctx.textAlign = 'left';
                    ctx.fillText((i + 1).toString().padStart(2, ' ') + '.', panelX + 15, rowY);
                    ctx.fillText(h.n, panelX + 55, rowY);
                    ctx.textAlign = 'right';

                    ctx.font = '13px Courier';
                    ctx.textAlign = 'left';
                    ctx.fillText((i + 1).toString().padStart(2, ' ') + '.', panelX + 15, rowY);
                    ctx.fillText("---", panelX + 55, rowY);
                    ctx.textAlign = 'right';
                    ctx.fillText("---", panelX + panelW - 15, rowY);
                }
            }

            // Difficulty selector
            ctx.textAlign = 'center';
            ctx.fillStyle = '#aaa';
            ctx.font = 'bold 14px Courier';
            ctx.fillText("DIFFICULTY", W / 2, 418);

            var dBtnW = 100, dBtnH = 30, dBtnGap = 12;
            var dTotalW = 3 * dBtnW + 2 * dBtnGap;

            var dBtnY = 428;
            for (var d = 0; d < 3; d++) {
                var bx = dBtnStartX + d * (dBtnW + dBtnGap);

                ctx.fillStyle = selected ? DIFF_COLORS[d] : '#222';
                ctx.fillRect(bx, dBtnY, dBtnW, dBtnH);
                ctx.strokeStyle = DIFF_COLORS[d];
                ctx.lineWidth = selected ? 2 : 1;
                ctx.strokeRect(bx, dBtnY, dBtnW, dBtnH);
                ctx.fillStyle = selected ? '#000' : DIFF_COLORS[d];
                ctx.font = selected ? 'bold 12px Courier' : '12px Courier';
                ctx.textAlign = 'center';
                ctx.fillText(DIFF_NAMES[d], bx + dBtnW / 2, dBtnY + 20);
            }

            // Score info
            ctx.textAlign = 'center';
            ctx.font = '12px Courier';
            ctx.fillStyle = '#888';
            ctx.fillText("SCORE: HEAD=100 BODY=10 MUSHROOM=1 SPIDER=300-900", W / 2, 480);

            // Bottom text
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 18px Courier';
            ctx.fillText(state === 'START' ? "DEFEND THE GARDEN!" : "GAME OVER", W / 2, 510);
            ctx.font = '12px Courier';
            ctx.fillStyle = '#888';
            ctx.fillText("SPACE: START | P: PAUSE | A: AI | S: SOUND | ESC: MENU", W / 2, 540);
            ctx.fillText("ARROWS TO MOVE | SPACE TO FIRE", W / 2, 558);
        }

        // === Difficulty click ===
        canvas.addEventListener('click', function(e) {
            if (state !== 'START' && state !== 'OVER') return;

            var dBtnStartX = (W - dTotalW) / 2;
            var dBtnY = 428;
            for (var d = 0; d < 3; d++) {
                var bx = dBtnStartX + d * (dBtnW + dBtnGap);

        window.addEventListener('keydown', function(e) {

                if (paused) pauseBtn.click();
                else if (state === 'PLAY') pauseBtn.click();
                return;
            }
            if (state === 'START' || state === 'OVER') {
                if (e.key === ' ') { e.preventDefault(); btn.click(); return; }

                if (e.key === 'm' || e.key === 'M') { difficulty = 1; return; }
                if (e.key === 'h' || e.key === 'H') { difficulty = 2; return; }
                if (e.key === 'a' || e.key === 'A') { aiBtn.click(); return; }
                if (e.key === 's' || e.key === 'S') { muteBtn.click(); return; }
                if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); return; }
                return;
            }
            if (e.key === 'a' || e.key === 'A') { aiBtn.click(); return; }
            if (e.key === 's' || e.key === 'S') { muteBtn.click(); return; }
            if (e.key === 'p' || e.key === 'P') { pauseBtn.click(); return; }
            if (state !== 'PLAY' || paused || aiMode) return;
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === ' ') {

        // === Touch ===
        var touchStartX = 0, touchStartY = 0;

            touchStartY = e.touches[0].clientY;
            touchTotalMove = 0;
            if (state === 'START' || state === 'OVER') {
                ensureAudio();
                playMusic('home');
                var rect = canvas.getBoundingClientRect();
                var scaleX = W / rect.width;
                var scaleY = H / rect.height;
                var mx = (e.touches[0].clientX - rect.left) * scaleX;
                var my = (e.touches[0].clientY - rect.top) * scaleY;
                var dBtnW = 100, dBtnH = 30, dBtnGap = 12;
                var dTotalW = 3 * dBtnW + 2 * dBtnGap;
                var dBtnStartX = (W - dTotalW) / 2;
                var dBtnY = 428;
                for (var d = 0; d < 3; d++) {
                    var bx = dBtnStartX + d * (dBtnW + dBtnGap);
                    if (mx >= bx && mx <= bx + dBtnW && my >= dBtnY && my <= dBtnY + dBtnH) {

        canvas.addEventListener('touchmove', function(e) {

            // Check mushroom collision (matching keyboard path)
            var tCol = gridCol(newPx);

            if (tCol >= 0 && tCol < COLS && tRow >= 0 && tRow < ROWS && mushrooms[tRow][tCol] !== 0) {

            } else {

        }, { passive: false });
        document.addEventListener('touchend', function() {

        // Virtual joystick + fire button
        (function() {
            var joystick = document.getElementById('joystick');
            var knob = document.getElementById('joystick-knob');
            var fireBtn = document.getElementById('fire-btn');
            if (!joystick || !knob) return;
            var BASE_R = 65, KNOB_R = 25, DEAD_ZONE = 12;
            var active = false, lastDir = null;

            function getCenter() {
                var r = joystick.getBoundingClientRect();
                return { x: r.left + BASE_R, y: r.top + BASE_R };
            }

            function updateKnob(tx, ty) {
                var c = getCenter();
                var dx = tx - c.x, dy = ty - c.y;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var maxDist = BASE_R - KNOB_R * 0.5;
                if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
                knob.style.left = (BASE_R + dx - KNOB_R) + 'px';
                knob.style.top = (BASE_R + dy - KNOB_R) + 'px';
                return { dx: dx, dy: dy, dist: Math.sqrt(dx * dx + dy * dy) };
            }

            function resetKnob() {
                knob.style.left = (BASE_R - KNOB_R) + 'px';
                knob.style.top = (BASE_R - KNOB_R) + 'px';
                knob.style.transition = 'top 0.15s, left 0.15s';
            }

            function clearDir() {
                keys['ArrowUp'] = false; keys['ArrowDown'] = false;
                keys['ArrowLeft'] = false; keys['ArrowRight'] = false;
                lastDir = null;
            }

            function setDir(dx, dy) {
                var dir;
                if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? 'right' : 'left';
                else dir = dy > 0 ? 'down' : 'up';
                if (dir === lastDir) return;
                clearDir();
                lastDir = dir;
                haptic(30);
                if (dir === 'up') keys['ArrowUp'] = true;
                else if (dir === 'down') keys['ArrowDown'] = true;
                else if (dir === 'left') keys['ArrowLeft'] = true;
                else if (dir === 'right') keys['ArrowRight'] = true;
            }

            joystick.addEventListener('touchstart', function(e) {
                e.preventDefault(); active = true;
                knob.style.transition = 'none';
                var t = e.touches[0];
                var v = updateKnob(t.clientX, t.clientY);
                if (v.dist > DEAD_ZONE) setDir(v.dx, v.dy);
            }, { passive: false });

            joystick.addEventListener('touchmove', function(e) {
                if (!active) return; e.preventDefault();
                var t = e.touches[0];
                var v = updateKnob(t.clientX, t.clientY);
                if (v.dist > DEAD_ZONE) setDir(v.dx, v.dy);
                else clearDir();
            }, { passive: false });

            function onEnd(e) {
                if (!active) return; e.preventDefault();
                active = false; clearDir(); resetKnob();
            }
            joystick.addEventListener('touchend', onEnd, { passive: false });
            joystick.addEventListener('touchcancel', onEnd, { passive: false });

            // Fire button
            if (fireBtn) {
                fireBtn.addEventListener('touchstart', function(e) {
                    e.preventDefault(); haptic(50); keys[' '] = true;
                }, { passive: false });
                fireBtn.addEventListener('touchend', function(e) {
                    e.preventDefault(); keys[' '] = false;
                }, { passive: false });
                fireBtn.addEventListener('touchcancel', function(e) {
                    e.preventDefault(); keys[' '] = false;
                }, { passive: false });
            }
        })();

            } else {
                if (state === 'START' || state === 'OVER') playMusic('home');
                else if (state === 'PLAY' && !paused) playMusic('game');
            }
        });

        // Start home music
        function startHomeMusic() {
            ensureAudio();
            function play() {
                if (!muted && (state === 'START' || state === 'OVER')) { currentTrack = null; playMusic('home'); }
                document.removeEventListener('click', startHomeMusic);
                document.removeEventListener('keydown', startHomeMusic);
                document.removeEventListener('touchstart', startHomeMusic);
            }
            if (audioCtx.state === 'suspended') { audioCtx.resume().then(play); }
            else { play(); }
        }
        document.addEventListener('click', startHomeMusic);
        document.addEventListener('keydown', startHomeMusic);
        document.addEventListener('touchstart', startHomeMusic);
        startHomeMusic();

        var _tOv = document.getElementById('transition-overlay');
        if (_tOv) { setTimeout(function(){ _tOv.style.opacity='0'; setTimeout(function(){ _tOv.remove(); }, 400); }, 50); }

        requestAnimationFrame(loop);
    })();
    </script>
</body>
</html>
