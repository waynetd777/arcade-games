<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c084fc">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Prince of Persia Deluxe</title>
    <style>
        body { background: #050505; color: #c084fc; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; margin: 0; padding: 10px; box-sizing: border-box; overflow: auto; user-select: none; touch-action: manipulation; }
        .stats { margin-bottom: 10px; font-size: 22px; display: flex; gap: 30px; font-weight: bold; text-shadow: 2px 2px #000; flex-wrap: wrap; justify-content: center; }
        #s, #l, #v { color: #fff; }
        #game-wrapper { position: relative; border: 4px solid #333; box-shadow: 0 0 50px rgba(192, 132, 252, 0.15); border-radius: 8px; overflow: hidden; touch-action: none; max-width: 560px; width: 100%; }
        canvas { display: block; background: #000; cursor: default; width: 100%; height: auto; }
        .controls { display: flex; gap: 15px; margin-top: 15px; z-index: 10; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 25px; font-size: 16px; font-family: inherit; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; transition: 0.2s; text-transform: uppercase; }
        #b { background: linear-gradient(180deg, #c084fc, #9055d0); color: #000; box-shadow: 0 4px 0 #5a2d8a; }
        #ai-btn { background: #222; color: #00ccff; border: 2px solid #00ccff; box-shadow: 0 0 10px rgba(0, 204, 255, 0.3); }
        #pause-btn { background: #222; color: #ffaa00; border: 2px solid #ffaa00; box-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }
        button:active { transform: translateY(3px); box-shadow: none; }
        .ai-active { background: #00ccff !important; color: #000 !important; box-shadow: 0 0 20px #00ccff !important; }
        .pause-active { background: #ffaa00 !important; color: #000 !important; box-shadow: 0 0 20px #ffaa00 !important; }
        .dpad { display: none; margin-top: 10px; }
        @media (pointer: coarse) { .dpad { display: flex; } }
        .dpad { gap: 10px; justify-content: center; align-items: center; flex-wrap: wrap; }
        .dpad button { padding: 0; width: 70px; height: 60px; font-size: 24px; background: #222; color: #c084fc; border: 2px solid #c084fc; border-radius: 8px; }
        .dpad button:active { background: #c084fc; color: #000; }
        .dpad .fire-btn { width: 90px; background: #002200; color: #33ff33; border-color: #33ff33; }
        .dpad .fire-btn:active { background: #33ff33; color: #000; }
        .dpad .atk-btn { width: 90px; background: #220000; color: #ff6666; border-color: #ff6666; }
        .dpad .atk-btn:active { background: #ff6666; color: #000; }
        @media (max-width: 580px) { .stats { font-size: 14px; gap: 10px; } .controls { display: flex; gap: 4px; margin-top: 8px; width: 100%; flex-wrap: nowrap; } .controls button, .controls a { padding: 8px 2px !important; font-size: 11px !important; text-align: center; box-sizing: border-box; flex: 1; min-width: 0; } }
        #transition-overlay { position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;opacity:1;pointer-events:none;background:repeating-linear-gradient(0deg,#000 0px,#000 2px,rgba(0,0,0,0.85) 2px,rgba(0,0,0,0.85) 4px);transition:opacity 0.4s; }
    </style>
</head>
<body>
    <div id="transition-overlay"></div>

    <div class="stats">
        <div>SCORE: <span id="s">0</span></div>
        <div>LIVES: <span id="l">3</span></div>
        <div>LVL: <span id="v">1</span></div>
    </div>

    <div id="game-wrapper">
        <canvas id="c" width="560" height="600"></canvas>
    </div>

    <div class="controls">
        <button id="b">START</button>
        <button id="pause-btn">PAUSE</button>
        <button id="ai-btn">AI: OFF</button>
        <button id="mute-btn" style="background:#222;color:#0ff;border:2px solid #0ff;line-height:0;padding:6px;"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16,7.5 Q21,12 16,16.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        <a href="index.html" style="padding: 12px 25px; font-size: 16px; font-family: 'Courier New', Courier, monospace; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; text-transform: uppercase; background: #222; color: #fff; border: 2px solid #fff; text-decoration: none; display: inline-block; transition: 0.2s;">MENU</a>
    </div>

    <div class="dpad">
        <button id="d-left">&#9664;</button>
        <button id="d-up">&#9650;</button>
        <button id="d-right">&#9654;</button>
        <button id="d-down">&#9660;</button>
        <button id="d-fire" class="fire-btn">JUMP</button>
        <button id="d-attack" class="atk-btn">ATK</button>
    </div>

    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
    <script>
    (function() {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('b');
        const aiBtn = document.getElementById('ai-btn');
        const pauseBtn = document.getElementById('pause-btn');
        let muted = localStorage.getItem('arcade_muted') === 'true';
        const _mob = window.innerWidth <= 580;
        const muteBtn = document.getElementById('mute-btn');
        const _spkOn = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16,7.5 Q21,12 16,16.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        const _spkOff = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="15" y1="9" x2="21" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="21" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        muteBtn.innerHTML = muted ? _spkOff : _spkOn;
        muteBtn.onclick = function() { haptic(30); muted = !muted; localStorage.setItem('arcade_muted', muted); muteBtn.innerHTML = muted ? _spkOff : _spkOn; if (muted) stopMusic(); else { currentTrack = null; if (state === 'START' || state === 'OVER') playMusic('home'); else if (state === 'PLAY' && !paused) playMusic('game'); } };
        function haptic(ms) { try { if (navigator.vibrate) navigator.vibrate(ms || 50); } catch(e) {} }

        const W = 560, H = 600;
        canvas.width = W;
        canvas.height = H;

        let state = 'START', aiMode = false, paused = false;
        let score = 0, lives = 3, health = 5, level = 1, lastTime = performance.now(), gameTime = 0;
        let floatingTexts = [], particles = [];
        let difficulty = 1;
        const DIFF_NAMES = ['E: EASY', 'M: MEDIUM', 'H: HARD'];
        const DIFF_COLORS = ['#4ae04a', '#ffaa00', '#ff3333'];
        const DIFF_HEALTH = [7, 5, 3];
        const DIFF_GUARD_HP = [2, 3, 4];
        const DIFF_TIME = [180, 120, 90];
        let highScores = JSON.parse(localStorage.getItem('pop_deluxe_scores')) || [{n:'CPU', s:5000}];
        highScores = highScores.slice(0, 10);
        let gameOverTimeoutId = null;

        // Title animation
        let titleTimer = 0;

        // Tile size
        const TILE = 40;
        const COLS = 14;
        const ROWS = 15;

        // Camera
        let camX = 0;
        let camY = 0;

        // Time limit
        let timeLeft = 120;

        // Level data
        let levelMap = [];
        let guards = [];
        let spikes = [];
        let guillotines = [];
        let fallingTiles = [];
        let exitDoor = null;

        // Prince
        const prince = {
            x: 80, y: 0, vx: 0, vy: 0,
            w: 20, h: 36,
            onGround: false, facingRight: true,
            jumping: false, climbing: false, crouching: false,
            attacking: false, blocking: false,
            attackTimer: 0, blockTimer: 0,
            hasSword: true,
            hurtTimer: 0, invincible: 0, knockbackTimer: 0,
            runFrame: 0, runTimer: 0,
            climbTarget: null,
            hangingLedge: false, hangTimer: 0,
            deathAnim: 0, dead: false,
            carefulStep: false
        };

        let keys = {};
        let deathTimer = 0;
        let levelStartTimer = 0;
        let levelCompleteTimer = 0;
        const GRAVITY = 800;
        const JUMP_VEL = -340;
        const RUN_SPEED = 130;
        const CAREFUL_SPEED = 40;

        // Stars
        let stars = [];
        function initStars() {
            stars = [];
            for (let i = 0; i < 60; i++) {
                stars.push({ x: Math.random() * W, y: Math.random() * H, s: Math.random() * 1.5 + 0.5, b: Math.random(), speed: Math.random() * 0.5 + 0.5 });
            }
        }
        initStars();

        // === Sound Engine ===
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

        function playTone(freq, duration, type, vol) {
            if (muted) return;
            if (type === undefined) type = 'square';
            if (vol === undefined) vol = 0.12;
            ensureAudio();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            osc.onended = function() { osc.disconnect(); gain.disconnect(); };
        }

        function sfxJump() { playTone(220, 0.08, 'square', 0.08); playTone(330, 0.06, 'square', 0.06); }
        function sfxLand() { playTone(100, 0.05, 'sawtooth', 0.07); }
        function sfxSword() { playTone(800 + Math.random() * 400, 0.06, 'sawtooth', 0.1); playTone(1200 + Math.random() * 300, 0.04, 'sawtooth', 0.07); }
        function sfxParry() { playTone(600, 0.04, 'square', 0.1); playTone(900, 0.06, 'square', 0.08); }
        function sfxHurt() {
            [300, 220, 160].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.12, 'sawtooth', 0.1); }, i * 50); });
        }
        function sfxSpike() {
            [500, 300, 150, 80].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.15, 'sawtooth', 0.12); }, i * 60); });
        }
        function sfxGuillotine() { playTone(60, 0.3, 'sawtooth', 0.1); playTone(200, 0.05, 'square', 0.08); }
        function sfxDeath() {
            [350, 310, 270, 230, 190, 150].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.25, 'sawtooth', 0.11); }, i * 120); });
            setTimeout(function() { playTone(90, 0.5, 'sawtooth', 0.08); }, 750);
        }
        function sfxLevelClear() {
            [330, 440, 523, 660, 784, 988, 1175].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.18, 'sawtooth', 0.1); }, i * 85); });
        }
        function sfxGameOver() {
            [440, 392, 349, 311, 277, 247, 220, 165].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.3, 'sawtooth', 0.1); }, i * 150); });
            setTimeout(function() { playTone(110, 0.8, 'sawtooth', 0.09); }, 1250);
        }
        function sfxGuardDeath() {
            [440, 330, 220, 150].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.15, 'sawtooth', 0.09); }, i * 60); });
        }
        function sfxPickup() {
            [550, 740, 988].forEach(function(f, i) { setTimeout(function() { playTone(f, 0.1, 'square', 0.09); }, i * 45); });
        }

        // === Music Engine ===
        let musicInterval = null;
        let currentTrack = null;

        function stopMusic() {
            if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
            currentTrack = null;
        }

        function playMusic(track) {
            if (currentTrack === track) return;
            stopMusic();
            currentTrack = track;
            if (muted) return;
            ensureAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();

            // Home: mysterious Arabian/Persian melody in A minor / Phrygian
            const homeMelody = [
                440, 0, 415, 440, 0, 523, 494, 440,
                415, 0, 392, 0, 415, 440, 0, 0,
                523, 0, 494, 440, 415, 0, 392, 370,
                415, 0, 440, 0, 0, 523, 494, 0,
                587, 0, 523, 494, 440, 0, 415, 440,
                523, 0, 587, 523, 494, 0, 440, 0,
                415, 392, 415, 0, 440, 0, 523, 494,
                440, 0, 415, 0, 392, 0, 0, 0
            ];
            const homeBass = [
                220, 0, 0, 208, 0, 220, 0, 0,
                196, 0, 0, 208, 0, 220, 0, 0,
                262, 0, 0, 247, 0, 220, 0, 196,
                208, 0, 220, 0, 0, 262, 0, 0,
                294, 0, 0, 262, 0, 220, 0, 0,
                262, 0, 294, 0, 0, 247, 220, 0,
                208, 196, 208, 0, 220, 0, 262, 0,
                220, 0, 208, 0, 196, 0, 0, 0
            ];
            // Game: tense dungeon theme
            const gameMelody = [
                330, 0, 311, 330, 0, 0, 294, 0,
                311, 330, 0, 392, 370, 330, 311, 0,
                294, 0, 0, 311, 330, 0, 392, 0,
                440, 0, 392, 370, 330, 0, 311, 0,
                330, 0, 0, 294, 0, 311, 330, 0,
                370, 0, 392, 0, 370, 330, 311, 0,
                294, 0, 311, 330, 0, 370, 392, 0,
                370, 330, 311, 0, 294, 0, 0, 0
            ];
            const gameBass = [
                165, 0, 0, 156, 0, 165, 0, 0,
                147, 0, 0, 165, 0, 0, 156, 0,
                147, 0, 0, 156, 165, 0, 196, 0,
                220, 0, 196, 0, 165, 0, 156, 0,
                165, 0, 0, 147, 0, 156, 165, 0,
                185, 0, 196, 0, 0, 165, 156, 0,
                147, 0, 156, 165, 0, 185, 196, 0,
                185, 165, 156, 0, 147, 0, 0, 0
            ];

            const melody = track === 'home' ? homeMelody : gameMelody;
            const bass = track === 'home' ? homeBass : gameBass;
            const tempo = track === 'home' ? 160 : 200;
            const melVol = 0.04;
            const bassVol = 0.025;
            const stepMs = 60000 / tempo;
            let step = 0;

            musicInterval = setInterval(function() {
                if (paused) return;
                const note = melody[step % melody.length];
                const bn = bass[step % bass.length];
                if (note > 0) playTone(note, stepMs / 1000 * 0.7, track === 'home' ? 'triangle' : 'square', melVol);
                if (bn > 0) playTone(bn, stepMs / 1000 * 0.7, 'sawtooth', bassVol);
                step++;
            }, stepMs);
        }

        // === Level Generation ===
        // Tile types: 0=empty, 1=floor, 2=wall, 3=spikes, 4=falling_floor, 5=guillotine, 6=exit, 7=potion
        //
        // PATH-FIRST approach: we build a guaranteed traversable path from spawn to exit,
        // then place traps and enemies only where the path has validated clearance.
        //
        // Physics constraints:
        //   Max jump height: ~1.8 tiles (72px). So max step-up = 1 row.
        //   Max horizontal jump: ~3 tiles at full run.
        //   Prince height: 36px (~1 tile). Needs 2 clear rows to walk.

        function generateLevel(lvl) {
            let mapW = 30 + lvl * 4;
            if (mapW > 60) mapW = 60;
            const mapH = 15;
            const map = [];
            for (let r = 0; r < mapH; r++) {
                map[r] = [];
                for (let c = 0; c < mapW; c++) {
                    map[r][c] = 0;
                }
            }

            // Walls at edges
            for (let r = 0; r < mapH; r++) {
                map[r][0] = 2;
                map[r][mapW - 1] = 2;
            }
            // Ceiling
            for (let c = 0; c < mapW; c++) {
                map[0][c] = 2;
            }

            // === Build the main path ===
            // Walk left-to-right, placing floor segments. Occasionally go up or down 1 row.
            // Track the path so we know every tile the player must traverse.
            const path = []; // [{r, c}] — floor tiles the player walks ON (stands on top of)
            let curRow = mapH - 1; // start on ground floor
            let col = 1;

            // Place floor under spawn
            for (let c = 1; c < 4; c++) {
                map[curRow][c] = 1;
                path.push({r: curRow, c: c});
            }
            col = 4;

            // How many height changes per level
            const numClimbs = 2 + Math.min(lvl, 4);
            let climbsUsed = 0;
            const climbInterval = Math.floor((mapW - 8) / (numClimbs + 1));

            while (col < mapW - 3) {
                // Decide: flat run, or height change?
                let action = 'flat';
                if (climbsUsed < numClimbs && col > 3 + climbsUsed * climbInterval && Math.random() < 0.5) {
                    // Try to go up or down
                    const canGoUp = curRow > 3; // need room above
                    const canGoDown = curRow < mapH - 2;
                    if (canGoUp && (!canGoDown || Math.random() < 0.6)) {
                        action = 'up';
                    } else if (canGoDown) {
                        action = 'down';
                    }
                }

                if (action === 'up') {
                    // Step up 1 row: place a short platform 1 row higher
                    // First, flat run of 2-3 tiles at current level
                    const runLen = 2 + Math.floor(Math.random() * 2);
                    for (let i = 0; i < runLen && col < mapW - 3; i++) {
                        map[curRow][col] = 1;
                        path.push({r: curRow, c: col});
                        col++;
                    }
                    // Step up: place platform 1 row above
                    curRow -= 1;
                    const platLen = 3 + Math.floor(Math.random() * 3);
                    for (let i = 0; i < platLen && col < mapW - 3; i++) {
                        map[curRow][col] = 1;
                        path.push({r: curRow, c: col});
                        col++;
                    }
                    climbsUsed++;
                } else if (action === 'down') {
                    // Drop down: leave a gap in the floor, land 1-2 rows below
                    const runLen = 2 + Math.floor(Math.random() * 2);
                    for (let i = 0; i < runLen && col < mapW - 3; i++) {
                        map[curRow][col] = 1;
                        path.push({r: curRow, c: col});
                        col++;
                    }
                    // Gap (2 tiles — prince falls through)
                    col += 2;
                    // Land 1-2 rows lower
                    const drop = 1 + (curRow < mapH - 3 ? Math.floor(Math.random() * 2) : 0);
                    curRow = Math.min(curRow + drop, mapH - 1);
                    const platLen = 3 + Math.floor(Math.random() * 3);
                    for (let i = 0; i < platLen && col < mapW - 3; i++) {
                        map[curRow][col] = 1;
                        path.push({r: curRow, c: col});
                        col++;
                    }
                    climbsUsed++;
                } else {
                    // Flat run: 4-8 tiles
                    const runLen = 4 + Math.floor(Math.random() * 5);
                    for (let i = 0; i < runLen && col < mapW - 3; i++) {
                        map[curRow][col] = 1;
                        path.push({r: curRow, c: col});
                        col++;
                    }
                    // Small gap (1-2 tiles — easy jump)
                    if (col < mapW - 6 && Math.random() < 0.3) {
                        col += 1 + Math.floor(Math.random() * 2);
                    }
                }
            }

            // Ensure floor reaches exit area
            for (let c = col; c < mapW - 1; c++) {
                map[curRow][c] = 1;
                path.push({r: curRow, c: c});
            }

            // Track which columns are on the main path (for safe trap placement)
            const pathCols = new Set();
            path.forEach(function(p) { pathCols.add(p.r + ',' + p.c); });

            // === Add optional side platforms for exploration ===
            // These are NOT on the critical path, just for bonus items/exploration
            const numSidePlats = 2 + Math.floor(lvl / 2);
            for (let sp = 0; sp < numSidePlats; sp++) {
                const spc = 4 + Math.floor(Math.random() * (mapW - 8));
                const spr = 3 + Math.floor(Math.random() * (mapH - 5));
                // Only place if area is clear
                let canPlace = true;
                for (let c = spc; c < spc + 4 && c < mapW - 1; c++) {
                    if (map[spr][c] !== 0) { canPlace = false; break; }
                    // Need 2 rows clearance above
                    if (spr > 0 && map[spr - 1][c] !== 0) { canPlace = false; break; }
                    if (spr > 1 && map[spr - 2][c] !== 0) { canPlace = false; break; }
                }
                if (!canPlace) continue;
                const sLen = 3 + Math.floor(Math.random() * 2);
                for (let c = spc; c < spc + sLen && c < mapW - 1; c++) {
                    map[spr][c] = 1;
                }
            }

            guards = [];
            spikes = [];
            guillotines = [];
            fallingTiles = [];

            // === Place traps along the main path only ===

            // Helper: N rows above are all empty
            function clearAbove(r, c, n) {
                for (let i = 1; i <= n; i++) {
                    if (r - i < 0) return false;
                    if (map[r - i][c] !== 0) return false;
                }
                return true;
            }

            // Spikes: on the path, with 4+ clear rows above AND clear landing tiles on both sides
            const numSpikes = 1 + Math.floor(lvl / 2) + Math.floor(difficulty / 2);
            let spikesPlaced = 0;
            // Shuffle path to randomize placement
            const shuffledPath = path.slice().sort(function() { return Math.random() - 0.5; });
            for (let pi = 0; pi < shuffledPath.length && spikesPlaced < numSpikes; pi++) {
                const p = shuffledPath[pi];
                const sr = p.r - 1; // spike goes on the tile above the floor
                const sc = p.c;
                if (sr < 1 || map[sr][sc] !== 0) continue;
                // Need 4 rows clear above the spike
                if (!clearAbove(sr, sc, 4)) continue;
                // No adjacent spikes
                if (map[sr][sc - 1] === 3 || map[sr][sc + 1] === 3) continue;
                // Must have walkable landing on BOTH sides (so you can approach and leave)
                const leftOk = sc > 1 && map[sr][sc - 1] === 0 && map[p.r][sc - 1] === 1;
                const rightOk = sc < mapW - 2 && map[sr][sc + 1] === 0 && map[p.r][sc + 1] === 1;
                if (!leftOk || !rightOk) continue;
                // Don't place near the spawn or exit
                if (sc < 5 || sc > mapW - 5) continue;
                map[sr][sc] = 3;
                spikes.push({r: sr, c: sc, active: true});
                spikesPlaced++;
            }

            // Guillotines: hanging from ceiling/platform underside, on the path, with room to run under
            let numGuill = Math.floor(lvl / 2) + Math.floor(difficulty / 2);
            if (numGuill > 4) numGuill = 4;
            let guillPlaced = 0;
            for (let pi = 0; pi < shuffledPath.length && guillPlaced < numGuill; pi++) {
                const p = shuffledPath[pi];
                const gc = p.c;
                if (gc < 5 || gc > mapW - 5) continue;
                // Find ceiling above this path tile (scan upward for solid)
                let ceilRow = -1;
                for (let r = p.r - 2; r >= 0; r--) {
                    if (map[r][gc] === 1 || map[r][gc] === 2) { ceilRow = r; break; }
                }
                if (ceilRow < 0) continue;
                const guilRow = ceilRow + 1;
                // Need at least 2 clear rows between guillotine and floor for player to pass
                if (p.r - 1 - guilRow < 2) continue;
                if (map[guilRow][gc] !== 0) continue;
                map[guilRow][gc] = 5;
                guillotines.push({r: guilRow, c: gc, phase: Math.random() * Math.PI * 2, speed: 2 + Math.random() * 2});
                guillPlaced++;
            }

            // Falling floor tiles: on path platforms (not ground), with adjacent solid
            let numFalling = Math.floor(lvl / 2);
            if (numFalling > 4) numFalling = 4;
            let fallingPlaced = 0;
            for (let pi = 0; pi < shuffledPath.length && fallingPlaced < numFalling; pi++) {
                const p = shuffledPath[pi];
                if (p.r === mapH - 1) continue; // not on ground floor
                if (p.c < 5 || p.c > mapW - 5) continue;
                if (map[p.r][p.c] !== 1) continue;
                // Need adjacent solid on at least one side
                if (map[p.r][p.c - 1] !== 1 && map[p.r][p.c + 1] !== 1) continue;
                map[p.r][p.c] = 4;
                fallingTiles.push({r: p.r, c: p.c, triggered: false, fallTimer: 0, fallen: false, shakeTimer: 0});
                fallingPlaced++;
            }

            // Guards: on path floors with headroom
            let numGuards = 1 + Math.floor(lvl / 2) + Math.floor(difficulty / 2);
            if (numGuards > 4) numGuards = 4;
            let guardsPlaced = 0;
            for (let pi = 0; pi < shuffledPath.length && guardsPlaced < numGuards; pi++) {
                const p = shuffledPath[pi];
                const gc = p.c;
                if (gc < 6 || gc > mapW - 6) continue;
                const standRow = p.r - 1;
                if (standRow < 1) continue;
                if (map[standRow][gc] !== 0) continue;
                if (!clearAbove(standRow, gc, 2)) continue;
                // Don't stack guards near each other
                let tooClose = false;
                for (let gi = 0; gi < guards.length; gi++) {
                    if (Math.abs(guards[gi].x / TILE - gc) < 6) { tooClose = true; break; }
                }
                if (tooClose) continue;
                guards.push({
                    x: gc * TILE + TILE / 2,
                    y: standRow * TILE + TILE - 36,
                    w: 20, h: 36,
                    hp: DIFF_GUARD_HP[difficulty],
                    maxHp: DIFF_GUARD_HP[difficulty],
                    facingRight: Math.random() < 0.5,
                    attackTimer: 0, blockTimer: 0,
                    hurtTimer: 0, dead: false,
                    patrolDir: Math.random() < 0.5 ? 1 : -1,
                    patrolTimer: 0,
                    nextPatrolChange: 2 + Math.random() * 2,
                    aggroRange: 120 + lvl * 10,
                    state: 'patrol',
                    runFrame: 0, runTimer: 0,
                    deathAnim: 0,
                    vx: 0, vy: 0, onGround: true
                });
                guardsPlaced++;
            }

            // Potions: on side platforms or path floors
            const numPotions = 1 + Math.floor(Math.random() * 2);
            for (let poi = 0; poi < numPotions; poi++) {
                const pc2 = 4 + Math.floor(Math.random() * (mapW - 8));
                for (let pr2 = 1; pr2 < mapH; pr2++) {
                    if (map[pr2][pc2] === 1 && map[pr2 - 1][pc2] === 0) {
                        map[pr2 - 1][pc2] = 7;
                        break;
                    }
                }
            }

            // Exit door at end of path
            exitDoor = null;
            const exitC = mapW - 3;
            // Place on the path's end floor level
            if (map[curRow][exitC] === 1) {
                map[curRow - 1][exitC] = 6;
                exitDoor = {r: curRow - 1, c: exitC};
            } else {
                // Fallback: find any floor near the right side
                for (let er = mapH - 2; er >= 1; er--) {
                    if (map[er + 1] && map[er + 1][exitC] === 1 && map[er][exitC] === 0) {
                        map[er][exitC] = 6;
                        exitDoor = {r: er, c: exitC};
                        break;
                    }
                }
                if (!exitDoor) {
                    map[curRow][exitC] = 1;
                    map[curRow - 1][exitC] = 6;
                    exitDoor = {r: curRow - 1, c: exitC};
                }
            }

            return map;
        }

        function initLevel() {
            floatingTexts = [];
            particles = [];
            timeLeft = DIFF_TIME[difficulty];
            levelMap = generateLevel(level);

            prince.x = 2 * TILE + 10;
            prince.y = 0;
            prince.vx = 0;
            prince.vy = 0;
            prince.onGround = false;
            prince.facingRight = true;
            prince.jumping = false;
            prince.climbing = false;
            prince.crouching = false;
            prince.attacking = false;
            prince.blocking = false;
            prince.attackTimer = 0;
            prince.blockTimer = 0;
            prince.hurtTimer = 0;
            prince.invincible = 0;
            prince.knockbackTimer = 0;
            prince.dead = false;
            prince.deathAnim = 0;
            prince.runFrame = 0;
            prince.hangingLedge = false;
            prince.carefulStep = false;

            // Find a good starting position (on ground)
            for (let r = 0; r < levelMap.length; r++) {
                if (levelMap[r][2] === 1 && (r === 0 || levelMap[r - 1][2] === 0)) {
                    prince.y = (r - 1) * TILE + TILE - prince.h;
                    break;
                }
            }

            camX = 0;
            camY = 0;
            deathTimer = 0;
            levelStartTimer = 2.0;
            levelCompleteTimer = 0;
        }

        // === Collision helpers ===
        function getTile(r, c) {
            if (r < 0 || r >= levelMap.length || c < 0 || !levelMap[r] || c >= levelMap[r].length) return 2; // walls outside
            return levelMap[r][c];
        }

        function isSolid(r, c) {
            const t = getTile(r, c);
            return t === 1 || t === 2;
        }

        function isFallingTile(r, c) {
            return getTile(r, c) === 4;
        }

        function getFallingTileAt(r, c) {
            for (let i = 0; i < fallingTiles.length; i++) {
                if (fallingTiles[i].r === r && fallingTiles[i].c === c && !fallingTiles[i].fallen) return fallingTiles[i];
            }
            return null;
        }

        function entityCollides(ex, ey, ew, eh) {
            // Check tile collisions
            const left = Math.floor(ex / TILE);
            const right = Math.floor((ex + ew) / TILE);
            const top = Math.floor(ey / TILE);
            const bottom = Math.floor((ey + eh) / TILE);
            for (let r = top; r <= bottom; r++) {
                for (let c = left; c <= right; c++) {
                    if (isSolid(r, c)) return true;
                }
            }
            return false;
        }

        function entityOnGround(ex, ey, ew, eh) {
            const left = Math.floor(ex / TILE);
            const right = Math.floor((ex + ew) / TILE);
            const footRow = Math.floor((ey + eh + 1) / TILE);
            for (let c = left; c <= right; c++) {
                const t = getTile(footRow, c);
                if (t === 1 || t === 2) return true;
                if (t === 4) {
                    const ft = getFallingTileAt(footRow, c);
                    if (ft && !ft.fallen) return true;
                }
            }
            return false;
        }

        // === Particles ===
        function spawnExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 120 + 30;
                particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 0.5 + Math.random() * 0.5, color: color, size: Math.random() * 3 + 1 });
            }
        }

        function spawnBlood(x, y) {
            for (let i = 0; i < 8; i++) {
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
                const speed = Math.random() * 80 + 20;
                particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 0.4 + Math.random() * 0.3, color: '#ff3333', size: Math.random() * 2 + 1 });
            }
        }

        function spawnSparks(x, y) {
            for (let i = 0; i < 6; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 100 + 40;
                particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 0.2 + Math.random() * 0.2, color: '#ffdd44', size: Math.random() * 2 + 1 });
            }
        }

        // === Drawing ===
        function drawStars(dt) {
            stars.forEach(function(s) {
                s.b += dt * s.speed;
                const brightness = (Math.sin(s.b) + 1) / 2;
                ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + brightness * 0.5) + ')';
                ctx.fillRect(s.x, s.y, s.s, s.s);
            });
        }

        function drawTiles() {
            const startCol = Math.floor(camX / TILE);
            const endCol = startCol + Math.ceil(W / TILE) + 2;
            const startRow = Math.floor(camY / TILE);
            const endRow = startRow + Math.ceil(H / TILE) + 2;

            for (let r = startRow; r <= endRow; r++) {
                for (let c = startCol; c <= endCol; c++) {
                    const t = getTile(r, c);
                    if (t === 0) continue;
                    const sx = c * TILE - camX;
                    const sy = r * TILE - camY;

                    if (t === 1) {
                        // Floor tile - dungeon stone
                        ctx.fillStyle = '#3a3040';
                        ctx.fillRect(sx, sy, TILE, TILE);
                        ctx.strokeStyle = '#2a2030';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
                        // Stone texture lines
                        ctx.strokeStyle = '#4a4050';
                        ctx.beginPath();
                        ctx.moveTo(sx + TILE / 2, sy);
                        ctx.lineTo(sx + TILE / 2, sy + TILE);
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(sx, sy + TILE / 2);
                        ctx.lineTo(sx + TILE, sy + TILE / 2);
                        ctx.stroke();
                    } else if (t === 2) {
                        // Wall
                        ctx.fillStyle = '#2a2030';
                        ctx.fillRect(sx, sy, TILE, TILE);
                        ctx.strokeStyle = '#1a1020';
                        ctx.lineWidth = 1;
                        ctx.strokeRect(sx, sy, TILE, TILE);
                        // Brick pattern
                        ctx.strokeStyle = '#3a2040';
                        ctx.beginPath();
                        ctx.moveTo(sx, sy + TILE / 3);
                        ctx.lineTo(sx + TILE, sy + TILE / 3);
                        ctx.moveTo(sx, sy + 2 * TILE / 3);
                        ctx.lineTo(sx + TILE, sy + 2 * TILE / 3);
                        ctx.moveTo(sx + TILE / 2, sy);
                        ctx.lineTo(sx + TILE / 2, sy + TILE / 3);
                        ctx.moveTo(sx + TILE / 4, sy + TILE / 3);
                        ctx.lineTo(sx + TILE / 4, sy + 2 * TILE / 3);
                        ctx.moveTo(sx + 3 * TILE / 4, sy + 2 * TILE / 3);
                        ctx.lineTo(sx + 3 * TILE / 4, sy + TILE);
                        ctx.stroke();
                    } else if (t === 3) {
                        // Spikes
                        ctx.fillStyle = '#666';
                        const spikeCount = 4;
                        for (let sp = 0; sp < spikeCount; sp++) {
                            const spx = sx + sp * (TILE / spikeCount) + (TILE / spikeCount) / 2;
                            ctx.beginPath();
                            ctx.moveTo(spx - 4, sy + TILE);
                            ctx.lineTo(spx, sy + 8);
                            ctx.lineTo(spx + 4, sy + TILE);
                            ctx.closePath();
                            ctx.fillStyle = '#999';
                            ctx.fill();
                            ctx.strokeStyle = '#ccc';
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    } else if (t === 4) {
                        // Falling floor
                        const ft = getFallingTileAt(r, c);
                        if (ft && !ft.fallen) {
                            let shakeX = 0, shakeY = 0;
                            if (ft.triggered && ft.fallTimer < 0.8) {
                                shakeX = (Math.random() - 0.5) * 4;
                                shakeY = (Math.random() - 0.5) * 2;
                            }
                            ctx.fillStyle = '#4a3830';
                            ctx.fillRect(sx + shakeX, sy + shakeY, TILE, TILE);
                            ctx.strokeStyle = '#6a5840';
                            ctx.lineWidth = 1;
                            ctx.strokeRect(sx + shakeX + 1, sy + shakeY + 1, TILE - 2, TILE - 2);
                            // Crack lines
                            ctx.strokeStyle = '#2a1810';
                            ctx.beginPath();
                            ctx.moveTo(sx + shakeX + 5, sy + shakeY + 5);
                            ctx.lineTo(sx + shakeX + TILE - 10, sy + shakeY + TILE - 5);
                            ctx.stroke();
                        }
                    } else if (t === 5) {
                        // Guillotine slot (top mount)
                        ctx.fillStyle = '#555';
                        ctx.fillRect(sx + TILE / 2 - 3, sy, 6, TILE);
                    } else if (t === 6) {
                        // Exit door
                        ctx.fillStyle = '#1a0a30';
                        ctx.fillRect(sx + 4, sy - TILE / 2, TILE - 8, TILE + TILE / 2);
                        ctx.strokeStyle = '#c084fc';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(sx + 4, sy - TILE / 2, TILE - 8, TILE + TILE / 2);
                        // Door arch
                        ctx.beginPath();
                        ctx.arc(sx + TILE / 2, sy - TILE / 2 + 2, (TILE - 8) / 2, Math.PI, 0);
                        ctx.strokeStyle = '#c084fc';
                        ctx.stroke();
                        // Glow
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = '#c084fc';
                        ctx.fillStyle = 'rgba(192,132,252,0.15)';
                        ctx.fillRect(sx + 6, sy - TILE / 2 + 2, TILE - 12, TILE + TILE / 2 - 4);
                        ctx.shadowBlur = 0;
                        // Door handle
                        ctx.fillStyle = '#ffd700';
                        ctx.beginPath();
                        ctx.arc(sx + TILE - 12, sy + TILE / 4, 3, 0, Math.PI * 2);
                        ctx.fill();
                    } else if (t === 7) {
                        // Potion
                        ctx.fillStyle = '#ff3366';
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = '#ff3366';
                        // Bottle shape
                        ctx.fillRect(sx + TILE / 2 - 4, sy + TILE - 16, 8, 12);
                        ctx.fillRect(sx + TILE / 2 - 2, sy + TILE - 20, 4, 4);
                        ctx.shadowBlur = 0;
                    }
                }
            }

            // Draw guillotine blades (animated)
            guillotines.forEach(function(g) {
                const bladePhase = Math.sin(gameTime * g.speed + g.phase);
                const bladeY = g.r * TILE - camY + (bladePhase > 0.3 ? TILE * 0.8 : 0);
                const bladeX = g.c * TILE - camX + TILE / 2;
                g.bladeDown = bladePhase > 0.3;
                // Blade
                ctx.fillStyle = '#aaa';
                ctx.beginPath();
                ctx.moveTo(bladeX - 12, bladeY);
                ctx.lineTo(bladeX, bladeY + 20);
                ctx.lineTo(bladeX + 12, bladeY);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#ddd';
                ctx.lineWidth = 1;
                ctx.stroke();
                // Rod
                ctx.fillStyle = '#666';
                ctx.fillRect(bladeX - 2, g.r * TILE - camY - 10, 4, bladeY - (g.r * TILE - camY) + 10);
            });
        }

        function drawPrince() {
            if (prince.dead && prince.deathAnim > 1.5) return;
            const px = prince.x - camX;
            const py = prince.y - camY;
            const dir = prince.facingRight ? 1 : -1;

            // Flicker when invincible
            if (prince.invincible > 0 && Math.floor(prince.invincible * 10) % 2 === 0) return;

            ctx.save();
            ctx.translate(px + prince.w / 2, py + prince.h);
            ctx.scale(dir, 1);

            // Death animation
            if (prince.dead) {
                ctx.globalAlpha = Math.max(0, 1 - prince.deathAnim);
                ctx.rotate(prince.deathAnim * 0.5);
            }

            const crouch = prince.crouching ? 8 : 0;

            // Run cycle phase (0 to 2*PI) — drives legs, arms, body bob
            const running = prince.onGround && Math.abs(prince.vx) > 10;
            const phase = running ? prince.runFrame * 10 : 0;
            const sinP = Math.sin(phase);
            const cosP = Math.cos(phase);

            // Body bob — torso rises/falls slightly while running
            const bodyBob = running ? Math.abs(sinP) * 2 : 0;

            // --- Legs ---
            // Each leg swings forward/back from the hip; thigh + shin segments
            const hipY = -14 + crouch;
            const thighLen = 8 - Math.floor(crouch / 2);
            const shinLen = 7 - Math.ceil(crouch / 2);

            if (!prince.onGround) {
                // Airborne: legs tucked or spread
                const tuck = prince.vy < 0 ? -0.3 : 0.2;
                // Left leg
                ctx.save();
                ctx.translate(-3, hipY - bodyBob);
                ctx.rotate(tuck);
                ctx.fillStyle = '#8855aa';
                ctx.fillRect(-2, 0, 5, thighLen);
                ctx.translate(0, thighLen);
                ctx.rotate(0.3);
                ctx.fillRect(-2, 0, 5, shinLen);
                ctx.fillStyle = '#553366';
                ctx.fillRect(-2, shinLen - 2, 6, 3);
                ctx.restore();
                // Right leg
                ctx.save();
                ctx.translate(2, hipY - bodyBob);
                ctx.rotate(-tuck);
                ctx.fillStyle = '#8855aa';
                ctx.fillRect(-2, 0, 5, thighLen);
                ctx.translate(0, thighLen);
                ctx.rotate(0.3);
                ctx.fillRect(-2, 0, 5, shinLen);
                ctx.fillStyle = '#553366';
                ctx.fillRect(-2, shinLen - 2, 6, 3);
                ctx.restore();
            } else if (running) {
                // Running: alternating leg swing with knee bend
                const legSwing = sinP * 0.6;
                const kneeBack = Math.max(0, -cosP) * 0.8;   // back leg bends knee
                const kneeFront = Math.max(0, cosP) * 0.8;
                // Left leg (swings with +sinP)
                ctx.save();
                ctx.translate(-3, hipY - bodyBob);
                ctx.rotate(legSwing);
                ctx.fillStyle = '#8855aa';
                ctx.fillRect(-2, 0, 5, thighLen);
                ctx.translate(0, thighLen);
                ctx.rotate(kneeBack);
                ctx.fillRect(-2, 0, 5, shinLen);
                ctx.fillStyle = '#553366';
                ctx.fillRect(-2, shinLen - 2, 6, 3);
                ctx.restore();
                // Right leg (swings with -sinP)
                ctx.save();
                ctx.translate(2, hipY - bodyBob);
                ctx.rotate(-legSwing);
                ctx.fillStyle = '#8855aa';
                ctx.fillRect(-2, 0, 5, thighLen);
                ctx.translate(0, thighLen);
                ctx.rotate(kneeFront);
                ctx.fillRect(-2, 0, 5, shinLen);
                ctx.fillStyle = '#553366';
                ctx.fillRect(-2, shinLen - 2, 6, 3);
                ctx.restore();
            } else {
                // Idle: legs straight
                ctx.fillStyle = '#8855aa';
                ctx.fillRect(-6, hipY, 5, thighLen + shinLen);
                ctx.fillRect(1, hipY, 5, thighLen + shinLen);
                ctx.fillStyle = '#553366';
                ctx.fillRect(-7, -2, 6, 3);
                ctx.fillRect(0, -2, 6, 3);
            }

            // --- Body/torso --- slight forward lean when running
            ctx.save();
            if (running) ctx.rotate(0.05);
            ctx.translate(0, -bodyBob);

            ctx.fillStyle = '#f5deb3';
            if (prince.hurtTimer > 0) ctx.fillStyle = '#ff6666';
            ctx.fillRect(-7, -30 + crouch, 14, 18);

            // Belt
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(-7, -16 + crouch, 14, 3);

            // --- Arms ---
            ctx.fillStyle = '#deb887';
            if (prince.attacking) {
                // Sword arm thrust forward
                ctx.fillRect(2, -28 + crouch, 18, 4);
                ctx.fillStyle = '#ccc';
                ctx.fillRect(18, -30 + crouch, 14, 2);
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(16, -30 + crouch, 3, 6);
            } else if (prince.blocking) {
                ctx.fillRect(2, -32 + crouch, 10, 4);
                ctx.fillStyle = '#ccc';
                ctx.fillRect(8, -36 + crouch, 2, 14);
                ctx.fillStyle = '#ffd700';
                ctx.fillRect(7, -30 + crouch, 4, 3);
            } else if (running) {
                // Arms swing opposite to legs
                const armSwing = sinP * 0.55;
                // Back arm
                ctx.save();
                ctx.translate(-7, -28 + crouch);
                ctx.rotate(armSwing);
                ctx.fillRect(-2, 0, 4, 10);
                ctx.restore();
                // Front arm
                ctx.save();
                ctx.translate(7, -28 + crouch);
                ctx.rotate(-armSwing);
                ctx.fillRect(-2, 0, 4, 10);
                ctx.restore();
                if (prince.hasSword) {
                    ctx.fillStyle = '#999';
                    ctx.fillRect(6, -18 + crouch, 2, 10);
                }
            } else {
                // Idle arms at sides
                ctx.fillRect(-9, -28 + crouch, 4, 10);
                ctx.fillRect(5, -28 + crouch, 4, 10);
                if (prince.hasSword) {
                    ctx.fillStyle = '#999';
                    ctx.fillRect(6, -18 + crouch, 2, 10);
                }
            }

            // --- Head --- bobs with body
            ctx.fillStyle = '#deb887';
            ctx.fillRect(-5, -38 + crouch, 10, 9);
            // Turban
            ctx.fillStyle = '#c084fc';
            ctx.fillRect(-6, -40 + crouch, 12, 5);
            ctx.fillRect(-4, -41 + crouch, 8, 2);
            // Eye
            ctx.fillStyle = '#000';
            ctx.fillRect(2, -35 + crouch, 2, 2);

            ctx.restore(); // undo body lean/bob
            ctx.restore(); // undo main transform
        }

        function drawGuard(g) {
            if (g.dead && g.deathAnim > 1.5) return;
            const gx = g.x - camX;
            const gy = g.y - camY;
            const dir = g.facingRight ? 1 : -1;

            ctx.save();
            ctx.translate(gx + g.w / 2, gy + g.h);
            ctx.scale(dir, 1);

            if (g.dead) {
                ctx.globalAlpha = Math.max(0, 1 - g.deathAnim * 0.8);
                ctx.rotate(g.deathAnim * 0.8);
            }

            // Legs
            let legOff = 0;
            if (Math.abs(g.vx) > 10) {
                legOff = Math.sin(g.runFrame * 8) * 5;
            }
            ctx.fillStyle = '#444';
            ctx.fillRect(-6, -14, 5, 14);
            ctx.fillRect(1, -14 + legOff, 5, 14);
            ctx.fillStyle = '#333';
            ctx.fillRect(-7, -2, 6, 3);
            ctx.fillRect(0, -2 + legOff, 6, 3);

            // Body - armor
            ctx.fillStyle = g.hurtTimer > 0 ? '#ff4444' : '#666';
            ctx.fillRect(-7, -30, 14, 18);
            // Armor detail
            ctx.fillStyle = '#555';
            ctx.fillRect(-7, -26, 14, 2);
            ctx.fillRect(-7, -22, 14, 2);

            // Belt
            ctx.fillStyle = '#8B0000';
            ctx.fillRect(-7, -16, 14, 3);

            // Arms and weapon
            ctx.fillStyle = '#887766';
            if (g.attackTimer > 0) {
                ctx.fillRect(2, -28, 18, 4);
                ctx.fillStyle = '#aaa';
                ctx.fillRect(18, -30, 12, 2);
                ctx.fillStyle = '#8B0000';
                ctx.fillRect(16, -30, 3, 6);
            } else if (g.blockTimer > 0) {
                ctx.fillRect(2, -32, 10, 4);
                ctx.fillStyle = '#aaa';
                ctx.fillRect(8, -36, 2, 14);
            } else {
                ctx.fillRect(-9, -28, 4, 10);
                ctx.fillRect(5, -28, 4, 10);
                ctx.fillStyle = '#888';
                ctx.fillRect(6, -18, 2, 10);
            }

            // Head
            ctx.fillStyle = '#887766';
            ctx.fillRect(-5, -38, 10, 9);
            // Helmet
            ctx.fillStyle = '#555';
            ctx.fillRect(-6, -40, 12, 5);
            ctx.fillRect(-7, -36, 14, 2);
            // Eye
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(2, -35, 2, 2);

            ctx.restore();

            // Health bar
            if (!g.dead && g.hp < g.maxHp) {
                const barW = 24;
                const barH = 3;
                const barX = gx + g.w / 2 - barW / 2;
                const barY = gy - 8;
                ctx.fillStyle = '#333';
                ctx.fillRect(barX, barY, barW, barH);
                ctx.fillStyle = '#ff3333';
                ctx.fillRect(barX, barY, barW * (g.hp / g.maxHp), barH);
            }
        }

        function drawHUD() {
            // Time display
            const minutes = Math.floor(timeLeft / 60);
            const seconds = Math.floor(timeLeft % 60);
            const timeStr = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
            ctx.fillStyle = timeLeft < 30 ? '#ff3333' : '#c084fc';
            ctx.font = 'bold 16px Courier';
            ctx.textAlign = 'right';
            if (timeLeft < 30) {
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ff3333';
            }
            ctx.fillText('TIME: ' + timeStr, W - 10, 20);
            ctx.shadowBlur = 0;

            // Health pips
            ctx.textAlign = 'left';
            for (let i = 0; i < health; i++) {
                ctx.fillStyle = i < 2 ? '#ff3333' : '#c084fc';
                ctx.shadowBlur = 4;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(10 + i * 16, 8, 12, 12);
                ctx.shadowBlur = 0;
            }

            // Level indicator
            ctx.fillStyle = '#c084fc';
            ctx.font = '12px Courier';
            ctx.textAlign = 'center';
            ctx.fillText('DUNGEON ' + level, W / 2, 20);
        }

        function updateHUD() {
            document.getElementById('s').innerText = score;
            document.getElementById('l').innerText = lives;
            document.getElementById('v').innerText = level;
        }

        // === Prince Physics ===
        function updatePrince(dt) {
            if (prince.dead) {
                prince.deathAnim += dt;
                return;
            }

            // Timers
            if (prince.attackTimer > 0) {
                prince.attackTimer -= dt;
                if (prince.attackTimer <= 0) prince.attacking = false;
            }
            if (prince.blockTimer > 0) {
                prince.blockTimer -= dt;
                if (prince.blockTimer <= 0) prince.blocking = false;
            }
            if (prince.hurtTimer > 0) prince.hurtTimer -= dt;
            if (prince.invincible > 0) prince.invincible -= dt;
            if (prince.knockbackTimer > 0) prince.knockbackTimer -= dt;

            const moveSpeed = prince.crouching || prince.carefulStep ? CAREFUL_SPEED : RUN_SPEED;

            // Horizontal movement
            if (prince.knockbackTimer <= 0) prince.vx = 0;
            if (!prince.attacking && !prince.hangingLedge && prince.knockbackTimer <= 0) {
                if (keys['ArrowLeft']) {
                    prince.vx = -moveSpeed;
                    prince.facingRight = false;
                }
                if (keys['ArrowRight']) {
                    prince.vx = moveSpeed;
                    prince.facingRight = true;
                }
            }

            // Crouching
            prince.crouching = keys['ArrowDown'] && prince.onGround && !prince.attacking;
            prince.carefulStep = keys['ArrowDown'] && prince.onGround;

            // Jumping
            if (keys[' '] && prince.onGround && !prince.attacking && !prince.crouching) {
                prince.vy = JUMP_VEL;
                prince.onGround = false;
                prince.jumping = true;
                sfxJump();
            }

            // Climbing up (at ledge)
            if (keys['ArrowUp'] && prince.onGround && !prince.attacking && !prince.climbing) {
                // Look for a platform edge the prince can grab and pull up onto.
                // Check the tile row at the prince's head height and one row above.
                const princeCol = Math.floor((prince.x + prince.w / 2) / TILE);
                const faceDir = prince.facingRight ? 1 : -1;
                const checkCol = princeCol + faceDir;
                const princeRow = Math.floor(prince.y / TILE);
                // A climbable ledge: solid tile at prince's head level in front, open space above it
                // Also check one row up: solid at princeRow, open at princeRow-1
                let climbTargetRow = -1;
                if (isSolid(princeRow, checkCol) && !isSolid(princeRow - 1, checkCol)) {
                    climbTargetRow = princeRow - 1;
                } else if (isSolid(princeRow + 1, checkCol) && !isSolid(princeRow, checkCol) && !isSolid(princeRow - 1, checkCol)) {
                    climbTargetRow = princeRow;
                } else if (isSolid(princeRow, princeCol) && !isSolid(princeRow - 1, princeCol)) {
                    // Climb straight up (wall directly beneath, open above)
                    climbTargetRow = princeRow - 1;
                }
                if (climbTargetRow >= 0) {
                    // Verify the prince can fit at the destination
                    const destX = checkCol * TILE + (prince.facingRight ? 2 : TILE - prince.w - 2);
                    const destY = (climbTargetRow + 1) * TILE - prince.h;
                    if (!entityCollides(destX, destY, prince.w, prince.h)) {
                        prince.climbing = true;
                        prince.climbTarget = { x: destX, y: destY };
                        prince.vx = 0;
                        prince.vy = 0;
                    }
                }
            }

            // Animate climbing movement
            if (prince.climbing && prince.climbTarget) {
                const climbSpeed = 160; // pixels per second — deliberate, weighty
                const dx = prince.climbTarget.x - prince.x;
                const dy = prince.climbTarget.y - prince.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 3) {
                    // Snap to target
                    prince.x = prince.climbTarget.x;
                    prince.y = prince.climbTarget.y;
                    prince.climbing = false;
                    prince.climbTarget = null;
                    prince.onGround = true;
                    prince.vy = 0;
                    sfxLand();
                } else {
                    // Move towards target: first up, then across
                    const stepDist = climbSpeed * dt;
                    if (Math.abs(dy) > 3) {
                        // Vertical phase: move up
                        const moveY = Math.max(-stepDist, dy);
                        prince.y += moveY;
                    } else {
                        // Horizontal phase: move across
                        const moveX = dx > 0 ? Math.min(stepDist, dx) : Math.max(-stepDist, dx);
                        prince.x += moveX;
                        prince.y = prince.climbTarget.y;
                    }
                    prince.vy = 0;
                    prince.vx = 0;
                    return; // Skip normal physics while climbing
                }
            }

            // Attack
            if ((keys['z'] || keys['Z'] || keys['ArrowUp']) && prince.hasSword && !prince.attacking && !prince.crouching && prince.attackTimer <= 0) {
                if (keys['z'] || keys['Z']) {
                    prince.attacking = true;
                    prince.attackTimer = 0.35;
                    sfxSword();
                }
            }

            // Block (down + near enemy attacking)
            if (prince.crouching && !prince.attacking) {
                // Auto-block when crouching with sword
                let nearEnemy = false;
                guards.forEach(function(g) {
                    if (g.dead) return;
                    const dist = Math.abs((g.x + g.w / 2) - (prince.x + prince.w / 2));
                    if (dist < 60 && g.attackTimer > 0) nearEnemy = true;
                });
                if (nearEnemy && prince.hasSword) {
                    prince.blocking = true;
                    prince.blockTimer = 0.3;
                }
            }

            // Gravity
            if (!prince.onGround) {
                prince.vy += GRAVITY * dt;
                if (prince.vy > 600) prince.vy = 600;
            }

            // Move X (use h-2 to avoid colliding with the floor tile the prince stands on)
            const newX = prince.x + prince.vx * dt;
            if (!entityCollides(newX, prince.y, prince.w, prince.h - 2)) {
                prince.x = newX;
            } else {
                prince.vx = 0;
            }

            // Move Y
            let newY = prince.y + prince.vy * dt;
            if (prince.vy > 0) {
                // Falling
                if (entityOnGround(prince.x, newY, prince.w, prince.h)) {
                    // Snap to top of floor
                    const footRow = Math.floor((newY + prince.h + 1) / TILE);
                    prince.y = footRow * TILE - prince.h;
                    const fallSpeed = prince.vy;
                    prince.vy = 0;
                    if (!prince.onGround) {
                        prince.onGround = true;
                        prince.jumping = false;
                        sfxLand();
                        // Fall damage
                        if (fallSpeed > 500) {
                            hurtPrince(2);
                            spawnExplosion(prince.x + prince.w / 2, prince.y + prince.h, '#c084fc', 15);
                        }
                    }
                    // Trigger falling tiles
                    const footLeft = Math.floor(prince.x / TILE);
                    const footRight = Math.floor((prince.x + prince.w) / TILE);
                    for (let fc = footLeft; fc <= footRight; fc++) {
                        if (getTile(footRow, fc) === 4) {
                            const ft = getFallingTileAt(footRow, fc);
                            if (ft && !ft.triggered) {
                                ft.triggered = true;
                                ft.fallTimer = 0;
                            }
                        }
                    }
                } else {
                    prince.y = newY;
                    prince.onGround = false;
                }
            } else if (prince.vy < 0) {
                // Rising
                if (entityCollides(prince.x, newY, prince.w, prince.h)) {
                    prince.vy = 0;
                } else {
                    prince.y = newY;
                    prince.onGround = false;
                }
            } else {
                // Check if still on ground
                if (!entityOnGround(prince.x, prince.y, prince.w, prince.h)) {
                    prince.onGround = false;
                }
            }

            // Run animation
            if (Math.abs(prince.vx) > 10) {
                prince.runTimer += dt;
                prince.runFrame = prince.runTimer;
            } else {
                prince.runTimer = 0;
                prince.runFrame = 0;
            }

            // Trap checks
            checkTraps();

            // Potion pickup
            const princeTileR = Math.floor((prince.y + prince.h / 2) / TILE);
            const princeTileC = Math.floor((prince.x + prince.w / 2) / TILE);
            if (getTile(princeTileR, princeTileC) === 7) {
                levelMap[princeTileR][princeTileC] = 0;
                health = Math.min(health + 2, 10);
                score += 200;
                sfxPickup();
                floatingTexts.push({x: prince.x + prince.w / 2, y: prince.y - 10, t: '+HEALTH', life: 1.0, c: '#ff3366'});
                spawnExplosion(prince.x + prince.w / 2, prince.y + prince.h / 2, '#ff3366', 10);
                updateHUD();
            }

            // Exit check
            if (exitDoor && princeTileR === exitDoor.r && princeTileC === exitDoor.c) {
                if (levelCompleteTimer <= 0) {
                    levelCompleteTimer = 2.0;
                    const timeBonus = Math.floor(timeLeft) * 10;
                    score += 1000 + timeBonus;
                    floatingTexts.push({x: camX + W / 2, y: camY + H / 2 - 40, t: 'LEVEL CLEAR! +' + (1000 + timeBonus), life: 2.0, c: '#c084fc'});
                    sfxLevelClear();
                    updateHUD();
                }
            }

            // Clamp position
            if (prince.x < TILE) prince.x = TILE;
            const maxX = (levelMap[0] ? levelMap[0].length : 30) * TILE - prince.w - TILE;
            if (prince.x > maxX) prince.x = maxX;

            // Fall off bottom = death
            if (prince.y > levelMap.length * TILE + 100) {
                killPrince();
            }
        }

        function hurtPrince(dmg) {
            if (prince.invincible > 0 || prince.dead || prince.blocking) return;
            health -= dmg;
            prince.hurtTimer = 0.3;
            prince.invincible = 0.8;
            sfxHurt();
            spawnBlood(prince.x + prince.w / 2, prince.y + prince.h / 2);
            if (health <= 0) {
                health = 0;
                killPrince();
            }
            updateHUD();
        }

        function killPrince() {
            if (prince.dead) return;
            prince.dead = true;
            prince.deathAnim = 0;
            sfxDeath();
            spawnExplosion(prince.x + prince.w / 2, prince.y + prince.h / 2, '#c084fc', 20);
            deathTimer = 2.0;
        }

        function checkTraps() {
            const pcx = prince.x + prince.w / 2;
            const pcy = prince.y + prince.h / 2;
            const pRow = Math.floor((prince.y + prince.h - 2) / TILE);
            const pCol = Math.floor(pcx / TILE);

            // Spikes - check tile the prince is standing on/in
            const feetRow = Math.floor((prince.y + prince.h) / TILE);
            const bodyRow = Math.floor((prince.y + prince.h - 10) / TILE);
            const leftCol = Math.floor(prince.x / TILE);
            const rightCol = Math.floor((prince.x + prince.w) / TILE);

            for (let sc = leftCol; sc <= rightCol; sc++) {
                if (getTile(bodyRow, sc) === 3 || getTile(feetRow - 1, sc) === 3) {
                    // Check if prince's feet are actually in the spike tile
                    const spikeTop = (getTile(bodyRow, sc) === 3 ? bodyRow : feetRow - 1) * TILE + 8;
                    if (prince.y + prince.h > spikeTop) {
                        if (prince.invincible <= 0) {
                            hurtPrince(3);
                            sfxSpike();
                            prince.vy = -200;
                        }
                    }
                }
            }

            // Guillotines
            guillotines.forEach(function(g) {
                if (!g.bladeDown) return;
                const bladeX = g.c * TILE + TILE / 2;
                const bladeY = g.r * TILE + TILE * 0.8;
                const dist = Math.abs(pcx - bladeX);
                const distY = Math.abs(pcy - bladeY);
                if (dist < 18 && distY < 24) {
                    hurtPrince(2);
                    sfxGuillotine();
                    prince.vy = -150;
                    prince.vx = pcx > bladeX ? 200 : -200;
                }
            });
        }

        // === Falling tiles update ===
        function updateFallingTiles(dt) {
            fallingTiles.forEach(function(ft) {
                if (ft.triggered && !ft.fallen) {
                    ft.fallTimer += dt;
                    if (ft.fallTimer > 0.8) {
                        ft.fallen = true;
                        levelMap[ft.r][ft.c] = 0;
                        playTone(80, 0.3, 'sawtooth', 0.08);
                        spawnExplosion(ft.c * TILE + TILE / 2, ft.r * TILE + TILE / 2, '#6a5840', 8);
                    }
                }
            });
        }

        // === Guard AI ===
        function updateGuards(dt) {
            guards.forEach(function(g) {
                if (g.dead) {
                    g.deathAnim += dt;
                    return;
                }

                // Timers
                if (g.attackTimer > 0) g.attackTimer -= dt;
                if (g.blockTimer > 0) g.blockTimer -= dt;
                if (g.hurtTimer > 0) g.hurtTimer -= dt;

                const distToPrince = Math.abs((g.x + g.w / 2) - (prince.x + prince.w / 2));
                const dirToPrince = (prince.x + prince.w / 2) > (g.x + g.w / 2) ? 1 : -1;

                if (prince.dead) {
                    g.state = 'patrol';
                }

                if (g.state === 'patrol') {
                    if (distToPrince < g.aggroRange && !prince.dead) {
                        g.state = 'chase';
                    } else {
                        g.patrolTimer += dt;
                        if (g.patrolTimer > 2 + Math.random() * 2) {
                            g.patrolDir = -g.patrolDir;
                            g.patrolTimer = 0;
                        }
                        g.vx = g.patrolDir * 40;
                        g.facingRight = g.patrolDir > 0;
                    }
                } else if (g.state === 'chase') {
                    if (distToPrince > g.aggroRange * 1.5) {
                        g.state = 'patrol';
                    } else if (distToPrince < 45) {
                        g.state = 'attack';
                    } else {
                        g.vx = dirToPrince * 70;
                        g.facingRight = dirToPrince > 0;
                    }
                } else if (g.state === 'attack') {
                    g.facingRight = dirToPrince > 0;
                    if (distToPrince > 60) {
                        g.state = 'chase';
                    } else {
                        g.vx = 0;
                        // Attack pattern
                        if (g.attackTimer <= 0 && g.blockTimer <= 0) {
                            const action = Math.random();
                            if (prince.attacking && action < 0.5) {
                                // Block
                                g.blockTimer = 0.4;
                            } else if (action < 0.7) {
                                // Attack
                                g.attackTimer = 0.35;
                                sfxSword();
                            } else {
                                // Wait
                            }
                        }
                    }
                }

                // Gravity for guards
                if (!g.onGround) {
                    g.vy += GRAVITY * dt;
                    if (g.vy > 600) g.vy = 600;
                }

                // Move guard X
                const gnx = g.x + g.vx * dt;
                if (!entityCollides(gnx, g.y, g.w, g.h - 2)) {
                    // Check for edge (don't walk off platforms)
                    const footRow = Math.floor((g.y + g.h + 2) / TILE);
                    const checkCol = Math.floor((gnx + (g.vx > 0 ? g.w : 0)) / TILE);
                    if (isSolid(footRow, checkCol) || isFallingTile(footRow, checkCol) || g.state === 'chase' || g.state === 'attack') {
                        g.x = gnx;
                    } else if (g.state === 'patrol') {
                        g.patrolDir = -g.patrolDir;
                        g.patrolTimer = 0;
                    }
                } else {
                    g.vx = 0;
                    if (g.state === 'patrol') {
                        g.patrolDir = -g.patrolDir;
                        g.patrolTimer = 0;
                    }
                }

                // Move guard Y
                const gny = g.y + g.vy * dt;
                if (g.vy > 0 && entityOnGround(g.x, gny, g.w, g.h)) {
                    const gFootRow = Math.floor((gny + g.h + 1) / TILE);
                    g.y = gFootRow * TILE - g.h;
                    g.vy = 0;
                    g.onGround = true;
                } else {
                    g.y = gny;
                    if (g.vy !== 0) g.onGround = false;
                }

                // Run animation
                if (Math.abs(g.vx) > 10) {
                    g.runTimer += dt;
                    g.runFrame = g.runTimer;
                } else {
                    g.runTimer = 0;
                    g.runFrame = 0;
                }

                // Guard attacks prince
                if (g.attackTimer > 0.15 && g.attackTimer < 0.25 && distToPrince < 50) {
                    if (!prince.blocking) {
                        hurtPrince(1);
                    } else {
                        sfxParry();
                        spawnSparks(prince.x + (prince.facingRight ? prince.w + 5 : -5), prince.y + 8);
                        floatingTexts.push({x: prince.x + prince.w / 2, y: prince.y - 10, t: 'PARRY!', life: 0.6, c: '#ffdd44'});
                    }
                }

                // Prince attacks guard
                if (prince.attacking && prince.attackTimer > 0.15 && prince.attackTimer < 0.25) {
                    const attackX = prince.facingRight ? prince.x + prince.w : prince.x - 20;
                    if (g.x + g.w > attackX && g.x < attackX + 30 && Math.abs(g.y - prince.y) < 20) {
                        if (g.blockTimer > 0) {
                            sfxParry();
                            spawnSparks(g.x + (g.facingRight ? -5 : g.w + 5), g.y + 8);
                            floatingTexts.push({x: g.x + g.w / 2, y: g.y - 10, t: 'BLOCKED!', life: 0.6, c: '#ffdd44'});
                        } else {
                            g.hp--;
                            g.hurtTimer = 0.25;
                            score += 50;
                            spawnBlood(g.x + g.w / 2, g.y + g.h / 2);
                            floatingTexts.push({x: g.x + g.w / 2, y: g.y - 10, t: '+50', life: 0.8, c: '#ff6666'});
                            if (g.hp <= 0) {
                                g.dead = true;
                                g.deathAnim = 0;
                                score += 200;
                                sfxGuardDeath();
                                spawnExplosion(g.x + g.w / 2, g.y + g.h / 2, '#ff3333', 15);
                                floatingTexts.push({x: g.x + g.w / 2, y: g.y - 20, t: '+200', life: 1.0, c: '#ffd700'});
                            }
                            updateHUD();
                        }
                    }
                }
            });
        }

        // === Camera ===
        function updateCamera() {
            let targetX = prince.x + prince.w / 2 - W / 2;
            let targetY = prince.y + prince.h / 2 - H / 2;

            const mapPixelW = (levelMap[0] ? levelMap[0].length : 30) * TILE;
            const mapPixelH = levelMap.length * TILE;

            targetX = Math.max(0, Math.min(targetX, mapPixelW - W));
            targetY = Math.max(0, Math.min(targetY, mapPixelH - H));

            camX += (targetX - camX) * 0.1;
            camY += (targetY - camY) * 0.1;
        }

        // === AI Mode ===
        function runAI(dt) {
            if (prince.dead) return;

            // Find nearest threat or goal
            const pcx = prince.x + prince.w / 2;
            const pcy = prince.y + prince.h;

            // Find nearest guard
            let nearestGuard = null;
            let nearestGuardDist = Infinity;
            guards.forEach(function(g) {
                if (g.dead) return;
                const d = Math.abs(g.x - prince.x);
                if (d < nearestGuardDist) {
                    nearestGuardDist = d;
                    nearestGuard = g;
                }
            });

            // Combat AI
            if (nearestGuard && nearestGuardDist < 60) {
                keys['ArrowLeft'] = false;
                keys['ArrowRight'] = false;
                keys[' '] = false;
                keys['ArrowDown'] = false;
                const guardDir = nearestGuard.x > prince.x ? 'ArrowRight' : 'ArrowLeft';
                prince.facingRight = nearestGuard.x > prince.x;

                if (nearestGuard.attackTimer > 0.1) {
                    // Block
                    keys['ArrowDown'] = true;
                } else if (Math.random() < 0.03) {
                    keys['z'] = true;
                    setTimeout(function() { keys['z'] = false; }, 100);
                }
                return;
            }

            keys['z'] = false;
            keys['ArrowDown'] = false;

            // Navigation AI - head towards exit
            if (exitDoor) {
                const exitX = exitDoor.c * TILE + TILE / 2;
                const exitY = exitDoor.r * TILE;
                const dx = exitX - pcx;

                keys['ArrowLeft'] = dx < -15;
                keys['ArrowRight'] = dx > 15;

                // Jump over gaps
                const aheadCol = Math.floor((prince.x + (prince.facingRight ? prince.w + 10 : -10)) / TILE);
                const feetRow = Math.floor((prince.y + prince.h + 2) / TILE);
                if (!isSolid(feetRow, aheadCol) && !isFallingTile(feetRow, aheadCol) && prince.onGround) {
                    keys[' '] = true;
                } else {
                    keys[' '] = false;
                }

                // Jump to reach higher platforms
                if (prince.onGround && exitY < prince.y - TILE * 2 && Math.abs(dx) < TILE * 5) {
                    keys[' '] = true;
                }

                // Avoid spikes
                const nextCol = Math.floor((prince.x + (prince.facingRight ? prince.w + 5 : -5)) / TILE);
                const nextRow = Math.floor((prince.y + prince.h - 5) / TILE);
                if (getTile(nextRow, nextCol) === 3) {
                    keys[' '] = true;
                }
            }
        }

        // Cached background gradients (created once, reused every frame)
        const bgGradGame = ctx.createLinearGradient(0, 0, 0, H);
        bgGradGame.addColorStop(0, '#0a0515');
        bgGradGame.addColorStop(0.5, '#0a0a20');
        bgGradGame.addColorStop(1, '#050510');

        const bgGradHome = ctx.createLinearGradient(0, 0, 0, H);
        bgGradHome.addColorStop(0, '#150010');
        bgGradHome.addColorStop(0.5, '#0a0020');
        bgGradHome.addColorStop(1, '#050505');

        // === Main Loop ===
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const rawDt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            const dt = Math.min(rawDt, 0.05);

            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            if (state === 'START' || state === 'OVER') {
                drawHomeScreen(dt);
                requestAnimationFrame(loop);
                return;
            }

            if (paused) {
                drawStars(0);
                drawGameContent();
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 40px Courier';
                ctx.fillText("PAUSED", W / 2, H / 2 - 10);
                ctx.font = '16px Courier';
                ctx.fillStyle = '#fff';
                ctx.fillText("PRESS P OR CLICK RESUME", W / 2, H / 2 + 25);
                requestAnimationFrame(loop);
                return;
            }

            gameTime += dt;

            // Level start
            if (levelStartTimer > 0) {
                levelStartTimer -= dt;
                drawStars(0);
                drawTiles();
                drawPrince();
                guards.forEach(function(g) { drawGuard(g); });
                ctx.textAlign = 'center';
                ctx.fillStyle = '#c084fc';
                ctx.font = 'bold 28px Courier';
                ctx.fillText("DUNGEON " + level, W / 2, H / 2 - 10);
                ctx.font = '14px Courier';
                ctx.fillStyle = '#aaa';
                ctx.fillText("FIND THE EXIT!", W / 2, H / 2 + 20);
                updateHUD();
                requestAnimationFrame(loop);
                keys = {};
                return;
            }

            // Level complete
            if (levelCompleteTimer > 0) {
