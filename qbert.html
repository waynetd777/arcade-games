            ctx.fillText(state === 'START' ? "HOP TO IT!" : "GAME OVER", W / 2, 565);
            ctx.font = '11px Courier';
            ctx.fillStyle = '#888';
            ctx.fillText("SPACE: START | P: PAUSE | A: AI | S: SOUND | ESC: MENU", W / 2, 582);
            ctx.fillText("ARROWS: DIAGONAL HOP | CHANGE ALL CUBES TO WIN!", W / 2, 596);
        }

        // === Difficulty click ===
        canvas.addEventListener('click', function(e) {
            if (state !== 'START' && state !== 'OVER') return;
            ensureAudio();
            playMusic('home');
            let rect = canvas.getBoundingClientRect();
            let scaleX = W / rect.width;
            let scaleY = H / rect.height;
            let mx = (e.clientX - rect.left) * scaleX;
            let my = (e.clientY - rect.top) * scaleY;
            let dBtnW = 100, dBtnH = 30, dBtnGap = 12;
            let dTotalW = 3 * dBtnW + 2 * dBtnGap;
            let dBtnStartX = (W - dTotalW) / 2;
            let dBtnY = 390;
            for (let d = 0; d < 3; d++) {
                let bx = dBtnStartX + d * (dBtnW + dBtnGap);
                if (mx >= bx && mx <= bx + dBtnW && my >= dBtnY && my <= dBtnY + dBtnH) {
                    difficulty = d;
                }
            }
        });

        // === Collision Detection ===
        function checkCollisions() {
            if (qbert.dead || qbert.hopping || qbert.onDisc) return;

            // Coily collision
            if (coily && coily.active && !coily.hopping) {
                if (coily.row === qbert.row && coily.col === qbert.col) {
                    killQbert();
                    return;
                }
            }

            // Slick/Sam collision (catch them for points)
            for (let i = slickSam.length - 1; i >= 0; i--) {
                let ss = slickSam[i];
                if (!ss.active || ss.hopping) continue;
                if (ss.row === qbert.row && ss.col === qbert.col) {
                    ss.active = false;
                    score += 300;
                    floatingTexts.push({ x: ss.screenX, y: ss.screenY - 20, t: '+300', life: 1.0, c: ss.type === 'slick' ? '#33ff33' : '#3399ff' });
                    spawnSparkle(ss.screenX, ss.screenY, ss.type === 'slick' ? '#33ff33' : '#3399ff', 15);
                    sfxCatchSlickSam();
                    haptic(30);
                }
            }

            // Ugg/Wrong-Way collision
            for (let i = 0; i < uggWrong.length; i++) {
                let uw = uggWrong[i];
                if (!uw.active) continue;
                if (uw.row === qbert.row && uw.col === qbert.col) {
                    killQbert();
                    return;
                }
            }
        }

        function killQbert() {
            qbert.dead = true;
            qbert.deathTimer = 1.5;
            speechBubble = { active: true, x: qbert.screenX, y: qbert.screenY - CUBE_QUARTER - 14, timer: 1.5 };
            spawnExplosion(qbert.screenX, qbert.screenY - CUBE_QUARTER, '#ff8c00', 25);
            sfxDie();
            haptic(100);
        }

        // === Game Update ===
        function updateGame(dt) {
            if (roundComplete) {
                roundCompleteTimer -= dt;
                if (roundCompleteTimer <= 0) {
                    level++;
                    let bonus = 1000;
                    // Disc bonus
                    let discBonus = 0;
                    for (let i = 0; i < discs.length; i++) {
                        if (!discs[i].used) discBonus += 50;
                    }
                    score += bonus + discBonus;
                    floatingTexts.push({ x: W / 2, y: H / 2 - 30, t: 'ROUND ' + level + '! +' + bonus, life: 2.0, c: '#ffdd44' });
                    if (discBonus > 0) floatingTexts.push({ x: W / 2, y: H / 2, t: 'DISC BONUS: +' + discBonus, life: 2.0, c: '#44ffff' });
                    sfxLevelUp();
                    buildLevel(level);
                    updateHUD();
                }
                return;
            }

            // Handle Q*bert on disc
            if (qbert.onDisc) {
                qbert.discTimer -= dt;
                // Animate Q*bert moving to top
                let topPos = cubeToScreen(0, 0);
                let t = 1 - (qbert.discTimer / 1.5);
                qbert.screenX = qbert.screenX + (topPos.x - qbert.screenX) * dt * 3;
                qbert.screenY = qbert.screenY + (topPos.y - qbert.screenY) * dt * 3;
                qbert.hopArc = -Math.sin(t * Math.PI) * 80;
                if (qbert.discTimer <= 0) {
                    qbert.onDisc = false;
                    qbert.row = 0;
                    qbert.col = 0;
                    qbert.screenX = topPos.x;
                    qbert.screenY = topPos.y;
                    qbert.hopArc = 0;
                    // Clear all enemies when using disc
                    coily = null;
                    slickSam = [];
                    uggWrong = [];
                    coilySpawnTimer = 3;
                    slickSamSpawnTimer = 6;
                    uggWrongSpawnTimer = 10;
                }
                return;
            }

            if (qbert.dead) {
                qbert.deathTimer -= dt;
                speechBubble.timer -= dt;
                if (speechBubble.timer <= 0) speechBubble.active = false;
                if (qbert.deathTimer <= 0) {
                    lives--;
                    updateHUD();
                    if (lives <= 0) {
                        state = 'OVER';
                        menuBtn.innerText = 'MENU';
                        menuBtn.href = 'index.html';
                        titleTimer = 0;
                        stopMusic();
                        sfxGameOver();
                        gameOverTimeoutId = setTimeout(function() {
                            if (state !== 'OVER') return;
                            if (!aiMode && score > 0 && (highScores.length < 10 || score > highScores[highScores.length - 1].s)) {
                                stopMusic();
                                let n = prompt("LEGENDARY SCORE! Enter Initials:", "ACE");
                                if (n) {
                                    highScores.push({ n: n.substring(0, 3).toUpperCase(), s: score });
                                    highScores.sort(function(a, b) { return b.s - a.s; });
                                    highScores = highScores.slice(0, 10);
                                    localStorage.setItem('qbert_deluxe_scores', JSON.stringify(highScores));
                                }
                            }
                            playMusic('home');
                        }, 1000);
                    } else {
                        // Respawn at top
                        qbert.row = 0;
                        qbert.col = 0;
                        let pos = cubeToScreen(0, 0);
                        qbert.screenX = pos.x;
                        qbert.screenY = pos.y;
                        qbert.dead = false;
                        qbert.hopping = false;
                        qbert.hopArc = 0;
                        qbert.onDisc = false;
                        speechBubble.active = false;
                        // Clear enemies on respawn
                        coily = null;
                        slickSam = [];
                        uggWrong = [];
                        coilySpawnTimer = 2;
                        slickSamSpawnTimer = 6;
                        uggWrongSpawnTimer = 10;
                    }
                }
                return;
            }

            // AI
            if (aiMode) runAI(dt);

            // Process Q*bert movement
            if (!qbert.hopping && moveQueue.length > 0) {
                let dir = moveQueue.shift();
                let off = getDirOffset(dir);
                let newRow = qbert.row + off.dRow;
                let newCol = qbert.col + off.dCol;

                // Check for disc
                if (!isValidCube(newRow, newCol)) {
                    // Check if there's a disc at this position
                    let foundDisc = false;
                    for (let d = 0; d < discs.length; d++) {
                        let disc = discs[d];
                        if (disc.used) continue;
                        if (disc.side === 'left' && dir === 'dl' && qbert.col === 0 && disc.row === qbert.row) {
                            // Board the disc
                            disc.used = true;
                            qbert.onDisc = true;
                            qbert.discTimer = 1.5;
                            sfxDisc();
                            // If Coily was chasing, it falls off
                            if (coily && coily.active && !coily.isBall) {
                                score += 500;
                                floatingTexts.push({ x: coily.screenX, y: coily.screenY - 30, t: '+500', life: 1.0, c: '#ff44ff' });
                                sfxCoilyFall();
                                coily.active = false;
                                coily = null;
                            }
                            foundDisc = true;
                            break;
                        }
                        if (disc.side === 'right' && dir === 'dr' && qbert.col === qbert.row && disc.row === qbert.row) {
                            disc.used = true;
                            qbert.onDisc = true;
                            qbert.discTimer = 1.5;
                            sfxDisc();
                            if (coily && coily.active && !coily.isBall) {
                                score += 500;
                                floatingTexts.push({ x: coily.screenX, y: coily.screenY - 30, t: '+500', life: 1.0, c: '#ff44ff' });
                                sfxCoilyFall();
                                coily.active = false;
                                coily = null;
                            }
                            foundDisc = true;
                            break;
                        }
                        // Also handle up-left from col 0 (row edge disc above)
                        if (disc.side === 'left' && dir === 'ul' && qbert.col === 0 && disc.row === qbert.row) {
                            disc.used = true;
                            qbert.onDisc = true;
                            qbert.discTimer = 1.5;
                            sfxDisc();
                            if (coily && coily.active && !coily.isBall) {
                                score += 500;
                                floatingTexts.push({ x: coily.screenX, y: coily.screenY - 30, t: '+500', life: 1.0, c: '#ff44ff' });
                                sfxCoilyFall();
                                coily.active = false;
                                coily = null;
                            }
                            foundDisc = true;
                            break;
                        }
                        if (disc.side === 'right' && dir === 'ur' && qbert.col === qbert.row && disc.row === qbert.row) {
                            disc.used = true;
                            qbert.onDisc = true;
                            qbert.discTimer = 1.5;
                            sfxDisc();
                            if (coily && coily.active && !coily.isBall) {
                                score += 500;
                                floatingTexts.push({ x: coily.screenX, y: coily.screenY - 30, t: '+500', life: 1.0, c: '#ff44ff' });
                                sfxCoilyFall();
                                coily.active = false;
                                coily = null;
                            }
                            foundDisc = true;
                            break;
                        }
                    }

                    if (!foundDisc) {
                        // Q*bert falls off the pyramid
                        qbert.facing = dir;
                        // Animate falling
                        startHop(qbert, dir, 0.3);
                        sfxFall();
                        // Set dead after a delay
                        fallDeathTimeoutId = setTimeout(function() {
                            fallDeathTimeoutId = null;
                            if (state === 'PLAY' && !qbert.dead && !qbert.onDisc) {
                                killQbert();
                            }
                        }, 300);
                    }
                } else {
                    // Valid hop
                    startHop(qbert, dir, hopDuration);
                    sfxHop();
                    haptic(20);
                }
                // Clear remaining queue to prevent buffered moves
                moveQueue = [];
            }

            // Update Q*bert hop
            if (qbert.hopping) {
                let done = updateHop(qbert, dt);
                if (done && !qbert.dead) {
                    // Landing on a valid cube
                    if (isValidCube(qbert.row, qbert.col)) {
                        let cube = getCube(qbert.row, qbert.col);
                        if (cube) {
                            let oldState = cube.colorState;
                            let targetState = getTargetState();
                            if (levelScheme.cycles === 1) {
                                if (cube.colorState < targetState) {
                                    cube.colorState++;
                                    score += 25;
                                    floatingTexts.push({ x: cube.screenX, y: cube.screenY - 20, t: '+25', life: 0.6, c: '#ffdd00' });
                                    sfxColorChange();
                                }
                            } else if (levelScheme.cycles === 2) {
                                // Cycles: 0 -> 1 -> 0 -> 1...
                                cube.colorState = (cube.colorState + 1) % 2;
                                if (cube.colorState !== oldState) {
                                    score += 25;
                                    floatingTexts.push({ x: cube.screenX, y: cube.screenY - 20, t: '+25', life: 0.6, c: '#ffdd00' });
                                    sfxColorChange();
                                }
                            } else {
                                // 3 cycles: 0 -> 1 -> 2 -> 0 -> 1 -> 2...
                                let prevState = cube.colorState;
                                cube.colorState = (cube.colorState + 1) % 3;
                                // Only award points when moving toward target (0->1 or 1->2), not 2->0
                                if (prevState < 2) {
                                    score += 25;
                                    floatingTexts.push({ x: cube.screenX, y: cube.screenY - 20, t: '+25', life: 0.6, c: '#ffdd00' });
                                }
                                sfxColorChange();
                            }
                        }
                        // Check round complete
                        if (checkRoundComplete()) {
                            roundComplete = true;
                            roundCompleteTimer = 2.0;
                            spawnExplosion(W / 2, H / 2, '#ffdd00', 40);
                            spawnExplosion(W / 2, H / 2, '#ff8c00', 30);
                        }
                    }
                }
            }

            // Enemy spawning
            let speedMult = DIFF_ENEMY_SPEED[difficulty];
            coilySpawnTimer -= dt;
            if (coilySpawnTimer <= 0 && (!coily || !coily.active)) {
                spawnCoily();
                coilySpawnTimer = (8 + Math.random() * 4) * speedMult;
            }

            slickSamSpawnTimer -= dt;
            if (slickSamSpawnTimer <= 0 && level >= 2) {
                spawnSlickSam();
                slickSamSpawnTimer = (10 + Math.random() * 6) * speedMult;
            }

            uggWrongSpawnTimer -= dt;
            if (uggWrongSpawnTimer <= 0 && level >= 3) {
                spawnUggWrong();
                uggWrongSpawnTimer = (12 + Math.random() * 8) * speedMult;
            }

            // Update enemies
            updateCoily(dt);
            updateSlickSam(dt);
            updateUggWrong(dt);

            // Collision detection
            checkCollisions();

            updateHUD();
        }

        // === Main Loop ===
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            let rawDt = (timestamp - lastTime) / 1000;
            lastTime = timestamp;
            let dt = Math.min(rawDt, 0.05);

            ctx.clearRect(0, 0, W, H);
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            if (state === 'START' || state === 'OVER') {
                drawHomeScreen(dt);
                requestAnimationFrame(loop);
                return;
            }

            if (paused) {
                drawStars();
                drawPyramid();
                drawDiscs();
                drawSlickSam();
                drawUggWrong();
                drawCoily();
                drawQbert();
                drawSpeechBubble();
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, W, H);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffaa00';
                ctx.font = 'bold 40px Courier';
                ctx.fillText("PAUSED", W / 2, H / 2 - 10);
                ctx.font = '16px Courier';
                ctx.fillStyle = '#fff';
                ctx.fillText("PRESS P OR CLICK RESUME", W / 2, H / 2 + 25);
                requestAnimationFrame(loop);
                return;
            }

            gameTime += dt;

            // Update
            updateGame(dt);

            // Draw
            drawStars();
            drawPyramid();
            drawDiscs();
            drawSlickSam();
            drawUggWrong();
            drawCoily();
            drawQbert();
            drawSpeechBubble();
            drawFloatingTexts(dt);
            drawParticles(dt);

            // Level/Round info
            ctx.textAlign = 'left';
            ctx.fillStyle = '#ff8c00';
            ctx.font = 'bold 12px Courier';
            ctx.fillText('ROUND ' + level, 10, 20);

            // Show target color swatch
            if (levelScheme) {
                let targetColors = getCubeColors(getTargetState());
                ctx.fillStyle = '#888';
                ctx.font = '10px Courier';
                ctx.fillText('TARGET:', 10, 38);
                ctx.fillStyle = targetColors.top;
                ctx.fillRect(70, 30, 12, 12);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(70, 30, 12, 12);
            }

            // Round complete overlay
            if (roundComplete) {
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fillRect(0, 0, W, H);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffdd00';
                ctx.font = 'bold 36px Courier';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ffdd00';
                ctx.fillText("ROUND COMPLETE!", W / 2, H / 2);
                ctx.shadowBlur = 0;
            }

            // Death overlay
            if (qbert.dead) {
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ff3333';
                ctx.font = 'bold 20px Courier';
                ctx.fillText("!@#$%!", qbert.screenX, qbert.screenY - CUBE_QUARTER - 40);
            }

            requestAnimationFrame(loop);
        }

        // Start
        requestAnimationFrame(loop);
        playMusic('home');
        setTimeout(function() { document.getElementById('transition-overlay').style.opacity = '0'; }, 60);
    })();
    </script>
</body>
</html>
