<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff8c00">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Q*bert Deluxe</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='4' fill='%23111'/%3E%3Crect x='4' y='3' width='24' height='18' rx='2' fill='%23000' stroke='%23ff8c00' stroke-width='1.5'/%3E%3Ccircle cx='16' cy='12' r='5' fill='%23ff8c00'/%3E%3Ccircle cx='14' cy='10' r='1' fill='%23000'/%3E%3Ccircle cx='18' cy='10' r='1' fill='%23000'/%3E%3Crect x='8' y='24' width='4' height='5' rx='1' fill='%23ff4444'/%3E%3Crect x='14' y='24' width='4' height='5' rx='1' fill='%234ae04a'/%3E%3Ccircle cx='27' cy='26' r='2.5' fill='%23ffaa00'/%3E%3C/svg%3E">
    <style>
        body { background: #050505; color: #ff8c00; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; margin: 0; padding: 10px; box-sizing: border-box; overflow: auto; user-select: none; touch-action: manipulation; }
        .stats { margin-bottom: 10px; font-size: 22px; display: flex; gap: 30px; font-weight: bold; text-shadow: 2px 2px #000; flex-wrap: wrap; justify-content: center; }
        #s, #l, #v { color: #fff; }
        #game-wrapper { position: relative; border: 4px solid #333; box-shadow: 0 0 50px rgba(255, 140, 0, 0.15); border-radius: 8px; overflow: hidden; touch-action: none; max-width: 560px; width: 100%; }
        canvas { display: block; background: #000; cursor: default; width: 100%; height: auto; }
        .controls { display: flex; gap: 15px; margin-top: 15px; z-index: 10; flex-wrap: wrap; justify-content: center; }
        button { padding: 12px 25px; font-size: 16px; font-family: inherit; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; transition: 0.2s; text-transform: uppercase; }
        #b { background: linear-gradient(180deg, #ff8c00, #cc7000); color: #000; box-shadow: 0 4px 0 #8a4e00; }
        #ai-btn { background: #222; color: #00ccff; border: 2px solid #00ccff; box-shadow: 0 0 10px rgba(0, 204, 255, 0.3); }
        #pause-btn { background: #222; color: #ffaa00; border: 2px solid #ffaa00; box-shadow: 0 0 10px rgba(255, 170, 0, 0.3); }
        button:active { transform: translateY(3px); box-shadow: none; }
        .ai-active { background: #00ccff !important; color: #000 !important; box-shadow: 0 0 20px #00ccff !important; }
        .pause-active { background: #ffaa00 !important; color: #000 !important; box-shadow: 0 0 20px #ffaa00 !important; }
        .joystick-area { display: none; margin-top: 30px; position: relative; width: 130px; height: 130px; touch-action: none; }
        @media (pointer: coarse) { .joystick-area { display: block; } }
        .joystick-base { position: absolute; top: 0; left: 0; width: 130px; height: 130px; border-radius: 50%; background: rgba(224, 64, 251, 0.08); border: 2px solid rgba(224, 64, 251, 0.25); }
        .joystick-knob { position: absolute; top: 40px; left: 40px; width: 50px; height: 50px; border-radius: 50%; background: radial-gradient(circle at 40% 38%, rgba(224, 64, 251, 0.45), rgba(224, 64, 251, 0.18)); border: 2px solid rgba(224, 64, 251, 0.5); transition: top 0.08s, left 0.08s; pointer-events: none; }
        .joystick-dir { position: absolute; font-size: 14px; color: rgba(224, 64, 251, 0.3); pointer-events: none; font-family: 'Courier New', monospace; font-weight: bold; }
        .joystick-dir.up { top: 4px; left: 50%; transform: translateX(-50%); }
        .joystick-dir.down { bottom: 4px; left: 50%; transform: translateX(-50%); }
        .joystick-dir.left { left: 8px; top: 50%; transform: translateY(-50%); }
        .joystick-dir.right { right: 8px; top: 50%; transform: translateY(-50%); }
        @media (max-width: 580px) { .stats { font-size: 14px; gap: 10px; } .controls { display: flex; gap: 4px; margin-top: 8px; width: 100%; flex-wrap: nowrap; } .controls button, .controls a { padding: 8px 2px !important; font-size: 11px !important; text-align: center; box-sizing: border-box; flex: 1; min-width: 0; } }
        #transition-overlay { position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;opacity:1;pointer-events:none;background:repeating-linear-gradient(0deg,#000 0px,#000 2px,rgba(0,0,0,0.85) 2px,rgba(0,0,0,0.85) 4px);transition:opacity 0.4s; }
    </style>
</head>
<body>
    <div id="transition-overlay"></div>

    <div class="stats">
        <div>SCORE: <span id="s">0</span></div>
        <div>LIVES: <span id="l">3</span></div>
        <div>LVL: <span id="v">1</span></div>
    </div>

    <div id="game-wrapper">
        <canvas id="c" width="560" height="600"></canvas>
    </div>

    <div class="controls">
        <button id="b">START</button>
        <button id="pause-btn">PAUSE</button>
        <button id="ai-btn">AI: OFF</button>
        <button id="mute-btn" style="background:#222;color:#0ff;border:2px solid #0ff;line-height:0;padding:6px;"><svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16,7.5 Q21,12 16,16.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
        <a id="menu-btn" href="index.html" style="padding: 12px 25px; font-size: 16px; font-family: 'Courier New', Courier, monospace; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; text-transform: uppercase; background: #222; color: #fff; border: 2px solid #fff; text-decoration: none; display: inline-block; transition: 0.2s;">MENU</a>
    </div>

    <div class="joystick-area" id="joystick">
        <div class="joystick-base"></div>
        <div class="joystick-knob" id="joystick-knob"></div>
        <div class="joystick-dir up">&#9650;</div>
        <div class="joystick-dir down">&#9660;</div>
        <div class="joystick-dir left">&#9664;</div>
        <div class="joystick-dir right">&#9654;</div>
    </div>

    <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
    <script>
    (function() {
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('b');
        const aiBtn = document.getElementById('ai-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const menuBtn = document.getElementById('menu-btn');
        let muted = localStorage.getItem('arcade_muted') === 'true';
        const _mob = window.innerWidth <= 580;
        const muteBtn = document.getElementById('mute-btn');
        const _spkOn = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><path d="M14,9.5 Q17,12 14,14.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M16,7.5 Q21,12 16,16.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        const _spkOff = '<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor;"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19"/><line x1="15" y1="9" x2="21" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="21" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>';
        muteBtn.innerHTML = muted ? _spkOff : _spkOn;
        muteBtn.onclick = function() { haptic(30); muted = !muted; localStorage.setItem('arcade_muted', muted); muteBtn.innerHTML = muted ? _spkOff : _spkOn; if (muted) stopMusic(); else { currentTrack = null; if (state === 'START' || state === 'OVER') playMusic('home'); else if (state === 'PLAY' && !paused) playMusic('game'); } };
        function haptic(ms) { try { if (navigator.vibrate) navigator.vibrate(ms || 50); } catch(e) {} }

        const W = 560, H = 600;
        canvas.width = W;
        canvas.height = H;

        let state = 'START', aiMode = false, paused = false;
        let score = 0, lives = 3, level = 1, lastTime = performance.now(), gameTime = 0;
        let floatingTexts = [], particles = [];
        let difficulty = 1;
        const DIFF_NAMES = ['E: EASY', 'M: MEDIUM', 'H: HARD'];
        const DIFF_COLORS = ['#4ae04a', '#ffaa00', '#ff3333'];
        let highScores = JSON.parse(localStorage.getItem('qbert_deluxe_scores')) || [{n:'Q*B', s:5000}];
        highScores = highScores.slice(0, 10);

        let titleTimer = 0;
        let gameOverTimeoutId = null;
        let fallDeathTimeoutId = null;

        // === Isometric Cube Constants ===
        const CUBE_SIZE = 42;
        const CUBE_HALF = CUBE_SIZE / 2;
        const CUBE_QUARTER = CUBE_SIZE / 4;
        const PYRAMID_ROWS = 7;
        const PYRAMID_TOP_X = W / 2;
        const PYRAMID_TOP_Y = 100;

        // Difficulty settings
        const DIFF_LIVES = [4, 3, 2];
        const DIFF_ENEMY_SPEED = [1.8, 1.3, 0.9];
        const DIFF_COILY_SMART = [0.3, 0.6, 0.9];

        // === Level Color Schemes ===
        const LEVEL_COLORS = [
            { start: '#888888', target: '#ffdd00', left: '#666600', right: '#998800', startLeft: '#555555', startRight: '#777777', cycles: 1 },
            { start: '#888888', target: '#4488ff', left: '#223388', right: '#3366cc', startLeft: '#555555', startRight: '#777777', cycles: 1 },
            { start: '#888888', target: '#ff4444', left: '#882222', right: '#cc3333', startLeft: '#555555', startRight: '#777777', cycles: 1 },
            { start: '#ffdd00', target: '#44ff44', left: '#228822', right: '#33cc33', startLeft: '#666600', startRight: '#998800', cycles: 2 },
            { start: '#4488ff', target: '#ff44ff', left: '#882288', right: '#cc33cc', startLeft: '#223388', startRight: '#3366cc', cycles: 2 },
            { start: '#ff4444', target: '#44ffff', left: '#228888', right: '#33cccc', startLeft: '#882222', startRight: '#cc3333', cycles: 2 },
            { start: '#888888', target: '#ffdd00', mid: '#ff4444', left: '#882222', right: '#cc3333', startLeft: '#555555', startRight: '#777777', midLeft: '#882222', midRight: '#cc3333', cycles: 3 },
            { start: '#888888', target: '#44ff44', mid: '#4488ff', left: '#223388', right: '#3366cc', startLeft: '#555555', startRight: '#777777', midLeft: '#223388', midRight: '#3366cc', cycles: 3 },
        ];

        // === Game Objects ===
        let cubes = [];      // {row, col, colorState, screenX, screenY}
        let qbert = { row: 0, col: 0, screenX: 0, screenY: 0, hopping: false, hopTimer: 0, hopFrom: null, hopTo: null, dead: false, deathTimer: 0, facing: 'dr', onDisc: false, discTimer: 0 };
        let coily = null;    // {row, col, screenX, screenY, hopping, hopTimer, hopFrom, hopTo, isBall, active}
        let slickSam = [];   // {row, col, screenX, screenY, hopping, hopTimer, hopFrom, hopTo, type, active}
        let uggWrong = [];   // {row, col, screenX, screenY, hopping, hopTimer, hopFrom, hopTo, type, active, side}
        let discs = [];       // {row, side, used, screenX, screenY, spinning, spinTimer}
        let speechBubble = { active: false, x: 0, y: 0, timer: 0 };

        let enemySpawnTimer = 0;
        let coilySpawnTimer = 0;
        let slickSamSpawnTimer = 0;
        let uggWrongSpawnTimer = 0;
        let roundComplete = false;
        let roundCompleteTimer = 0;
        let levelScheme = null;
        let hopDuration = 0.22;
        let stars = [];

        // Generate starfield
        for (let i = 0; i < 80; i++) {
            stars.push({ x: Math.random() * W, y: Math.random() * H, size: Math.random() * 2 + 0.5, twinkle: Math.random() * Math.PI * 2 });
        }

        // === Isometric Coordinate System ===
        function cubeToScreen(row, col) {
            let x = PYRAMID_TOP_X + (col - row / 2) * CUBE_SIZE;
            let y = PYRAMID_TOP_Y + row * (CUBE_SIZE * 0.75);
            return { x: x, y: y };
        }

        function drawIsoCube(x, y, topColor, leftColor, rightColor) {
            let hs = CUBE_HALF;
            let qs = CUBE_QUARTER;

            // Top face (diamond)
            ctx.beginPath();
            ctx.moveTo(x, y - qs);
            ctx.lineTo(x + hs, y);
            ctx.lineTo(x, y + qs);
            ctx.lineTo(x - hs, y);
            ctx.closePath();
            ctx.fillStyle = topColor;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Left face
            ctx.beginPath();
            ctx.moveTo(x - hs, y);
            ctx.lineTo(x, y + qs);
            ctx.lineTo(x, y + qs + hs);
            ctx.lineTo(x - hs, y + hs);
            ctx.closePath();
            ctx.fillStyle = leftColor;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.stroke();

            // Right face
            ctx.beginPath();
            ctx.moveTo(x + hs, y);
            ctx.lineTo(x, y + qs);
            ctx.lineTo(x, y + qs + hs);
            ctx.lineTo(x + hs, y + hs);
            ctx.closePath();
            ctx.fillStyle = rightColor;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0,0,0,0.3)';
            ctx.stroke();
        }

        function getCubeColors(colorState) {
            let scheme = levelScheme;
            if (!scheme) return { top: '#888', left: '#555', right: '#777' };
            if (scheme.cycles === 1) {
                if (colorState === 0) return { top: scheme.start, left: scheme.startLeft, right: scheme.startRight };
                return { top: scheme.target, left: scheme.left, right: scheme.right };
            } else if (scheme.cycles === 2) {
                if (colorState === 0) return { top: scheme.start, left: scheme.startLeft, right: scheme.startRight };
                if (colorState === 1) return { top: scheme.target, left: scheme.left, right: scheme.right };
                return { top: scheme.start, left: scheme.startLeft, right: scheme.startRight };
            } else {
                if (colorState === 0) return { top: scheme.start, left: scheme.startLeft, right: scheme.startRight };
                if (colorState === 1) return { top: scheme.mid || scheme.start, left: scheme.midLeft || scheme.startLeft, right: scheme.midRight || scheme.startRight };
                if (colorState === 2) return { top: scheme.target, left: scheme.left, right: scheme.right };
                return { top: scheme.start, left: scheme.startLeft, right: scheme.startRight };
            }
        }

        function getTargetState() {
            if (!levelScheme) return 1;
            if (levelScheme.cycles === 1) return 1;
            if (levelScheme.cycles === 2) return 1;
            return 2;
        }

        function isValidCube(row, col) {
            return row >= 0 && row < PYRAMID_ROWS && col >= 0 && col <= row;
        }

        function getCube(row, col) {
            for (let i = 0; i < cubes.length; i++) {
                if (cubes[i].row === row && cubes[i].col === col) return cubes[i];
            }
            return null;
        }

        // === Build Level ===
        function buildLevel(lvl) {
            cubes = [];
            coily = null;
            slickSam = [];
            uggWrong = [];
            discs = [];
            speechBubble = { active: false, x: 0, y: 0, timer: 0 };
            roundComplete = false;
            roundCompleteTimer = 0;
            enemySpawnTimer = 0;
            coilySpawnTimer = 2.5;
            slickSamSpawnTimer = 8;
            uggWrongSpawnTimer = 12;

            levelScheme = LEVEL_COLORS[(lvl - 1) % LEVEL_COLORS.length];

            for (let row = 0; row < PYRAMID_ROWS; row++) {
                for (let col = 0; col <= row; col++) {
                    let pos = cubeToScreen(row, col);
                    cubes.push({ row: row, col: col, colorState: 0, screenX: pos.x, screenY: pos.y });
                }
            }

            // Place discs on sides of pyramid
            let discRows = [1, 3, 5];
            if (lvl >= 3) discRows = [1, 2, 4, 5];
            for (let i = 0; i < discRows.length; i++) {
                let r = discRows[i];
                if (r < PYRAMID_ROWS) {
                    let leftPos = cubeToScreen(r, -1);
                    discs.push({ row: r, side: 'left', used: false, screenX: leftPos.x - CUBE_SIZE * 0.3, screenY: leftPos.y - CUBE_QUARTER, spinning: false, spinTimer: 0 });
                    if (i % 2 === 0) {
                        let rightPos = cubeToScreen(r, r + 1);
                        discs.push({ row: r, side: 'right', used: false, screenX: rightPos.x + CUBE_SIZE * 0.3, screenY: rightPos.y - CUBE_QUARTER, spinning: false, spinTimer: 0 });
                    }
                }
            }

            // Position Q*bert at top
            qbert.row = 0;
            qbert.col = 0;
            let startPos = cubeToScreen(0, 0);
            qbert.screenX = startPos.x;
            qbert.screenY = startPos.y;
            qbert.hopping = false;
            qbert.hopTimer = 0;
            qbert.dead = false;
            qbert.deathTimer = 0;
            qbert.facing = 'dr';
            qbert.onDisc = false;
            qbert.discTimer = 0;
        }

        function checkRoundComplete() {
            let target = getTargetState();
            for (let i = 0; i < cubes.length; i++) {
                if (cubes[i].colorState !== target) return false;
            }
            return true;
        }

        // === Particles ===
        function spawnExplosion(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 120 + 30;
                particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 0.5 + Math.random() * 0.5, color: color, size: Math.random() * 3 + 1 });
            }
        }

        function spawnSparkle(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 60 + 20;
                particles.push({ x: x, y: y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 0.3 + Math.random() * 0.4, color: color, size: Math.random() * 2 + 1 });
            }
        }

        // === Sound Engine ===
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        function ensureAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

        function playTone(freq, duration, type, vol) {
            if (muted) return;
            if (typeof type === 'undefined') type = 'square';
            if (typeof vol === 'undefined') vol = 0.12;
            ensureAudio();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
            osc.onended = function() { osc.disconnect(); gain.disconnect(); };
        }

        function sfxHop() {
            playTone(440, 0.06, 'square', 0.07);
            setTimeout(function() { playTone(550, 0.06, 'square', 0.06); }, 40);
        }
        function sfxColorChange() {
            playTone(523, 0.05, 'triangle', 0.08);
            setTimeout(function() { playTone(659, 0.05, 'triangle', 0.07); }, 30);
        }
        function sfxFall() {
            [400, 350, 300, 250, 200, 150].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.12, 'triangle', 0.08); }, i * 50);
            });
        }
        function sfxCatchSlickSam() {
            [494, 587, 740, 988].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.08, 'triangle', 0.08); }, i * 40);
            });
        }
        function sfxCoilyFall() {
            playTone(800, 0.1, 'sawtooth', 0.1);
            setTimeout(function() { playTone(400, 0.15, 'sawtooth', 0.08); }, 60);
            setTimeout(function() { playTone(200, 0.2, 'sawtooth', 0.06); }, 130);
        }
        function sfxDie() {
            playTone(110, 0.3, 'triangle', 0.12);
            [350, 262, 196, 147].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.2, 'triangle', 0.1); }, i * 75);
            });
        }
        function sfxGameOver() {
            [392, 370, 349, 330, 294, 262, 220, 196].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.25, 'triangle', 0.1); }, i * 120);
            });
            setTimeout(function() { playTone(110, 0.5, 'triangle', 0.07); }, 1000);
        }
        function sfxLevelUp() {
            [262, 330, 392, 523, 659, 784, 1047].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.15, 'triangle', 0.1); }, i * 80);
            });
        }
        function sfxDisc() {
            [330, 440, 550, 660, 770, 880].forEach(function(f, i) {
                setTimeout(function() { playTone(f, 0.1, 'triangle', 0.07); }, i * 60);
            });
        }
        function sfxCoilyBounce() {
            playTone(150, 0.08, 'square', 0.06);
        }

        // === Music Engine ===
        let musicInterval = null;
        let currentTrack = null;

        function stopMusic() {
            if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
            currentTrack = null;
        }

        function playMusic(track) {
            if (currentTrack === track) return;
            stopMusic();
            currentTrack = track;
            if (muted) return;
            ensureAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();

            let homeMelody = [
                392, 0, 440, 494, 0, 523, 587, 0,
                523, 494, 0, 440, 392, 0, 349, 330,
                0, 349, 392, 0, 440, 494, 523, 0,
                587, 0, 523, 494, 440, 0, 392, 0,
                330, 349, 392, 0, 440, 0, 494, 523,
                0, 587, 659, 0, 587, 523, 494, 0,
                440, 392, 0, 349, 330, 0, 294, 330,
                349, 0, 392, 0, 440, 0, 0, 0
            ];
            let homeBass = [
                131, 0, 147, 0, 165, 0, 175, 0,
                165, 0, 147, 0, 131, 0, 117, 110,
                0, 117, 131, 0, 147, 165, 175, 0,
                196, 0, 175, 165, 147, 0, 131, 0,
                110, 117, 131, 0, 147, 0, 165, 175,
                0, 196, 220, 0, 196, 175, 165, 0,
                147, 131, 0, 117, 110, 0, 98, 110,
                117, 0, 131, 0, 147, 0, 0, 0
            ];
            let gameMelody = [
                523, 0, 587, 659, 0, 698, 784, 0,
                698, 659, 587, 0, 523, 494, 0, 523,
                587, 0, 659, 698, 0, 784, 880, 0,
                784, 698, 0, 659, 587, 0, 523, 0,
                440, 494, 523, 0, 587, 659, 0, 698,

            let right = keys['ArrowRight'];
            // Map arrow keys to Q*bert diagonals
            // Up+Left or just Up = up-left on pyramid
            // Up+Right or just Right = up-right
            // Down+Left or just Left = down-left
            // Down+Right or just Down = down-right
            if (up && left) return 'ul';
            if (up && right) return 'ur';
            if (down && left) return 'dl';
            if (down && right) return 'dr';

        // Virtual joystick
        (function() {
            var joystick = document.getElementById('joystick');
            var knob = document.getElementById('joystick-knob');
            if (!joystick || !knob) return;
            var BASE_R = 65, KNOB_R = 25, DEAD_ZONE = 12;
            var active = false, lastDir = null;

            function getCenter() {
                var r = joystick.getBoundingClientRect();
                return { x: r.left + BASE_R, y: r.top + BASE_R };
            }

            function updateKnob(tx, ty) {
                var c = getCenter();
                var dx = tx - c.x, dy = ty - c.y;
                var dist = Math.sqrt(dx * dx + dy * dy);
                var maxDist = BASE_R - KNOB_R * 0.5;
                if (dist > maxDist) { dx = dx / dist * maxDist; dy = dy / dist * maxDist; }
                knob.style.left = (BASE_R + dx - KNOB_R) + 'px';
                knob.style.top = (BASE_R + dy - KNOB_R) + 'px';
                return { dx: dx, dy: dy, dist: Math.sqrt(dx * dx + dy * dy) };
            }

            function resetKnob() {
                knob.style.left = (BASE_R - KNOB_R) + 'px';
                knob.style.top = (BASE_R - KNOB_R) + 'px';
                knob.style.transition = 'top 0.15s, left 0.15s';
            }

            function canMove() {
                return state === 'PLAY' && !paused && !qbert.dead && !qbert.hopping && !qbert.onDisc && !roundComplete;
            }

            function setDir(dx, dy) {
                // Q*bert uses diagonal directions: ul, ur, dl, dr
                var dir;
                if (dx <= 0 && dy <= 0) dir = 'ul';
                else if (dx > 0 && dy <= 0) dir = 'ur';
                else if (dx <= 0 && dy > 0) dir = 'dl';
                else dir = 'dr';
                if (dir === lastDir) return;
                lastDir = dir;
                haptic(30);
                if (canMove()) moveQueue.push(dir);
            }

            joystick.addEventListener('touchstart', function(e) {
                e.preventDefault(); active = true;
                knob.style.transition = 'none';
                var t = e.touches[0];
                var v = updateKnob(t.clientX, t.clientY);
                if (v.dist > DEAD_ZONE) setDir(v.dx, v.dy);
            }, { passive: false });

            joystick.addEventListener('touchmove', function(e) {
                if (!active) return; e.preventDefault();
                var t = e.touches[0];
                var v = updateKnob(t.clientX, t.clientY);
                if (v.dist > DEAD_ZONE) setDir(v.dx, v.dy);
            }, { passive: false });

            function onEnd(e) {
                if (!active) return; e.preventDefault();
                active = false; lastDir = null; resetKnob();
            }
            joystick.addEventListener('touchend', onEnd, { passive: false });
            joystick.addEventListener('touchcancel', onEnd, { passive: false });

        // === Hop Mechanics ===
        function getDirOffset(dir) {
            // Returns {dRow, dCol} for each diagonal direction
            if (dir === 'ul') return { dRow: -1, dCol: -1 };
            if (dir === 'ur') return { dRow: -1, dCol: 0 };
            if (dir === 'dl') return { dRow: 1, dCol: 0 };
            if (dir === 'dr') return { dRow: 1, dCol: 1 };
            return { dRow: 0, dCol: 0 };
        }

        function startHop(entity, dir, duration) {
            let off = getDirOffset(dir);
            let newRow = entity.row + off.dRow;
            let newCol = entity.col + off.dCol;
            let fromPos = cubeToScreen(entity.row, entity.col);
            entity.hopFrom = { x: fromPos.x, y: fromPos.y, row: entity.row, col: entity.col };
            entity.hopping = true;
            entity.hopTimer = 0;
            entity.hopDuration = duration || hopDuration;
            entity.row = newRow;
            entity.col = newCol;
            let toPos = cubeToScreen(newRow, newCol);
            entity.hopTo = { x: toPos.x, y: toPos.y };
            entity.facing = dir;
        }

        function updateHop(entity, dt) {
            if (!entity.hopping) return false;
            entity.hopTimer += dt;
            let t = Math.min(entity.hopTimer / entity.hopDuration, 1);
            // Smooth hop with arc
            let easeT = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
            entity.screenX = entity.hopFrom.x + (entity.hopTo.x - entity.hopFrom.x) * easeT;
            entity.screenY = entity.hopFrom.y + (entity.hopTo.y - entity.hopFrom.y) * easeT;
            // Arc height
            entity.hopArc = -Math.sin(t * Math.PI) * 25;
            if (t >= 1) {
                entity.hopping = false;
                entity.hopArc = 0;
                entity.screenX = entity.hopTo.x;
                entity.screenY = entity.hopTo.y;
                return true; // hop completed
            }
            return false;
        }

        // === Enemy Logic ===
        function spawnCoily() {
            if (coily && coily.active) return;
            // Start as a ball at top
            let startCol = 0; // always col 0 of row 0
            let pos = cubeToScreen(0, 0);
            coily = { row: 0, col: 0, screenX: pos.x, screenY: pos.y, hopping: false, hopTimer: 0, hopFrom: null, hopTo: null, hopDuration: 0.35, hopArc: 0, isBall: true, active: true, facing: 'dr', waitTimer: 0.5 / DIFF_ENEMY_SPEED[difficulty] };
        }

        function updateCoily(dt) {
            if (!coily || !coily.active) return;

            if (coily.waitTimer > 0) {
                coily.waitTimer -= dt;
                return;
            }

            if (coily.hopping) {
                let done = updateHop(coily, dt);
                if (done) {
                    coily.waitTimer = (coily.isBall ? 0.4 : 0.35) / DIFF_ENEMY_SPEED[difficulty];
                    // Ball reached bottom? Transform into snake
                    if (coily.isBall && coily.row >= PYRAMID_ROWS - 1) {
                        coily.isBall = false;
                        coily.waitTimer = 0.6 / DIFF_ENEMY_SPEED[difficulty];
                    }
                }
                return;
            }

            if (coily.isBall) {
                // Ball bounces down randomly
                let dir = Math.random() < 0.5 ? 'dl' : 'dr';
                let off = getDirOffset(dir);
                let newRow = coily.row + off.dRow;
                let newCol = coily.col + off.dCol;
                if (isValidCube(newRow, newCol)) {
                    startHop(coily, dir, 0.35);
                    sfxCoilyBounce();
                }
            } else {
                // Snake chases Q*bert intelligently
                let bestDir = null;
                let bestDist = 9999;
                let dirs = ['ul', 'ur', 'dl', 'dr'];
                for (let i = 0; i < dirs.length; i++) {
                    let off = getDirOffset(dirs[i]);
                    let nr = coily.row + off.dRow;
                    let nc = coily.col + off.dCol;
                    if (isValidCube(nr, nc)) {
                        let dist = Math.abs(nr - qbert.row) + Math.abs(nc - qbert.col);
                        // Smart chasing based on difficulty
                        if (Math.random() < DIFF_COILY_SMART[difficulty]) {
                            if (dist < bestDist) { bestDist = dist; bestDir = dirs[i]; }
                        } else {
                            if (!bestDir) bestDir = dirs[i];
                        }
                    }
                }
                if (bestDir) {
                    startHop(coily, bestDir, 0.3);
                    sfxCoilyBounce();
                }
            }
        }

        function spawnSlickSam() {
            if (slickSam.length >= 2) return;
            let type = Math.random() < 0.5 ? 'slick' : 'sam';
            let startRow = 1;
            let startCol = Math.random() < 0.5 ? 0 : 1;
            let pos = cubeToScreen(startRow, startCol);
            slickSam.push({ row: startRow, col: startCol, screenX: pos.x, screenY: pos.y, hopping: false, hopTimer: 0, hopFrom: null, hopTo: null, hopDuration: 0.4, hopArc: 0, type: type, active: true, facing: 'dr', waitTimer: 0.5 / DIFF_ENEMY_SPEED[difficulty] });
        }

        function updateSlickSam(dt) {
            for (let i = slickSam.length - 1; i >= 0; i--) {
                let ss = slickSam[i];
                if (!ss.active) { slickSam.splice(i, 1); continue; }

                if (ss.waitTimer > 0) {
                    ss.waitTimer -= dt;
                    continue;
                }

                if (ss.hopping) {
                    let done = updateHop(ss, dt);
                    if (done) {
                        // Revert cube color when landing
                        let cube = getCube(ss.row, ss.col);
                        if (cube && cube.colorState > 0) {
                            cube.colorState = 0;
                        }
                        ss.waitTimer = 0.5 / DIFF_ENEMY_SPEED[difficulty];
                        // Remove if off pyramid
                        if (ss.row >= PYRAMID_ROWS) {
                            slickSam.splice(i, 1);
                            continue;
                        }
                    }
                    continue;
                }

                // Move down randomly
                let dir = Math.random() < 0.5 ? 'dl' : 'dr';
                let off = getDirOffset(dir);
                let newRow = ss.row + off.dRow;
                let newCol = ss.col + off.dCol;
                if (isValidCube(newRow, newCol)) {
                    startHop(ss, dir, 0.4);
                } else {
                    // Try other direction
                    dir = dir === 'dl' ? 'dr' : 'dl';
                    off = getDirOffset(dir);
                    newRow = ss.row + off.dRow;
                    newCol = ss.col + off.dCol;
                    if (isValidCube(newRow, newCol)) {
                        startHop(ss, dir, 0.4);
                    } else {
                        ss.active = false;
                    }
                }
            }
        }

        function spawnUggWrong() {
            if (uggWrong.length >= 2) return;
            let type = Math.random() < 0.5 ? 'ugg' : 'wrongway';
            let bottomRow = PYRAMID_ROWS - 1;
            let side, startRow, startCol;
            if (type === 'ugg') {
                // Ugg comes from right side, moves left
                side = 'right';
                startRow = bottomRow;
                startCol = bottomRow;
            } else {
                // Wrong-Way comes from left side, moves right
                side = 'left';
                startRow = bottomRow;
                startCol = 0;
            }
            let pos = cubeToScreen(startRow, startCol);
            uggWrong.push({ row: startRow, col: startCol, screenX: pos.x, screenY: pos.y, hopping: false, hopTimer: 0, hopFrom: null, hopTo: null, hopDuration: 0.5, hopArc: 0, type: type, active: true, side: side, facing: type === 'ugg' ? 'ul' : 'ur', waitTimer: 1.0 / DIFF_ENEMY_SPEED[difficulty] });
        }

        function updateUggWrong(dt) {
            for (let i = uggWrong.length - 1; i >= 0; i--) {
                let uw = uggWrong[i];
                if (!uw.active) { uggWrong.splice(i, 1); continue; }

                if (uw.waitTimer > 0) {
                    uw.waitTimer -= dt;
                    continue;
                }

                if (uw.hopping) {
                    let done = updateHop(uw, dt);
                    if (done) {
                        uw.waitTimer = 0.6 / DIFF_ENEMY_SPEED[difficulty];
                        if (!isValidCube(uw.row, uw.col)) {
                            uggWrong.splice(i, 1);
                            continue;
                        }
                    }
                    continue;
                }

                // Ugg stays on right edge (col === row), Wrong-Way stays on left edge (col === 0)
                // They only move up along their respective edge
                let dir;
                if (uw.type === 'ugg') {
                    // Right edge: move up-left to stay on edge (row-1, col-1 keeps col===row)
                    dir = 'ul';
                } else {
                    // Left edge: move up-right to stay on edge (row-1, col stays 0)
                    dir = 'ur';
                }
                let off = getDirOffset(dir);
                let nr = uw.row + off.dRow;
                let nc = uw.col + off.dCol;
                if (isValidCube(nr, nc)) {
                    startHop(uw, dir, 0.5);
                } else {
                    uw.active = false;
                }
            }
        }

        // === AI Mode ===
        function runAI(dt) {
            if (qbert.dead || qbert.hopping || qbert.onDisc || roundComplete) return;

            // Find nearest uncolored cube
            let target = getTargetState();
            let bestCube = null;
            let bestDist = 9999;
            let bestDir = null;

            // Check all 4 directions
            let dirs = ['ul', 'ur', 'dl', 'dr'];

            // Check for immediate danger
            let dangerDirs = {};
            if (coily && coily.active && !coily.isBall) {
                for (let i = 0; i < dirs.length; i++) {
                    let off = getDirOffset(dirs[i]);
                    let nr = qbert.row + off.dRow;
                    let nc = qbert.col + off.dCol;
                    if (nr === coily.row && nc === coily.col) dangerDirs[dirs[i]] = true;
                    // Also avoid cubes adjacent to Coily
                    if (isValidCube(nr, nc)) {
                        let cDist = Math.abs(nr - coily.row) + Math.abs(nc - coily.col);
                        if (cDist <= 1) dangerDirs[dirs[i]] = true;
                    }
                }
            }
            for (let u = 0; u < uggWrong.length; u++) {
                let uw = uggWrong[u];
                if (!uw.active) continue;
                for (let i = 0; i < dirs.length; i++) {
                    let off = getDirOffset(dirs[i]);
                    let nr = qbert.row + off.dRow;
                    let nc = qbert.col + off.dCol;
                    if (nr === uw.row && nc === uw.col) dangerDirs[dirs[i]] = true;
                }
            }

            // Check for Slick/Sam to catch
            for (let s = 0; s < slickSam.length; s++) {
                let ss = slickSam[s];
                if (!ss.active) continue;
                for (let i = 0; i < dirs.length; i++) {
                    let off = getDirOffset(dirs[i]);
                    let nr = qbert.row + off.dRow;
                    let nc = qbert.col + off.dCol;
                    if (nr === ss.row && nc === ss.col && !dangerDirs[dirs[i]]) {
                        moveQueue.push(dirs[i]);
                        return;
                    }
                }
            }

            // Try to lure Coily off edge if Coily is close and we're near an edge with a disc
            if (coily && coily.active && !coily.isBall) {
                let cDist = Math.abs(qbert.row - coily.row) + Math.abs(qbert.col - coily.col);
                if (cDist <= 2) {
                    // Check if we can use a disc
                    for (let d = 0; d < discs.length; d++) {
                        let disc = discs[d];
                        if (disc.used) continue;
                        if (disc.row !== qbert.row) continue;
                        // Can we reach the disc?
                        if (disc.side === 'left' && qbert.col === 0) {
                            moveQueue.push('dl');
                            return;
                        }
                        if (disc.side === 'right' && qbert.col === qbert.row) {
                            moveQueue.push('dr');
                            return;
                        }
                    }
                }
            }

            // Find best move toward an uncolored cube
            for (let i = 0; i < dirs.length; i++) {
                if (dangerDirs[dirs[i]]) continue;
                let off = getDirOffset(dirs[i]);
                let nr = qbert.row + off.dRow;
                let nc = qbert.col + off.dCol;
                if (!isValidCube(nr, nc)) continue;
                let cube = getCube(nr, nc);
                if (cube && cube.colorState !== target) {
                    // Direct hop to uncolored - high priority
                    moveQueue.push(dirs[i]);
                    return;
                }
            }

            // No adjacent uncolored - find path to nearest uncolored
            let safeDirs = [];
            for (let i = 0; i < dirs.length; i++) {
                if (dangerDirs[dirs[i]]) continue;
                let off = getDirOffset(dirs[i]);
                let nr = qbert.row + off.dRow;
                let nc = qbert.col + off.dCol;
                if (isValidCube(nr, nc)) {
                    // Find distance to nearest uncolored from this position
                    let minUncoloredDist = 9999;
                    for (let c = 0; c < cubes.length; c++) {
                        if (cubes[c].colorState !== target) {
                            let d = Math.abs(nr - cubes[c].row) + Math.abs(nc - cubes[c].col);
                            if (d < minUncoloredDist) minUncoloredDist = d;
                        }
                    }
                    safeDirs.push({ dir: dirs[i], dist: minUncoloredDist });
                }
            }

            if (safeDirs.length > 0) {
                safeDirs.sort(function(a, b) { return a.dist - b.dist; });
                moveQueue.push(safeDirs[0].dir);
            } else if (dirs.length > 0) {
                // Desperate - try any valid direction
                for (let i = 0; i < dirs.length; i++) {
                    let off = getDirOffset(dirs[i]);
                    let nr = qbert.row + off.dRow;
                    let nc = qbert.col + off.dCol;
                    if (isValidCube(nr, nc)) {
                        moveQueue.push(dirs[i]);
                        return;
                    }
                }
            }
        }

        // === Drawing ===
        function drawStars() {
            for (let i = 0; i < stars.length; i++) {
                let s = stars[i];
                let alpha = 0.3 + 0.7 * Math.abs(Math.sin(gameTime * 2 + s.twinkle));
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#fff';
                ctx.fillRect(s.x, s.y, s.size, s.size);
            }
            ctx.globalAlpha = 1;
        }

        function drawPyramid() {
            for (let i = 0; i < cubes.length; i++) {
                let c = cubes[i];
                let colors = getCubeColors(c.colorState);
                // Flash effect when round is completing
                if (roundComplete) {
                    let flash = Math.floor(gameTime * 8) % 2;
                    if (flash) {
                        colors = { top: '#fff', left: '#ccc', right: '#ddd' };
                    }
                }
                drawIsoCube(c.screenX, c.screenY, colors.top, colors.left, colors.right);
            }
        }

        function drawDiscs() {
            for (let i = 0; i < discs.length; i++) {
                let d = discs[i];
                if (d.used) continue;
                let x = d.screenX;
                let y = d.screenY;
                let spin = gameTime * 5;
                // Spinning disc
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(spin);
                let discColors = ['#ff4444', '#44ff44', '#4444ff', '#ffff44', '#ff44ff'];
                for (let s = 0; s < 5; s++) {
                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.arc(0, 0, 12, s * Math.PI * 2 / 5, (s + 1) * Math.PI * 2 / 5);
                    ctx.closePath();
                    ctx.fillStyle = discColors[s];
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function drawQbert() {
            if (qbert.dead && qbert.deathTimer <= 0) return;
            let x = qbert.screenX;
            let y = qbert.screenY + (qbert.hopArc || 0);

            if (qbert.dead) {
                let flash = Math.floor(qbert.deathTimer * 10) % 2 === 0;
                if (!flash) return;
                ctx.globalAlpha = qbert.deathTimer / 1.5;
            }

            // Position above cube top
            let drawY = y - CUBE_QUARTER - 14;
            let drawX = x;

            // Body - orange circle
            ctx.fillStyle = '#ff8c00';
            ctx.beginPath();
            ctx.arc(drawX, drawY, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#cc7000';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Feet
            let feetSpread = 6;
            ctx.fillStyle = '#ff8c00';
            ctx.beginPath();
            ctx.arc(drawX - feetSpread, drawY + 12, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(drawX + feetSpread, drawY + 12, 4, 0, Math.PI * 2);
            ctx.fill();

            // Eyes (big, expressive)
            let eyeOffX = 0;
            if (qbert.facing === 'ul' || qbert.facing === 'dl') eyeOffX = -2;
            if (qbert.facing === 'ur' || qbert.facing === 'dr') eyeOffX = 2;
            // White of eyes
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(drawX - 4 + eyeOffX, drawY - 3, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(drawX + 4 + eyeOffX, drawY - 3, 4, 0, Math.PI * 2);
            ctx.fill();
            // Pupils
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(drawX - 3 + eyeOffX, drawY - 3, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(drawX + 5 + eyeOffX, drawY - 3, 2, 0, Math.PI * 2);
            ctx.fill();

            // Snout/nose - tubular, points in facing direction
            let snoutDX = 0, snoutDY = 0;
            if (qbert.facing === 'ul') { snoutDX = -10; snoutDY = -4; }
            else if (qbert.facing === 'ur') { snoutDX = 10; snoutDY = -4; }
            else if (qbert.facing === 'dl') { snoutDX = -10; snoutDY = 4; }
            else { snoutDX = 10; snoutDY = 4; }
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.moveTo(drawX + snoutDX * 0.3, drawY + snoutDY * 0.3 + 2);
            ctx.lineTo(drawX + snoutDX, drawY + snoutDY + 2);
            ctx.lineTo(drawX + snoutDX * 0.3, drawY + snoutDY * 0.3 + 6);
            ctx.closePath();
            ctx.fill();
            // Snout tip
            ctx.fillStyle = '#ff4400';
            ctx.beginPath();
            ctx.arc(drawX + snoutDX, drawY + snoutDY + 4, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.globalAlpha = 1;
        }

        function drawSpeechBubble() {
            if (!speechBubble.active) return;
            let x = speechBubble.x;
            let y = speechBubble.y;
            // Bubble
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.ellipse(x, y - 30, 40, 14, 0, 0, Math.PI * 2);
            ctx.fill();
            // Pointer
            ctx.beginPath();
            ctx.moveTo(x - 5, y - 17);
            ctx.lineTo(x + 2, y - 8);
            ctx.lineTo(x + 5, y - 17);
            ctx.closePath();
            ctx.fill();
            // Text
            ctx.fillStyle = '#000';
            ctx.font = 'bold 11px Courier';
            ctx.textAlign = 'center';
            ctx.fillText('!@#$%!', x, y - 26);
        }

        function drawCoily() {
            if (!coily || !coily.active) return;
            let x = coily.screenX;
            let y = coily.screenY + (coily.hopArc || 0);
            let drawY = y - CUBE_QUARTER - 10;
            let drawX = x;

            if (coily.isBall) {
                // Purple ball
                ctx.fillStyle = '#9933ff';
                ctx.beginPath();
                ctx.arc(drawX, drawY, 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#6622cc';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                // Eyes
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(drawX - 3, drawY - 2, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(drawX + 3, drawY - 2, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(drawX - 2, drawY - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(drawX + 4, drawY - 2, 1.5, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Coily snake form
                // Coiled body
                let bodyY = drawY + 4;
                ctx.fillStyle = '#cc33ff';
                // Coil segments
                for (let s = 0; s < 3; s++) {
                    ctx.beginPath();
                    ctx.ellipse(drawX, bodyY + s * 4, 8 - s, 3, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                // Head
                ctx.fillStyle = '#dd44ff';
                ctx.beginPath();
                ctx.arc(drawX, drawY - 4, 8, 0, Math.PI * 2);
                ctx.fill();
                // Eyes (menacing)
                ctx.fillStyle = '#ff0';
                ctx.beginPath();
                ctx.arc(drawX - 3, drawY - 5, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(drawX + 3, drawY - 5, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#f00';
                ctx.beginPath();
                ctx.arc(drawX - 3, drawY - 5, 1.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(drawX + 3, drawY - 5, 1.5, 0, Math.PI * 2);
                ctx.fill();
                // Tongue
                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(drawX, drawY);
                ctx.lineTo(drawX + Math.sin(gameTime * 12) * 4, drawY + 5);
                ctx.stroke();
            }
        }

        function drawSlickSam() {
            for (let i = 0; i < slickSam.length; i++) {
                let ss = slickSam[i];
                if (!ss.active) continue;
                let x = ss.screenX;
                let y = ss.screenY + (ss.hopArc || 0);
                let drawY = y - CUBE_QUARTER - 10;
                let drawX = x;

                let color = ss.type === 'slick' ? '#33ff33' : '#3399ff';
                let darkColor = ss.type === 'slick' ? '#228822' : '#225588';

                // Body
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.ellipse(drawX, drawY + 2, 8, 10, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = darkColor;
                ctx.lineWidth = 1;
                ctx.stroke();

                // Sunglasses
                ctx.fillStyle = '#000';
                ctx.fillRect(drawX - 7, drawY - 4, 6, 4);
                ctx.fillRect(drawX + 1, drawY - 4, 6, 4);
                ctx.fillRect(drawX - 1, drawY - 3, 2, 2);
                // Glasses shine
                ctx.fillStyle = '#fff';
                ctx.fillRect(drawX - 6, drawY - 3, 2, 1);
                ctx.fillRect(drawX + 2, drawY - 3, 2, 1);

                // Smirk
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(drawX, drawY + 4, 4, 0.1, Math.PI - 0.1);
                ctx.stroke();

                // Feet
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(drawX - 4, drawY + 12, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(drawX + 4, drawY + 12, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawUggWrong() {
            for (let i = 0; i < uggWrong.length; i++) {
                let uw = uggWrong[i];
                if (!uw.active) continue;
                let x = uw.screenX;
                let y = uw.screenY + (uw.hopArc || 0);
                // Draw on the side of the cube rather than on top
                let drawY = y;
                let drawX = x;
                if (uw.type === 'ugg') {
                    drawX += CUBE_HALF * 0.4;
                } else {
                    drawX -= CUBE_HALF * 0.4;
                }

                let color = uw.type === 'ugg' ? '#ff6666' : '#ff9933';

                // Body - blocky creature on side
                ctx.fillStyle = color;
                ctx.fillRect(drawX - 7, drawY - 8, 14, 16);

                // Eyes
                ctx.fillStyle = '#fff';
                ctx.fillRect(drawX - 5, drawY - 6, 4, 4);
                ctx.fillRect(drawX + 1, drawY - 6, 4, 4);
                ctx.fillStyle = '#000';
                ctx.fillRect(drawX - 4, drawY - 5, 2, 2);
                ctx.fillRect(drawX + 2, drawY - 5, 2, 2);

                // Mouth
                ctx.fillStyle = '#000';
                ctx.fillRect(drawX - 3, drawY + 2, 6, 2);

                // Legs
                ctx.fillStyle = color;
                ctx.fillRect(drawX - 6, drawY + 8, 4, 4);
                ctx.fillRect(drawX + 2, drawY + 8, 4, 4);
            }
        }

        function drawFloatingTexts(dt) {
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y -= 40 * dt;
                ft.life -= dt;
                if (ft.life <= 0) { floatingTexts.splice(i, 1); continue; }
                ctx.globalAlpha = Math.min(1, ft.life * 2);
                ctx.fillStyle = ft.c;
                ctx.font = 'bold 14px Courier';
                ctx.textAlign = 'center';
                ctx.shadowBlur = 6;
                ctx.shadowColor = ft.c;
                ctx.fillText(ft.t, ft.x, ft.y);
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }

        function drawParticles(dt) {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
                if (p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            }
            ctx.globalAlpha = 1;
        }

        // === Home Screen ===
        function drawHomeScreen(dt) {
            titleTimer += dt;

            let bgG = ctx.createLinearGradient(0, 0, 0, H);
            bgG.addColorStop(0, '#0a0400');
            bgG.addColorStop(0.5, '#050200');
            bgG.addColorStop(1, '#050505');
            ctx.fillStyle = bgG;
            ctx.fillRect(0, 0, W, H);

            // Stars
            drawStars();

            // Animated mini pyramid decoration
            let pyX = W / 2;
            let pyY = 475;
            let cs = 18;
            let ch = cs / 2;
            let cq = cs / 4;
            for (let row = 0; row < 4; row++) {
                for (let col = 0; col <= row; col++) {
                    let cx = pyX + (col - row / 2) * cs;
                    let cy = pyY + row * (cs * 0.75);
                    let colorIdx = Math.floor(gameTime * 3 + row + col) % 4;
                    let tColors = ['#ffdd00', '#4488ff', '#ff4444', '#44ff44'];
                    let lColors = ['#997700', '#224488', '#882222', '#228822'];
                    let rColors = ['#ccaa00', '#3366cc', '#cc3333', '#33cc33'];
                    // Top
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - cq);
                    ctx.lineTo(cx + ch, cy);
                    ctx.lineTo(cx, cy + cq);
                    ctx.lineTo(cx - ch, cy);
                    ctx.closePath();
                    ctx.fillStyle = tColors[colorIdx];
                    ctx.fill();
                    // Left
                    ctx.beginPath();
                    ctx.moveTo(cx - ch, cy);
                    ctx.lineTo(cx, cy + cq);
                    ctx.lineTo(cx, cy + cq + ch);
                    ctx.lineTo(cx - ch, cy + ch);
                    ctx.closePath();
                    ctx.fillStyle = lColors[colorIdx];
                    ctx.fill();
                    // Right
                    ctx.beginPath();
                    ctx.moveTo(cx + ch, cy);
                    ctx.lineTo(cx, cy + cq);
                    ctx.lineTo(cx, cy + cq + ch);
                    ctx.lineTo(cx + ch, cy + ch);
                    ctx.closePath();
                    ctx.fillStyle = rColors[colorIdx];
                    ctx.fill();
                }

            // Title
            let titlePulse = 1 + 0.05 * Math.sin(titleTimer * 8);

            ctx.font = 'bold ' + titleSize + 'px Courier';
            ctx.shadowBlur = titleGlow;
            ctx.shadowColor = '#ff6600';
            ctx.fillText("Q*BERT", W / 2, 55);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffaa00';
            ctx.font = 'bold 14px Courier';
            ctx.fillText("D E L U X E", W / 2, 75);

            // High scores panel
            let panelX = W / 2 - 160, panelY = 90, panelW = 320, panelH = 260;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(panelX, panelY, panelW, panelH);
            ctx.strokeStyle = '#ff8c00';
            ctx.lineWidth = 2;
            ctx.strokeRect(panelX, panelY, panelW, panelH);

            ctx.fillStyle = '#ff8c00';
            ctx.font = 'bold 16px Courier';
            ctx.textAlign = 'center';
            ctx.fillText("--- HALL OF FAME ---", W / 2, panelY + 25);

            ctx.fillStyle = '#666';
            ctx.font = '11px Courier';
            ctx.textAlign = 'left';
            ctx.fillText("RNK", panelX + 15, panelY + 45);
            ctx.fillText("NAME", panelX + 55, panelY + 45);
            ctx.textAlign = 'right';
            ctx.fillText("SCORE", panelX + panelW - 15, panelY + 45);

            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(panelX + 10, panelY + 50);
            ctx.lineTo(panelX + panelW - 10, panelY + 50);
            ctx.stroke();

            for (let i = 0; i < 10; i++) {
                let rowY = panelY + 66 + i * 20;
                if (i < highScores.length) {
                    let h = highScores[i];
                    let isTop3 = i < 3;
                    ctx.fillStyle = isTop3 ? ['#ffd700', '#c0c0c0', '#cd7f32'][i] : '#aaa';
                    ctx.font = isTop3 ? 'bold 13px Courier' : '13px Courier';
                    ctx.textAlign = 'left';
                    ctx.fillText((i + 1).toString().padStart(2, ' ') + '.', panelX + 15, rowY);
                    ctx.fillText(h.n, panelX + 55, rowY);
                    ctx.textAlign = 'right';
                    ctx.fillText(h.s, panelX + panelW - 15, rowY);
                } else {
                    ctx.fillStyle = '#333';
                    ctx.font = '13px Courier';
                    ctx.textAlign = 'left';
                    ctx.fillText((i + 1).toString().padStart(2, ' ') + '.', panelX + 15, rowY);
                    ctx.fillText("---", panelX + 55, rowY);
                    ctx.textAlign = 'right';
                    ctx.fillText("---", panelX + panelW - 15, rowY);
                }
            }

            // Difficulty selector
            ctx.textAlign = 'center';
            ctx.fillStyle = '#aaa';
            ctx.font = 'bold 14px Courier';
            ctx.fillText("DIFFICULTY", W / 2, 380);

            let dBtnW = 100, dBtnH = 30, dBtnGap = 12;
            let dTotalW = 3 * dBtnW + 2 * dBtnGap;
            let dBtnStartX = (W - dTotalW) / 2;
            let dBtnY = 390;
            for (let d = 0; d < 3; d++) {
                let bx = dBtnStartX + d * (dBtnW + dBtnGap);
                let selected = d === difficulty;
                ctx.fillStyle = selected ? DIFF_COLORS[d] : '#222';
                ctx.fillRect(bx, dBtnY, dBtnW, dBtnH);
                ctx.strokeStyle = DIFF_COLORS[d];
                ctx.lineWidth = selected ? 2 : 1;
                ctx.strokeRect(bx, dBtnY, dBtnW, dBtnH);
                ctx.fillStyle = selected ? '#000' : DIFF_COLORS[d];
                ctx.font = selected ? 'bold 12px Courier' : '12px Courier';
                ctx.textAlign = 'center';
                ctx.fillText(DIFF_NAMES[d], bx + dBtnW / 2, dBtnY + 20);
            }

            // Mode info
            ctx.textAlign = 'center';
            ctx.font = '12px Courier';
            ctx.fillStyle = '#888';

            else if (difficulty === 1) ctx.fillText("NORMAL ENEMIES | 3 LIVES", W / 2, 438);
            else ctx.fillText("FAST ENEMIES | 2 LIVES", W / 2, 438);

            ctx.textAlign = 'center';

            ctx.fillText("SLICK/SAM: 300  COILY LURE: 500", W / 2, 545);

            ctx.fillStyle = '#fff';
